<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>GLYPH LAUNCH v2</title>
<style>
  :root {
    --neon-blue:   #00f3ff;
    --neon-green:  #39ff14;
    --neon-pink:   #ff006e;
    --neon-orange: #ff9500;
    --neon-purple: #bf5fff;
    --neon-yellow: #ffe600;
    --bg: #000000;
    --radius: 108px;
    --item-size: 64px;
    --accent:     #00f3ff;
    --accent2:    #ff9500;
    --grid-color: rgba(0,243,255,0.04);
  }
  body.theme-green {
    --neon-blue:  #39ff14; --neon-orange: #ffdd00;
    --accent:     #39ff14; --accent2:     #ffdd00;
    --grid-color: rgba(57,255,20,0.04);
    background: #000800;
  }
  body.theme-pink {
    --neon-blue:  #ff006e; --neon-orange: #bf5fff;
    --accent:     #ff006e; --accent2:     #bf5fff;
    --grid-color: rgba(255,0,110,0.04);
    background: #080008;
  }
  body.theme-amber {
    --neon-blue:  #ff9500; --neon-orange: #ffe600;
    --accent:     #ff9500; --accent2:     #ffe600;
    --grid-color: rgba(255,149,0,0.04);
    background: #080400;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── 背景グリッド ── */
  #bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #bg-grid::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, transparent 40%, #000 100%);
  }

  /* ── アイドル表示 ── */
  #idle {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 1; transition: opacity .3s;
  }
  #idle.hidden { opacity: 0; }

  .idle-glyph {
    width: 90px; height: 90px;
    border: 1.5px solid rgba(0,243,255,.3);
    border-radius: 50%;
    position: relative;
    animation: idle-pulse 3s ease-in-out infinite;
  }
  .idle-glyph::before, .idle-glyph::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,243,255,.15);
  }
  .idle-glyph::before { inset: 8px;  animation: idle-pulse 3s ease-in-out infinite .5s; }
  .idle-glyph::after  { inset: 22px; animation: idle-pulse 3s ease-in-out infinite 1s; }

  .idle-cross {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .idle-cross::before, .idle-cross::after {
    content: '';
    position: absolute;
    background: rgba(0,243,255,.4);
  }
  .idle-cross::before { width: 1px; height: 60%; }
  .idle-cross::after  { width: 60%; height: 1px; }

  .idle-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--neon-blue);
    box-shadow: 0 0 10px var(--neon-blue), 0 0 24px var(--neon-blue);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes idle-pulse {
    0%, 100% { opacity: .3; transform: scale(1); }
    50%       { opacity: .8; transform: scale(1.04); }
  }

  .idle-hint {
    margin-top: 22px;
    font-size: 10px;
    letter-spacing: .25em;
    color: rgba(0,243,255,.35);
    text-transform: uppercase;
  }
  .idle-title {
    font-size: 11px;
    letter-spacing: .5em;
    color: rgba(0,243,255,.2);
    text-transform: uppercase;
    margin-top: 8px;
  }
  .idle-settings-hint {
    position: fixed; top: 18px; right: 18px;
    font-size: 9px; letter-spacing: .2em;
    color: rgba(0,243,255,.18);
    pointer-events: none;
  }

  /* ── 履歴バー（画面下部） ── */
  #history-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 2;
    display: flex; align-items: center;
    padding: 6px 10px 8px;
    gap: 8px;
    pointer-events: none;
    opacity: 0; transition: opacity .4s;
    background: linear-gradient(transparent, rgba(0,0,0,.7));
  }
  #history-bar.visible { opacity: 1; pointer-events: auto; }

  .hist-label {
    font-size: 7px; letter-spacing: .2em;
    color: rgba(0,243,255,.25);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .hist-items {
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
  }
  .hist-items::-webkit-scrollbar { display: none; }

  .hist-chip {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 4px;
    padding: 4px 8px;
    border: 1px solid rgba(0,243,255,.18);
    border-radius: 20px;
    background: rgba(0,8,12,.85);
    font-size: 10px;
    color: rgba(0,243,255,.55);
    cursor: pointer;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .hist-chip:active {
    border-color: var(--neon-blue);
    color: var(--neon-blue);
  }
  .hist-chip-icon { font-size: 12px; }
  .hist-chip-label { font-size: 8px; letter-spacing: .05em; }

  /* ── ラジアルメニュー ── */
  #menu {
    position: fixed; z-index: 10;
    pointer-events: none;
    display: none;
    will-change: transform;
  }
  #menu.active { display: block; }

  /* 中心リング */
  .menu-center {
    position: absolute;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--neon-blue);
    box-shadow: 0 0 12px var(--neon-blue), inset 0 0 8px rgba(0,243,255,.15);
    transform: translate(-50%, -50%) scale(0);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1);
    background: rgba(0,0,0,.9);
    will-change: transform;
    display: flex; align-items: center; justify-content: center;
  }
  #menu.active .menu-center { transform: translate(-50%, -50%) scale(1); }

  /* スワイプ距離インジケーター（中心リングの色変化） */
  .menu-center.long-mode {
    border-color: var(--neon-orange);
    box-shadow: 0 0 12px var(--neon-orange), inset 0 0 8px rgba(255,149,0,.15);
  }
  .menu-center.long-mode .menu-center-dot {
    background: var(--neon-orange);
    box-shadow: 0 0 8px var(--neon-orange);
  }

  .menu-center-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon-blue);
    box-shadow: 0 0 8px var(--neon-blue);
    transition: background .2s, box-shadow .2s;
  }

  /* ラジアルライン */
  .menu-rays {
    position: absolute; left: 0; top: 0;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    pointer-events: none;
  }
  .ray-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,243,255,.25));
    transform-origin: left center;
    opacity: 0;
    transition: opacity .18s;
  }
  #menu.active .ray-line { opacity: 1; }

  /* メニューアイテム */
  .menu-item {
    position: absolute;
    width: var(--item-size); height: var(--item-size);
    border-radius: 50%;
    background: rgba(0,4,8,.92);
    border: 1.5px solid rgba(0,243,255,.25);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transform: translate(-50%, -50%) scale(0);
    transition:
      transform .22s cubic-bezier(.34,1.56,.64,1),
      border-color .15s,
      box-shadow .15s,
      background .15s;
    will-change: transform;
    gap: 4px;
    cursor: pointer;
    pointer-events: auto;
    overflow: hidden;
  }
  #menu.active .menu-item { transform: translate(-50%, -50%) scale(1); }
  #menu.active .menu-item[data-di="0"] { transition-delay: .02s; }
  #menu.active .menu-item[data-di="1"] { transition-delay: .04s; }
  #menu.active .menu-item[data-di="2"] { transition-delay: .06s; }
  #menu.active .menu-item[data-di="3"] { transition-delay: .08s; }
  #menu.active .menu-item[data-di="4"] { transition-delay: .10s; }
  #menu.active .menu-item[data-di="5"] { transition-delay: .08s; }
  #menu.active .menu-item[data-di="6"] { transition-delay: .06s; }
  #menu.active .menu-item[data-di="7"] { transition-delay: .04s; }

  .menu-item.highlighted {
    border-color: var(--neon-blue);
    box-shadow: 0 0 18px var(--neon-blue), 0 0 40px rgba(0,243,255,.3), inset 0 0 16px rgba(0,243,255,.08);
    background: rgba(0,20,30,.97);
    transform: translate(-50%, -50%) scale(1.18) !important;
  }
  /* 長スワイプモードのハイライト */
  .menu-item.highlighted.long-fire {
    border-color: var(--neon-orange);
    box-shadow: 0 0 18px var(--neon-orange), 0 0 40px rgba(255,149,0,.3), inset 0 0 16px rgba(255,149,0,.08);
  }
  .menu-item.highlighted .item-icon { filter: drop-shadow(0 0 6px var(--neon-blue)); }
  .menu-item.highlighted.long-fire .item-icon { filter: drop-shadow(0 0 6px var(--neon-orange)); }
  .menu-item.highlighted .item-label { color: var(--neon-blue); }
  .menu-item.highlighted.long-fire .item-label { color: var(--neon-orange); }

  .item-icon {
    font-size: 22px;
    line-height: 1;
    transition: filter .15s;
  }
  .item-label {
    font-size: 8px;
    letter-spacing: .1em;
    color: rgba(0,243,255,.6);
    text-transform: uppercase;
    max-width: 52px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
    transition: color .15s;
  }

  /* 方向インジケーター */
  #direction-indicator {
    position: fixed; bottom: 48px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 10px;
    letter-spacing: .25em;
    color: var(--neon-blue);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .2s, color .2s;
    pointer-events: none;
    text-shadow: 0 0 12px var(--neon-blue);
    white-space: nowrap;
  }
  #direction-indicator.visible { opacity: 1; }
  #direction-indicator.long-mode {
    color: var(--neon-orange);
    text-shadow: 0 0 12px var(--neon-orange);
  }

  /* リップル */
  .ripple {
    position: fixed; pointer-events: none; z-index: 5;
    border-radius: 50%;
    border: 1px solid rgba(0,243,255,.5);
    transform: translate(-50%, -50%) scale(0);
    animation: ripple-out .5s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes ripple-out {
    to { transform: translate(-50%, -50%) scale(3); opacity: 0; }
  }

  /* スワイプトレイル */
  #trail-canvas {
    position: fixed; inset: 0; z-index: 4;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
  }
  #trail-canvas.active { opacity: 1; }

  /* ── プレビューポップアップ ── */
  #preview-popup {
    position: fixed; z-index: 50;
    background: rgba(0,6,10,.97);
    border: 1px solid rgba(0,243,255,.35);
    border-radius: 6px;
    padding: 10px 14px;
    max-width: 260px;
    pointer-events: none;
    opacity: 0;
    transform: scale(.88);
    transition: opacity .18s, transform .18s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0 24px rgba(0,243,255,.15);
  }
  #preview-popup.visible {
    opacity: 1;
    transform: scale(1);
  }
  .preview-icon { font-size: 26px; text-align: center; margin-bottom: 6px; }
  .preview-label {
    font-size: 11px; letter-spacing: .2em;
    color: var(--neon-blue);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .preview-url {
    font-size: 9px; letter-spacing: .05em;
    color: rgba(0,243,255,.4);
    word-break: break-all;
    line-height: 1.5;
  }
  .preview-hint {
    margin-top: 6px;
    font-size: 8px; letter-spacing: .15em;
    color: rgba(0,243,255,.25);
    text-transform: uppercase;
  }

  /* ── 設定パネル ── */
  #settings-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.95);
    display: none;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #settings-overlay.open { display: flex; }

  .settings-header {
    padding: 28px 24px 16px;
    border-bottom: 1px solid rgba(0,243,255,.15);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: rgba(0,0,0,.98); z-index: 1;
  }
  .settings-title {
    font-size: 11px; letter-spacing: .5em;
    color: var(--neon-blue); text-transform: uppercase;
  }
  .settings-close {
    width: 36px; height: 36px;
    border: 1px solid rgba(0,243,255,.3);
    border-radius: 50%;
    background: transparent;
    color: var(--neon-blue);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .settings-close:hover, .settings-close:active {
    border-color: var(--neon-blue);
    box-shadow: 0 0 12px var(--neon-blue);
  }

  .settings-body { padding: 16px 24px 40px; flex: 1; }

  /* 設定セクション見出し */
  .settings-section-title {
    font-size: 8px; letter-spacing: .35em;
    color: rgba(0,243,255,.3);
    text-transform: uppercase;
    margin: 20px 0 10px;
    border-bottom: 1px solid rgba(0,243,255,.08);
    padding-bottom: 6px;
  }

  /* スワイプ閾値スライダー */
  .threshold-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .threshold-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: rgba(0,243,255,.2);
    border-radius: 2px;
    outline: none;
  }
  .threshold-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--neon-blue);
    box-shadow: 0 0 8px var(--neon-blue);
    cursor: pointer;
  }
  .threshold-val {
    font-size: 10px; color: var(--neon-blue);
    min-width: 36px; text-align: right;
  }
  .threshold-hint {
    font-size: 8px; letter-spacing: .1em;
    color: rgba(0,243,255,.25);
    margin-bottom: 14px;
  }

  .slot-card {
    margin-bottom: 14px;
    padding: 16px;
    border: 1px solid rgba(0,243,255,.12);
    border-radius: 4px;
    background: rgba(0,8,12,.8);
    transition: border-color .15s;
  }
  .slot-card:focus-within { border-color: rgba(0,243,255,.4); }

  .slot-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .slot-dir-badge {
    font-size: 18px; width: 28px; text-align: center;
    filter: drop-shadow(0 0 4px rgba(0,243,255,.5));
  }
  .slot-dir-name {
    font-size: 9px; letter-spacing: .3em;
    color: rgba(0,243,255,.5); text-transform: uppercase;
  }

  .field-group { margin-bottom: 10px; }
  .field-label {
    display: block;
    font-size: 8px; letter-spacing: .2em;
    color: rgba(0,243,255,.4); text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field-row { display: flex; gap: 8px; }
  .field-input {
    flex: 1;
    background: rgba(0,0,0,.7);
    border: 1px solid rgba(0,243,255,.2);
    border-radius: 3px;
    padding: 8px 10px;
    color: var(--neon-blue);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
  }
  .field-input:focus { border-color: rgba(0,243,255,.7); }
  .field-input::placeholder { color: rgba(0,243,255,.2); }
  .field-input.icon-input { width: 54px; flex: none; text-align: center; font-size: 20px; }

  .settings-save-btn {
    display: block; width: 100%;
    margin-top: 24px; padding: 14px;
    background: transparent;
    border: 1px solid var(--neon-blue);
    border-radius: 3px;
    color: var(--neon-blue);
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: .4em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
  }
  .settings-save-btn:active {
    background: rgba(0,243,255,.08);
    box-shadow: 0 0 20px rgba(0,243,255,.3);
  }

  /* 履歴クリアボタン */
  .hist-clear-btn {
    display: block; width: 100%;
    margin-top: 10px; padding: 10px;
    background: transparent;
    border: 1px solid rgba(255,0,110,.3);
    border-radius: 3px;
    color: rgba(255,0,110,.6);
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: .3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .hist-clear-btn:active {
    background: rgba(255,0,110,.08);
    border-color: var(--neon-pink);
  }

  .settings-hint {
    text-align: center;
    font-size: 9px; letter-spacing: .2em;
    color: rgba(0,243,255,.2);
    margin-top: 16px;
  }

  /* テーマ選択 */
  .theme-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 4px;
  }
  .theme-btn {
    flex: 1; min-width: 60px;
    padding: 10px 6px;
    border-radius: 4px;
    border: 1.5px solid transparent;
    background: rgba(0,0,0,.6);
    font-family: 'Courier New', monospace;
    font-size: 9px; letter-spacing: .15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    text-align: center;
  }
  .theme-btn.active { border-width: 2px; }
  .theme-btn[data-theme="cyan"]  { color: #00f3ff; border-color: rgba(0,243,255,.3); }
  .theme-btn[data-theme="green"] { color: #39ff14; border-color: rgba(57,255,20,.3); }
  .theme-btn[data-theme="pink"]  { color: #ff006e; border-color: rgba(255,0,110,.3); }
  .theme-btn[data-theme="amber"] { color: #ff9500; border-color: rgba(255,149,0,.3); }
  .theme-btn[data-theme="cyan"].active  { border-color: #00f3ff; box-shadow: 0 0 10px rgba(0,243,255,.4); }
  .theme-btn[data-theme="green"].active { border-color: #39ff14; box-shadow: 0 0 10px rgba(57,255,20,.4); }
  .theme-btn[data-theme="pink"].active  { border-color: #ff006e; box-shadow: 0 0 10px rgba(255,0,110,.4); }
  .theme-btn[data-theme="amber"].active { border-color: #ff9500; box-shadow: 0 0 10px rgba(255,149,0,.4); }

  /* フラッシュ通知 */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,243,255,.1);
    border: 1px solid rgba(0,243,255,.4);
    color: var(--neon-blue);
    font-size: 10px; letter-spacing: .2em;
    padding: 8px 20px;
    border-radius: 2px;
    z-index: 200;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    text-transform: uppercase;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
  #toast.orange {
    border-color: rgba(255,149,0,.5);
    color: var(--neon-orange);
    background: rgba(255,149,0,.08);
  }
</style>
</head>
<body>

<div id="bg-grid"></div>
<canvas id="trail-canvas"></canvas>

<div id="idle">
  <div class="idle-glyph">
    <div class="idle-cross"></div>
    <div class="idle-dot"></div>
  </div>
  <p class="idle-hint">Touch anywhere to launch</p>
  <p class="idle-title">Glyph Launch v2</p>
</div>
<div class="idle-settings-hint">Triple tap top ↑ for settings</div>

<!-- 履歴バー -->
<div id="history-bar">
  <span class="hist-label">Recent</span>
  <div class="hist-items" id="hist-items"></div>
</div>

<div id="menu">
  <div class="menu-rays" id="menu-rays"></div>
  <div class="menu-center" id="menu-center"><div class="menu-center-dot" id="menu-center-dot"></div></div>
</div>

<div id="direction-indicator"></div>
<div id="preview-popup"></div>
<div id="toast"></div>

<!-- 設定パネル -->
<div id="settings-overlay">
  <div class="settings-header">
    <span class="settings-title">// Config</span>
    <button class="settings-close" id="settings-close">✕</button>
  </div>
  <div class="settings-body" id="settings-body"></div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════
   定数・設定
═══════════════════════════════════════════ */
const DIRECTIONS = [
  { id: 'E',  angle:    0, label: 'East',      arrow: '→' },
  { id: 'SE', angle:   45, label: 'South East', arrow: '↘' },
  { id: 'S',  angle:   90, label: 'South',      arrow: '↓' },
  { id: 'SW', angle:  135, label: 'South West', arrow: '↙' },
  { id: 'W',  angle:  180, label: 'West',       arrow: '←' },
  { id: 'NW', angle: -135, label: 'North West', arrow: '↖' },
  { id: 'N',  angle:  -90, label: 'North',      arrow: '↑' },
  { id: 'NE', angle:  -45, label: 'North East', arrow: '↗' },
];

const DEFAULTS = [
  { url: 'https://www.google.com',       icon: '🔍', label: 'Google'  },
  { url: 'https://www.youtube.com',      icon: '▶',  label: 'YouTube' },
  { url: 'https://github.com',           icon: '⌥',  label: 'GitHub'  },
  { url: 'https://maps.google.com',      icon: '◉',  label: 'Maps'    },
  { url: 'https://claude.ai',            icon: '✦',  label: 'Claude'  },
  { url: 'https://x.com',               icon: '✕',  label: 'X'       },
  { url: 'https://news.ycombinator.com', icon: '△',  label: 'HN'      },
  { url: 'https://www.wikipedia.org',    icon: 'Ω',  label: 'Wiki'    },
];

const STORAGE_KEY     = 'glyph_launch_v1';    // スロットデータ（v1互換）
const HIST_KEY        = 'glyph_history_v1';   // 履歴データ
const CONFIG_KEY      = 'glyph_config_v1';    // 設定データ

const THEMES = ['cyan','green','pink','amber'];

const DEADZONE        = 18;   // px: 無方向ゾーン
const LONG_DIST_DEF   = 120;  // px: 長スワイプ閾値デフォルト
const HIST_MAX        = 8;    // 履歴最大件数

/* ━━━ 長押しプレビュー ━━━
   Android Brave では ontouchstart + contextmenu の両方が発火することがある。
   タイマーのみで制御し contextmenu は preventDefault で抑止する。          */
const LONGPRESS_MS = 420;     // ms: 長押し判定時間

/* ═══════════════════════════════════════════
   LocalStorage ユーティリティ
═══════════════════════════════════════════ */
function lsGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return fallback;
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

/* ── スロット ── */
function loadSlots() {
  const parsed = lsGet(STORAGE_KEY, null);
  if (Array.isArray(parsed) && parsed.length === 8
      && parsed.every(s => s && typeof s === 'object')) return parsed;
  return DEFAULTS.map((d, i) => ({ ...d, dir: DIRECTIONS[i].id }));
}
function saveSlots(s) { lsSet(STORAGE_KEY, s); }
let slots = loadSlots();

/* ── 設定（長スワイプ閾値・テーマ・空スロット非表示） ── */
function loadConfig() {
  const cfg = lsGet(CONFIG_KEY, {});
  return {
    longDist:  cfg.longDist  ?? LONG_DIST_DEF,
    theme:     cfg.theme     ?? 'cyan',
    hideEmpty: cfg.hideEmpty ?? false,
  };
}
function saveConfig(cfg) { lsSet(CONFIG_KEY, cfg); }
let config = loadConfig();

/* テーマ適用 */
function applyTheme(theme) {
  document.body.classList.remove(...THEMES.map(t => 'theme-' + t));
  if (theme !== 'cyan') document.body.classList.add('theme-' + theme);
  /* PWAのテーマカラーも動的に変更 */
  const colors = { cyan:'#000000', green:'#000800', pink:'#080008', amber:'#080400' };
  document.querySelector('meta[name="theme-color"]').content = colors[theme] || '#000000';
}
applyTheme(config.theme);

/* ── 履歴 ── */
function loadHistory() {
  const h = lsGet(HIST_KEY, []);
  return Array.isArray(h) ? h : [];
}
function saveHistory(h) { lsSet(HIST_KEY, h); }
function addHistory(slot) {
  if (!slot || !slot.url) return;
  let h = loadHistory().filter(x => x.url !== slot.url); // 重複除去
  h.unshift({ url: slot.url, icon: slot.icon, label: slot.label });
  if (h.length > HIST_MAX) h = h.slice(0, HIST_MAX);
  saveHistory(h);
  renderHistory();
}
function clearHistory() {
  saveHistory([]);
  renderHistory();
}

/* ═══════════════════════════════════════════
   DOM refs
═══════════════════════════════════════════ */
const menuEl          = document.getElementById('menu');
const menuCenterEl    = document.getElementById('menu-center');
const raysEl          = document.getElementById('menu-rays');
const idleEl          = document.getElementById('idle');
const dirIndEl        = document.getElementById('direction-indicator');
const settingsOverlay = document.getElementById('settings-overlay');
const settingsBody    = document.getElementById('settings-body');
const settingsClose   = document.getElementById('settings-close');
const trailCanvas     = document.getElementById('trail-canvas');
const ctx             = trailCanvas.getContext('2d');
const toastEl         = document.getElementById('toast');
const previewEl       = document.getElementById('preview-popup');
const histBarEl       = document.getElementById('history-bar');
const histItemsEl     = document.getElementById('hist-items');

/* ── Canvas resize ── */
function resizeCanvas() {
  trailCanvas.width  = window.innerWidth;
  trailCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ═══════════════════════════════════════════
   履歴バー描画
═══════════════════════════════════════════ */
function renderHistory() {
  const h = loadHistory();
  histItemsEl.innerHTML = '';
  if (h.length === 0) {
    histBarEl.classList.remove('visible');
    return;
  }
  h.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'hist-chip';
    chip.innerHTML = `<span class="hist-chip-icon">${item.icon || '◉'}</span><span class="hist-chip-label">${item.label || ''}</span>`;
    /* Android Brave: touchend で開く。クリックも念のため残す（冪等ガードあり） */
    let histChipFired = false;
    const openHistItem = () => {
      if (histChipFired) return;
      histChipFired = true;
      vibrate([10, 20, 10]);
      setTimeout(() => { window.open(item.url, '_blank'); }, 60);
    };
    chip.addEventListener('touchend', (e) => { e.stopPropagation(); openHistItem(); });
    chip.addEventListener('click',    (e) => { e.stopPropagation(); openHistItem(); });
    histItemsEl.appendChild(chip);
  });
  histBarEl.classList.add('visible');
}
renderHistory();

/* ═══════════════════════════════════════════
   メニュービルド
═══════════════════════════════════════════ */
const RADIUS_PX = 108;
let itemEls = [];

function buildMenu() {
  itemEls.forEach(el => el.remove());
  raysEl.innerHTML = '';
  itemEls = [];

  DIRECTIONS.forEach((dir, i) => {
    const rad  = dir.angle * Math.PI / 180;
    const x    = Math.cos(rad) * RADIUS_PX;
    const y    = Math.sin(rad) * RADIUS_PX;
    const slot = slots[i];

    const ray = document.createElement('div');
    ray.className = 'ray-line';
    ray.style.cssText = `width:${RADIUS_PX - 30}px; left:0; top:0; transform:rotate(${dir.angle}deg);`;
    raysEl.appendChild(ray);

    const item = document.createElement('div');
    item.className   = 'menu-item';
    item.dataset.di  = i;
    item.style.cssText = `left:${x}px; top:${y}px;`;
    /* 空スロット非表示設定 */
    if (config.hideEmpty && (!slot.url || !slot.url.trim())) {
      item.style.visibility = 'hidden';
      item.style.pointerEvents = 'none';
    }
    item.innerHTML = `
      <span class="item-icon">${slot.icon || dir.arrow}</span>
      <span class="item-label">${slot.label || dir.id}</span>
    `;
    menuEl.appendChild(item);
    itemEls.push(item);
  });
}
buildMenu();

/* ═══════════════════════════════════════════
   タッチ状態
═══════════════════════════════════════════ */
let touchActive   = false;
let originX       = 0;
let originY       = 0;
let currentDirIdx = -1;
let trailPoints   = [];
let menuShowing   = false;
let isLongMode    = false;  // 長スワイプモードか

/* ── 長押しプレビュー用タイマー ── */
let longPressTimer = null;
let longPressFired = false;

/* ─── 角度 → 方向インデックス ───
   -180〜180 → 0〜360 正規化後 45° ステップで折り返す              */
function angleToDir(angleDeg) {
  let a = angleDeg < 0 ? angleDeg + 360 : angleDeg;
  return Math.round(a / 45) % 8;
}

/* ═══════════════════════════════════════════
   メニュー表示 / 非表示
═══════════════════════════════════════════ */
function showMenu(x, y) {
  menuShowing = true;
  isLongMode  = false;
  menuEl.style.left = x + 'px';
  menuEl.style.top  = y + 'px';
  menuEl.classList.add('active');
  menuCenterEl.classList.remove('long-mode');
  idleEl.classList.add('hidden');
  trailCanvas.classList.add('active');
  vibrate(8);
}

function hideMenu() {
  menuShowing   = false;
  currentDirIdx = -1;
  isLongMode    = false;
  menuEl.classList.remove('active');
  menuCenterEl.classList.remove('long-mode');
  idleEl.classList.remove('hidden');
  trailCanvas.classList.remove('active');
  dirIndEl.classList.remove('visible', 'long-mode');
  itemEls.forEach(el => el.classList.remove('highlighted', 'long-fire'));
  clearTrail();
  trailPoints = [];
  hidePreview();
}

/* ═══════════════════════════════════════════
   ハイライト
═══════════════════════════════════════════ */
function setHighlight(idx, longMode) {
  if (idx === currentDirIdx && longMode === isLongMode) return;
  currentDirIdx = idx;
  isLongMode    = longMode;

  itemEls.forEach((el, i) => {
    el.classList.toggle('highlighted', i === idx);
    if (i === idx) {
      el.classList.toggle('long-fire', longMode);
    } else {
      el.classList.remove('long-fire');
    }
  });

  menuCenterEl.classList.toggle('long-mode', longMode);

  if (idx >= 0) {
    vibrate(4);
    const modeTag = longMode ? ' [CURRENT TAB]' : ' [NEW TAB]';
    dirIndEl.textContent = DIRECTIONS[idx].arrow + ' ' + (slots[idx].label || DIRECTIONS[idx].label) + modeTag;
    dirIndEl.classList.add('visible');
    dirIndEl.classList.toggle('long-mode', longMode);
  } else {
    dirIndEl.classList.remove('visible', 'long-mode');
  }
}

/* ═══════════════════════════════════════════
   プレビューポップアップ
═══════════════════════════════════════════ */
function showPreview(idx, touchX, touchY) {
  if (idx < 0) return;
  const slot = slots[idx];
  if (!slot || !slot.url) return;

  previewEl.innerHTML = `
    <div class="preview-icon">${slot.icon || DIRECTIONS[idx].arrow}</div>
    <div class="preview-label">${slot.label || DIRECTIONS[idx].id}</div>
    <div class="preview-url">${slot.url}</div>
    <div class="preview-hint">Release to open · Long-swipe = current tab</div>
  `;

  /* 画面端に被らないよう位置調整 */
  const pw = 260, ph = 120;
  let px = touchX + 20;
  let py = touchY - ph - 16;
  if (px + pw > window.innerWidth  - 8) px = touchX - pw - 20;
  if (py < 8) py = touchY + 20;

  previewEl.style.left = px + 'px';
  previewEl.style.top  = py + 'px';
  previewEl.classList.add('visible');
  vibrate(6);
}

function hidePreview() {
  previewEl.classList.remove('visible');
}

/* ═══════════════════════════════════════════
   トレイル描画
═══════════════════════════════════════════ */
function drawTrail() {
  ctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  if (trailPoints.length < 2) return;
  /* 長スワイプモード時はトレイル色をオレンジに */
  const color = isLongMode ? 'rgba(255,149,0,0.35)' : 'rgba(0,243,255,0.3)';
  const glow  = isLongMode ? 'rgba(255,149,0,0.6)'  : 'rgba(0,243,255,0.6)';
  ctx.beginPath();
  ctx.moveTo(trailPoints[0].x, trailPoints[0].y);
  for (let i = 1; i < trailPoints.length; i++) {
    ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.shadowColor = glow;
  ctx.shadowBlur  = 8;
  ctx.stroke();
}
function clearTrail() {
  ctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
}

/* ═══════════════════════════════════════════
   ユーティリティ
═══════════════════════════════════════════ */
function spawnRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.cssText = `left:${x}px;top:${y}px;width:40px;height:40px;`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

function vibrate(ms) {
  try { navigator.vibrate && navigator.vibrate(ms); } catch(e) {}
}

let toastTimer;
function showToast(msg, style) {
  toastEl.textContent = msg;
  toastEl.className   = 'show' + (style === 'orange' ? ' orange' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.className = ''; }, 1800);
}

/* ═══════════════════════════════════════════
   トリプルタップ検出（設定を開く）
═══════════════════════════════════════════ */
let topTapCount     = 0;
let topTapTimer     = null;
let openingSettings = false;

function checkTopTripleTap(y) {
  if (y > window.innerHeight * 0.2) return;
  topTapCount++;
  clearTimeout(topTapTimer);
  topTapTimer = setTimeout(() => { topTapCount = 0; }, 500);
  if (topTapCount >= 3) {
    topTapCount = 0;
    openingSettings = true;
    openSettings();
  }
}

/* ═══════════════════════════════════════════
   タッチイベント
   Android Brave 注意点:
   - touchstart/touchend が高頻度で発火することがある
   - contextmenu (長押し) はブラウザUIと干渉するので preventDefault
   - _blank は window.open のみ（location.href は同タブ遷移）
═══════════════════════════════════════════ */
document.addEventListener('touchstart',  onTouchStart,  { passive: false });
document.addEventListener('touchmove',   onTouchMove,   { passive: false });
document.addEventListener('touchend',    onTouchEnd,    { passive: false });
document.addEventListener('touchcancel', onTouchCancel, { passive: false });
/* Android Brave の長押しコンテキストメニューを抑止 */
document.addEventListener('contextmenu', e => e.preventDefault());

function onTouchStart(e) {
  if (settingsOverlay.classList.contains('open')) return;
  e.preventDefault();
  openingSettings = false;
  longPressFired  = false;
  hidePreview();

  const t = e.changedTouches[0];
  originX = t.clientX;
  originY = t.clientY;
  trailPoints = [{ x: originX, y: originY }];

  checkTopTripleTap(originY);
  if (openingSettings) return;

  touchActive = true;
  spawnRipple(originX, originY);
  showMenu(originX, originY);

  /* 長押しタイマー開始 */
  clearTimeout(longPressTimer);
  longPressTimer = setTimeout(() => {
    if (!touchActive || !menuShowing) return;
    longPressFired = true;
    /* 現時点でハイライト中のアイテムをプレビュー表示 */
    showPreview(currentDirIdx, originX, originY);
  }, LONGPRESS_MS);
}

function onTouchMove(e) {
  if (!touchActive || !menuShowing) return;
  e.preventDefault();

  const t    = e.changedTouches[0];
  const dx   = t.clientX - originX;
  const dy   = t.clientY - originY;
  const dist = Math.hypot(dx, dy);

  trailPoints.push({ x: t.clientX, y: t.clientY });
  if (trailPoints.length > 40) trailPoints.shift();

  /* 動いたら長押しタイマーキャンセル */
  if (dist > 10) {
    clearTimeout(longPressTimer);
  }

  /* スワイプ距離でモード判定 */
  const longMode = dist >= config.longDist;

  if (dist < DEADZONE) {
    setHighlight(-1, false);
    drawTrail();
    return;
  }

  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  const dirIdx = angleToDir(angle);
  /* 空スロット非表示時は該当方向を無視 */
  const slot = slots[dirIdx];
  if (config.hideEmpty && (!slot.url || !slot.url.trim())) {
    setHighlight(-1, false);
    drawTrail();
    return;
  }
  setHighlight(dirIdx, longMode);

  /* プレビュー表示中は方向変化に追従して更新 */
  if (longPressFired && currentDirIdx >= 0) {
    showPreview(currentDirIdx, t.clientX, t.clientY);
  }

  drawTrail();
}

function onTouchEnd(e) {
  if (!touchActive) return;
  touchActive = false;
  clearTimeout(longPressTimer);

  const t = e.changedTouches && e.changedTouches[0];
  if (t) {
    const dx   = t.clientX - originX;
    const dy   = t.clientY - originY;
    const dist = Math.hypot(dx, dy);

    if (dist >= DEADZONE && currentDirIdx >= 0) {
      const slot     = slots[currentDirIdx];
      const longMode = dist >= config.longDist;

      if (slot && slot.url) {
        vibrate([10, 20, 10]);
        addHistory(slot);

        if (longMode) {
          /* 長スワイプ → 現在のタブで開く */
          showToast('Opening in current tab', 'orange');
          setTimeout(() => { window.location.href = slot.url; }, 80);
        } else {
          /* 短スワイプ → 新しいタブで開く */
          showToast('Opening in new tab');
          setTimeout(() => { window.open(slot.url, '_blank'); }, 80);
        }
      }
    }
  }
  hideMenu();
}

function onTouchCancel() {
  touchActive = false;
  clearTimeout(longPressTimer);
  hideMenu();
}

/* ═══════════════════════════════════════════
   設定パネル
═══════════════════════════════════════════ */
function openSettings() {
  vibrate(12);
  renderSettingsForm();
  settingsOverlay.classList.add('open');
}

settingsClose.addEventListener('click', closeSettings);
settingsClose.addEventListener('touchend', (e) => { e.preventDefault(); closeSettings(); });

function closeSettings() {
  settingsOverlay.classList.remove('open');
}

function renderSettingsForm() {
  settingsBody.innerHTML = '';

  /* ── 動作設定セクション ── */
  const secBehavior = document.createElement('div');
  secBehavior.className = 'settings-section-title';
  secBehavior.textContent = 'Behavior';
  settingsBody.appendChild(secBehavior);

  /* テーマ選択 */
  const themeCard = document.createElement('div');
  themeCard.className = 'slot-card';
  themeCard.innerHTML = `
    <div class="field-label">Color Theme</div>
    <div class="theme-row">
      <button class="theme-btn${config.theme==='cyan'  ?' active':''}" data-theme="cyan" >◉ Cyan</button>
      <button class="theme-btn${config.theme==='green' ?' active':''}" data-theme="green">◉ Green</button>
      <button class="theme-btn${config.theme==='pink'  ?' active':''}" data-theme="pink" >◉ Pink</button>
      <button class="theme-btn${config.theme==='amber' ?' active':''}" data-theme="amber">◉ Amber</button>
    </div>
  `;
  settingsBody.appendChild(themeCard);

  /* テーマボタンのイベント（touchend + click 二重ガード） */
  themeCard.querySelectorAll('.theme-btn').forEach(btn => {
    let themeBtnFired = false;
    const onThemeBtn = (e) => {
      e.preventDefault();
      if (themeBtnFired) return;
      themeBtnFired = true;
      setTimeout(() => { themeBtnFired = false; }, 300);
      const t = btn.dataset.theme;
      config.theme = t;
      applyTheme(t);
      themeCard.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
      vibrate(6);
    };
    btn.addEventListener('touchend', onThemeBtn);
    btn.addEventListener('click',    onThemeBtn);
  });

  /* 空スロット非表示トグル */
  const hideCard = document.createElement('div');
  hideCard.className = 'slot-card';
  hideCard.innerHTML = `
    <div class="field-label" style="margin-bottom:8px;">Hide empty slots</div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <input type="checkbox" id="hide-empty-chk" ${config.hideEmpty ? 'checked' : ''}
        style="width:18px;height:18px;accent-color:var(--neon-blue);cursor:pointer;">
      <span style="font-size:9px;color:rgba(0,243,255,.4);letter-spacing:.1em;">
        URL未設定のスロットをメニューから隠す
      </span>
    </label>
  `;
  settingsBody.appendChild(hideCard);

  /* 長スワイプ閾値スライダー */
  const threshCard = document.createElement('div');
  threshCard.className = 'slot-card';
  threshCard.innerHTML = `
    <div class="field-label">Long-swipe threshold (current tab mode)</div>
    <div class="threshold-row">
      <input type="range" class="threshold-slider" id="thresh-slider"
        min="60" max="220" step="10" value="${config.longDist}">
      <span class="threshold-val" id="thresh-val">${config.longDist}px</span>
    </div>
    <div class="threshold-hint">
      Short swipe (&lt; threshold) → New tab &nbsp;|&nbsp; Long swipe (≥ threshold) → Current tab
    </div>
  `;
  settingsBody.appendChild(threshCard);

  const slider  = threshCard.querySelector('#thresh-slider');
  const valSpan = threshCard.querySelector('#thresh-val');
  slider.addEventListener('input', () => { valSpan.textContent = slider.value + 'px'; });

  /* ── 履歴セクション ── */
  const secHist = document.createElement('div');
  secHist.className = 'settings-section-title';
  secHist.textContent = 'History';
  settingsBody.appendChild(secHist);

  const histCard = document.createElement('div');
  histCard.className = 'slot-card';
  const h = loadHistory();
  histCard.innerHTML = `
    <div class="field-label">${h.length} recent items</div>
    <div style="font-size:9px;color:rgba(0,243,255,.3);letter-spacing:.1em;line-height:1.8;">
      ${h.map(x => `${x.icon || '◉'} ${x.label || x.url}`).join('<br>') || '(empty)'}
    </div>
  `;
  settingsBody.appendChild(histCard);

  const clearBtn = document.createElement('button');
  clearBtn.className   = 'hist-clear-btn';
  clearBtn.textContent = '[ Clear History ]';
  clearBtn.addEventListener('click',    () => { clearHistory(); showToast('History cleared'); renderSettingsForm(); });
  clearBtn.addEventListener('touchend', (e) => { e.preventDefault(); clearHistory(); showToast('History cleared'); renderSettingsForm(); });
  settingsBody.appendChild(clearBtn);

  /* ── スロット設定セクション ── */
  const secSlots = document.createElement('div');
  secSlots.className = 'settings-section-title';
  secSlots.textContent = 'Slots';
  settingsBody.appendChild(secSlots);

  DIRECTIONS.forEach((dir, i) => {
    const slot = slots[i];
    const card = document.createElement('div');
    card.className = 'slot-card';
    card.innerHTML = `
      <div class="slot-header">
        <span class="slot-dir-badge">${dir.arrow}</span>
        <span class="slot-dir-name">${dir.label}</span>
      </div>
      <div class="field-group">
        <label class="field-label">Icon / Label</label>
        <div class="field-row">
          <input class="field-input icon-input" data-idx="${i}" data-field="icon"
            type="text" maxlength="2" value="${slot.icon || ''}" placeholder="✦">
          <input class="field-input" data-idx="${i}" data-field="label"
            type="text" maxlength="12" value="${slot.label || ''}" placeholder="Label">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">URL</label>
        <input class="field-input" data-idx="${i}" data-field="url"
          type="url" value="${slot.url || ''}" placeholder="https://">
      </div>
    `;
    settingsBody.appendChild(card);
  });

  const saveBtn = document.createElement('button');
  saveBtn.className   = 'settings-save-btn';
  saveBtn.textContent = '[ Save & Close ]';
  saveBtn.addEventListener('click',    saveSettings);
  saveBtn.addEventListener('touchend', (e) => { e.preventDefault(); saveSettings(); });
  settingsBody.appendChild(saveBtn);

  const hint = document.createElement('p');
  hint.className   = 'settings-hint';
  hint.textContent = 'Triple-tap top of screen to reopen';
  settingsBody.appendChild(hint);

  /* スライダー値を config に結びつけるため参照保持 */
  settingsBody._sliderEl = slider;
}

function saveSettings() {
  /* 閾値を保存 */
  const slider = settingsBody._sliderEl;
  if (slider) {
    config.longDist = +slider.value;
  }
  /* 空スロット非表示 */
  const hideChk = document.getElementById('hide-empty-chk');
  if (hideChk) {
    config.hideEmpty = hideChk.checked;
  }
  /* theme は applyTheme 呼び出し時にすでに config.theme に反映済み */
  saveConfig(config);

  /* スロットを保存 */
  settingsBody.querySelectorAll('.field-input').forEach(inp => {
    const idx   = +inp.dataset.idx;
    const field = inp.dataset.field;
    if (['icon','label','url'].includes(field) && !isNaN(idx)) {
      slots[idx][field] = inp.value.trim();
    }
  });
  saveSlots(slots);
  buildMenu();
  closeSettings();
  showToast('Saved');
  vibrate([8, 10, 8]);
}

/* 設定パネル内のタッチが本体に伝播しないようにする */
settingsOverlay.addEventListener('touchstart', e => e.stopPropagation());
settingsOverlay.addEventListener('touchmove',  e => e.stopPropagation());
settingsOverlay.addEventListener('touchend',   e => e.stopPropagation());

</script>
</body>
</html>
