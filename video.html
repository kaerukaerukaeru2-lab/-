<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>思い出再生くん</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');
:root{
  --bg:#1a1a1a;--sur:#242424;--sur2:#2e2e2e;--bdr:#3a3a3a;
  --tx:#f0f0f0;--tx2:#888;
  --acc:#ff6b2b;--acc2:rgba(255,107,43,0.15);
  --neo:#00ffe0;--neo2:rgba(0,255,224,0.1);
  --mono:'Space Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow-x:hidden;}
.hd{padding:.75rem 1rem .5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);}
.logo{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--acc);letter-spacing:.15em;}
.logo span{color:var(--neo);font-size:11px;display:block;letter-spacing:.05em;font-weight:400;}
.version{font-family:var(--mono);font-size:10px;color:var(--tx2);}
.url-wrap{padding:.75rem 1rem .5rem;}
.url-box{display:flex;gap:8px;align-items:center;background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:8px 12px;transition:border-color .2s;margin-bottom:8px;}
.url-box:focus-within{border-color:var(--acc);}
.url-icon{font-size:14px;color:var(--tx2);flex-shrink:0;}
.url-input{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:14px;font-family:var(--sans);}
.url-input::placeholder{color:var(--tx2);}
.btn-play{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--mono);letter-spacing:.05em;transition:all .15s;flex-shrink:0;}
.btn-play:active{transform:scale(0.95);}
.btn-clear{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer;flex-shrink:0;transition:all .15s;}
.btn-clear:hover{border-color:var(--acc);color:var(--acc);}
.file-row{display:flex;gap:8px;align-items:center;}
.btn-file{flex:1;background:var(--sur);border:1px solid var(--bdr);color:var(--tx2);border-radius:12px;padding:10px;font-size:13px;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--sans);}
.btn-file:hover{border-color:var(--neo);color:var(--neo);}
.btn-file:active{transform:scale(0.97);}
.file-name{font-size:11px;color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);}
.video-wrap{position:relative;width:100%;background:#000;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);}
.video-wrap:-webkit-full-screen{width:100vw;height:100vh;}
.video-wrap:-webkit-full-screen video{width:100%;height:100%;max-height:100vh;object-fit:contain;}
.video-wrap:fullscreen{width:100vw;height:100vh;}
.video-wrap:fullscreen video{width:100%;height:100%;max-height:100vh;object-fit:contain;}
/* 動画上オーバーレイ */
.vid-overlay{position:absolute;inset:0;z-index:10;cursor:pointer;touch-action:manipulation;}
.vid-ctrl-panel{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.88));display:none;flex-direction:column;gap:8px;z-index:9999;}
.vid-ctrl-panel.show{display:flex;}
.vid-seek-row{display:flex;align-items:center;gap:6px;}
.vid-time{font-family:var(--mono);font-size:10px;color:#fff;white-space:nowrap;}
.vid-seek{flex:1;accent-color:var(--acc);cursor:pointer;height:3px;}
.vid-btn-row{display:flex;gap:6px;align-items:center;justify-content:center;}
.vid-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:var(--mono);}
.vid-btn.primary{background:rgba(255,107,43,0.6);border-color:var(--acc);}
.vid-spd{font-family:var(--mono);font-size:12px;color:var(--acc);font-weight:700;min-width:36px;text-align:center;}
video{width:100%;max-height:75vw;display:block;object-fit:contain;background:#000;}
@media(orientation:landscape){video{max-height:85vh;width:100%;}}
.no-video{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--tx2);font-size:13px;gap:8px;}
.no-video-icon{font-size:40px;opacity:.3;}
.ctrl{padding:.75rem 1rem;display:flex;flex-direction:column;gap:10px;}
.speed-section{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:.75rem 1rem;}
.speed-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.speed-lbl{font-family:var(--mono);font-size:11px;color:var(--tx2);letter-spacing:.1em;}
.speed-display{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--acc);}
.speed-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.spd{background:var(--sur2);border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:6px 12px;font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .15s;}
.spd.on{background:var(--acc2);border-color:var(--acc);color:var(--acc);font-weight:700;}
.spd:active{transform:scale(0.95);}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-min{font-size:10px;color:var(--tx2);font-family:var(--mono);}
input[type=range]{flex:1;accent-color:var(--acc);cursor:pointer;height:4px;}
.slider-max{font-size:10px;color:var(--tx2);font-family:var(--mono);}
.pb-ctrl{display:flex;gap:8px;align-items:center;}
.btn-ctrl{background:var(--sur);border:1px solid var(--bdr);color:var(--tx);border-radius:10px;padding:10px 0;font-size:13px;cursor:pointer;flex:1;text-align:center;transition:all .15s;font-family:var(--sans);}
.btn-ctrl:active{transform:scale(0.97);}
.btn-ctrl.primary{background:var(--acc2);border-color:var(--acc);color:var(--acc);}
.btn-ctrl.neo{background:var(--neo2);border-color:var(--neo);color:var(--neo);}
.seek-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:.75rem 1rem;}
.seek-lbl{font-family:var(--mono);font-size:10px;color:var(--tx2);margin-bottom:8px;display:flex;justify-content:space-between;}
input[type=range].seek{width:100%;accent-color:var(--neo);cursor:pointer;}
.status{font-family:var(--mono);font-size:10px;color:var(--tx2);text-align:center;padding:.5rem;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--sur2);border:1px solid var(--acc);color:var(--acc);padding:8px 16px;border-radius:8px;font-size:12px;font-family:var(--mono);opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;}
.extra-ctrl{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:.75rem 1rem;}
.extra-lbl{font-family:var(--mono);font-size:11px;color:var(--tx2);letter-spacing:.1em;margin-bottom:8px;}
.extra-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.btn-ex{background:var(--sur2);border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:var(--mono);transition:all .15s;flex:1;text-align:center;}
.btn-ex.on{background:var(--acc2);border-color:var(--acc);color:var(--acc);}
.btn-ex.neo-on{background:var(--neo2);border-color:var(--neo);color:var(--neo);}
.btn-ex:active{transform:scale(0.95);}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.filter-lbl{font-size:11px;color:var(--tx2);font-family:var(--mono);width:52px;flex-shrink:0;}
.filter-val{font-size:11px;color:var(--acc);font-family:var(--mono);width:36px;text-align:right;flex-shrink:0;}
.ab-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.ab-time{font-family:var(--mono);font-size:11px;color:var(--neo);background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;}

/* 全画面オーバーレイコントロール */
.fs-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;}
.fs-overlay.show{opacity:1;pointer-events:all;}
.fs-overlay-bg{position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(transparent,rgba(0,0,0,0.85));pointer-events:none;}
.fs-controls{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.fs-seek-row{display:flex;align-items:center;gap:8px;}
.fs-time{font-family:var(--mono);font-size:11px;color:#fff;white-space:nowrap;}
.fs-seek{flex:1;accent-color:var(--acc);cursor:pointer;height:3px;}
.fs-btn-row{display:flex;gap:8px;align-items:center;justify-content:center;}
.fs-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:var(--mono);backdrop-filter:blur(4px);}
.fs-btn.primary{background:rgba(255,107,43,0.5);border-color:var(--acc);}
.fs-spd{font-family:var(--mono);font-size:13px;color:var(--acc);font-weight:700;min-width:40px;text-align:center;}
/* プレイリスト */
.pl-section{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:.75rem 1rem;}
.pl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.pl-lbl{font-family:var(--mono);font-size:11px;color:var(--tx2);letter-spacing:.1em;}
.pl-counter{font-family:var(--mono);font-size:13px;color:var(--neo);font-weight:700;}
.pl-ctrl{display:flex;gap:6px;}
.btn-pl{background:var(--sur2);border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:var(--mono);transition:all .15s;flex:1;text-align:center;}
.btn-pl:active{transform:scale(0.95);}
.btn-pl.on{background:var(--acc2);border-color:var(--acc);color:var(--acc);}
.pl-repeat{font-family:var(--mono);font-size:11px;color:var(--tx2);cursor:pointer;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:5px 10px;white-space:nowrap;}
.pl-repeat.on{border-color:var(--neo);color:var(--neo);}
.pl-name{font-size:11px;color:var(--tx2);font-family:var(--mono);margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ===== MODE SWITCHER ===== */
.mode-bar{display:flex;gap:0;padding:8px 1rem 0;border-bottom:1px solid var(--bdr);}
.mode-tab{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-family:var(--mono);font-size:12px;padding:6px 0 8px;cursor:pointer;letter-spacing:.05em;transition:all .2s;text-align:center;}
.mode-tab.active-a{color:var(--acc);border-bottom-color:var(--acc);}
.mode-tab.active-b{color:var(--neo);border-bottom-color:var(--neo);}
.mode-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;}
.badge-a{background:var(--acc2);color:var(--acc);}
.badge-b{background:var(--neo2);color:var(--neo);}

/* ===== TYPE-B パネル ===== */
#typeBPanel{display:none;padding:.75rem 1rem .5rem;}
.b-drop{
  border:2px dashed var(--bdr);border-radius:14px;padding:20px 16px;
  text-align:center;cursor:pointer;transition:all .2s;position:relative;
  background:var(--sur);
}
.b-drop:active,.b-drop.dragover{border-color:var(--neo);background:var(--neo2);}
.b-drop-icon{font-size:28px;margin-bottom:6px;}
.b-drop-txt{font-size:13px;color:var(--tx2);font-family:var(--mono);}
.b-drop-sub{font-size:10px;color:var(--tx2);margin-top:4px;opacity:.7;}
#bFileInput{display:none;}
.b-playlist{margin-top:8px;max-height:110px;overflow-y:auto;display:none;}
.b-item{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  border-radius:8px;background:var(--sur);margin-bottom:3px;cursor:pointer;
  border:1px solid transparent;transition:all .15s;
}
.b-item.playing{background:var(--neo2);border-color:var(--neo);}
.b-item-name{flex:1;font-size:11px;font-family:var(--mono);color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-item.playing .b-item-name{color:var(--neo);}
.b-item-del{background:transparent;border:none;color:var(--tx2);font-size:11px;cursor:pointer;flex-shrink:0;padding:2px 4px;}
.b-ctrl{display:flex;gap:6px;margin-top:6px;}
.b-note{font-size:9px;font-family:var(--mono);color:var(--tx2);text-align:center;margin-top:4px;opacity:.6;}
/* Type-B時のステータスバッジ */
.b-status-badge{
  display:inline-block;background:var(--neo2);color:var(--neo);
  border:1px solid var(--neo);border-radius:4px;font-size:9px;
  font-family:var(--mono);padding:1px 6px;margin-left:6px;vertical-align:middle;
}
</style>
</head>
<body>

<div class="hd">
  <div class="logo" style="font-size:14px;">思い出再生くん<span id="modeSubtitle">TYPE-A · IndexedDB永続保存</span></div>
  <div class="version">v2.3</div>
</div>

<!-- モード切替タブ -->
<div class="mode-bar">
  <button class="mode-tab active-a" id="tabA" onclick="switchMode('A')">
    TYPE-A <span class="mode-badge badge-a">DB保存</span>
  </button>
  <button class="mode-tab" id="tabB" onclick="switchMode('B')">
    TYPE-B <span class="mode-badge badge-b">即再生</span>
  </button>
</div>

<!-- TYPE-A パネル -->
<div id="typeAPanel">
<div class="url-wrap">
  <div class="url-box">
    <span class="url-icon">🔗</span>
    <input type="url" class="url-input" id="urlInput" placeholder="動画URLを貼り付け..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn-clear" onclick="clearUrl()">✕</button>
    <button class="btn-play" onclick="loadUrl()">GO</button>
  </div>
  <div class="file-row">
    <button class="btn-file" onclick="document.getElementById('fileInput').click()">📁 動画を保存・追加</button>
    <button class="btn-file" onclick="clearPlaylist()" style="flex:0.4;color:var(--tx2);">🗑 クリア</button>
  </div>
  <input type="file" id="fileInput" accept="video/*,audio/*" style="display:none" onchange="addFile(this)" multiple>
  <div id="dbStatus" style="font-size:10px;font-family:var(--mono);color:var(--tx2);padding:4px 2px;">DB: 初期化中...</div>
  <div id="plList" style="margin-top:6px;display:none;max-height:120px;overflow-y:auto;"></div>
</div>
</div><!-- /#typeAPanel -->

<!-- TYPE-B パネル -->
<div id="typeBPanel">
  <div class="b-drop" id="bDrop" onclick="document.getElementById('bFileInput').click()">
    <div class="b-drop-icon">📂</div>
    <div class="b-drop-txt">タップしてファイルを選択</div>
    <div class="b-drop-sub">保存なし · Blob即再生 · 複数OK</div>
  </div>
  <input type="file" id="bFileInput" accept="video/*,audio/*" multiple onchange="bAddFiles(this)">
  <div class="b-playlist" id="bPlaylist"></div>
  <div class="b-ctrl" id="bCtrl" style="display:none;">
    <button class="btn-file" style="flex:1;" onclick="bClearAll()">🗑 リストクリア</button>
    <button class="btn-file" style="flex:1;border-color:var(--neo);color:var(--neo);" onclick="document.getElementById('bFileInput').click()">＋ 追加</button>
  </div>
  <div class="b-note">※ページを閉じると消えます（保存不要な一時再生用）</div>
</div>

<div class="video-wrap">
  <div class="no-video" id="noVideo">
    <div class="no-video-icon">🎬</div>
    URLまたはファイルを選択
  </div>
  <video id="vid" playsinline webkit-playsinline preload="metadata" style="display:none"
    onloadedmetadata="onLoaded()"
    ontimeupdate="onTimeUpdate()"
    onplay="updatePlayBtn()"
    onpause="updatePlayBtn()"
    onended="onEnded()"
    onerror="onError()">
  </video>
  <!-- 動画上コントロール -->
  <div class="vid-overlay" id="vidOverlay" onclick="toggleVidOverlay()"></div>
  <div class="vid-ctrl-panel" id="vidCtrlPanel" onclick="event.stopPropagation()">
    <div class="vid-seek-row">
      <span class="vid-time" id="voCurTime">0:00</span>
      <input type="range" class="vid-seek" id="voSeekBar" min="0" max="100" value="0" oninput="onSeek(this.value)" ontouchstart="event.stopPropagation()">
      <span class="vid-time" id="voDurTime">0:00</span>
    </div>
    <div class="vid-btn-row">
      <button class="vid-btn" onclick="skip(-10)">-10秒</button>
      <button class="vid-btn" onclick="changeSpeedVo(-0.5)">－</button>
      <span class="vid-spd" id="voSpdDisplay">2.8x</span>
      <button class="vid-btn" onclick="changeSpeedVo(0.5)">＋</button>
      <button class="vid-btn primary" id="voPlayBtn" onclick="togglePlay()">▶</button>
      <button class="vid-btn" onclick="skip(10)">+10秒</button>
      <button class="vid-btn" onclick="toggleMute()" id="voMuteBtn">🔊</button>
      <button class="vid-btn" onclick="exitFullscreen()" style="border-color:var(--acc);color:var(--acc);">✕ 戻る</button>
    </div>
  </div>
</div>

<div class="ctrl">
  <!-- プレイリスト -->
  <div class="pl-section" id="plSection" style="display:none;">
    <div class="pl-top">
      <span class="pl-lbl">PLAYLIST</span>
      <span class="pl-counter" id="plCounter">1 / 1</span>
      <button class="pl-repeat" id="plRepeatBtn" onclick="cycleRepeat()">🔁 全曲</button>
    </div>
    <div class="pl-ctrl">
      <button class="btn-pl" onclick="playPrev()">⏮ 前へ</button>
      <button class="btn-pl" onclick="playNext()">次へ ⏭</button>
    </div>
    <div class="pl-name" id="plName"></div>
  </div>

  <div class="speed-section">
    <div class="speed-top">
      <span class="speed-lbl">SPEED</span>
      <span class="speed-display" id="speedDisplay">2.8x</span>
    </div>
    <div class="speed-btns">
      <button class="spd" data-s="0.5" onclick="setSpeed(0.5,this)">0.5x</button>
      <button class="spd" data-s="1.0" onclick="setSpeed(1.0,this)">1.0x</button>
      <button class="spd" data-s="1.5" onclick="setSpeed(1.5,this)">1.5x</button>
      <button class="spd" data-s="2.0" onclick="setSpeed(2.0,this)">2.0x</button>
      <button class="spd on" data-s="2.8" onclick="setSpeed(2.8,this)">2.8x</button>
      <button class="spd" data-s="4.0" onclick="setSpeed(4.0,this)">4.0x</button>
    </div>
    <div class="slider-row">
      <span class="slider-min">0.5x</span>
      <input type="range" id="speedSlider" min="0.5" max="4.0" step="0.1" value="2.8" oninput="setSpeedSlider(this.value)">
      <span class="slider-max">4.0x</span>
    </div>
  </div>

  <div class="pb-ctrl">
    <button class="btn-ctrl" onclick="skip(-10)">-10秒</button>
    <button class="btn-ctrl primary" id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button class="btn-ctrl" onclick="skip(10)">+10秒</button>
    <button class="btn-ctrl neo" id="muteBtn" onclick="toggleMute()">🔊</button>
    <button class="btn-ctrl" onclick="toggleFullscreen()" id="fsBtn">⛶</button>
  </div>

  <div class="seek-wrap">
    <div class="seek-lbl">
      <span id="curTime">0:00</span>
      <span id="durTime">0:00</span>
    </div>
    <input type="range" class="seek" id="seekBar" min="0" max="100" value="0" oninput="onSeek(this.value)">
  </div>
</div>

<div class="ctrl" style="padding-top:0;">
  <div class="extra-ctrl">
    <div class="extra-lbl">LOOP / FILTER</div>
    <div class="extra-row">
      <button class="btn-ex" id="loopBtn" onclick="toggleLoop()">🔁 ループOFF</button>
      <button class="btn-ex" id="abBtn" onclick="toggleAB()">A-B リピート</button>
      <button class="btn-ex" id="abResetBtn" onclick="resetAB()" style="flex:0.5;">リセット</button>
    </div>
    <div class="ab-row" id="abDisplay" style="margin-bottom:8px;display:none;">
      <span class="ab-time" id="abATime">A: --</span>
      <span style="color:var(--tx2);font-size:12px;">→</span>
      <span class="ab-time" id="abBTime">B: --</span>
      <span style="font-size:11px;color:var(--tx2);">再生中にA→Bをタップ</span>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">明るさ</span>
      <input type="range" style="flex:1;accent-color:var(--acc);" min="50" max="150" step="5" value="100" oninput="updateFilter('brightness',this.value)">
      <span class="filter-val" id="brightVal">100%</span>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">コントラスト</span>
      <input type="range" style="flex:1;accent-color:var(--neo);" min="50" max="150" step="5" value="100" oninput="updateFilter('contrast',this.value)">
      <span class="filter-val" id="contrastVal">100%</span>
    </div>
  </div>
</div>
<div class="status" id="status">待機中</div>
<div class="toast" id="toast"></div>

<script>
var vid=document.getElementById('vid');
var curSpeed=2.8,isMuted=false;

// =============================================
// IndexedDB レイヤー
// DB: omoide_player_v1
//   ストア "videos" : メタデータ { id, name, size, type, addedAt }
//   ストア "blobs"  : バイナリ   { id, data: ArrayBuffer }
// id は両ストアで共通 (videos.id === blobs.id)
// 将来の編集機能: videos に duration/trim情報を追加するだけで対応可
// =============================================
var DB_NAME='omoide_player_v1', DB_VER=1;
var db=null;

function openDB(){
  return new Promise(function(resolve,reject){
    var req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=function(e){
      var d=e.target.result;
      if(!d.objectStoreNames.contains('videos')){
        var vs=d.createObjectStore('videos',{keyPath:'id'});
        vs.createIndex('addedAt','addedAt',{unique:false});
      }
      if(!d.objectStoreNames.contains('blobs')){
        d.createObjectStore('blobs',{keyPath:'id'});
      }
    };
    req.onsuccess=function(e){db=e.target.result;resolve(db);};
    req.onerror=function(){reject(req.error);};
  });
}

// 動画を保存（メタデータ + バイナリを分離して保存）
function saveVideoToDB(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(e){
      var id=Date.now()+'_'+Math.random().toString(36).slice(2,7);
      var meta={id:id,name:file.name,size:file.size,type:file.type,addedAt:Date.now()};
      var tx=db.transaction(['videos','blobs'],'readwrite');
      tx.objectStore('videos').put(meta);
      tx.objectStore('blobs').put({id:id,data:e.target.result});
      tx.oncomplete=function(){resolve(meta);};
      tx.onerror=function(){reject(tx.error);};
    };
    reader.onerror=function(){reject(reader.error);};
    reader.readAsArrayBuffer(file);
  });
}

// メタデータ一覧取得（addedAt昇順）
function getAllMeta(){
  return new Promise(function(resolve,reject){
    var tx=db.transaction('videos','readonly');
    var req=tx.objectStore('videos').index('addedAt').getAll();
    req.onsuccess=function(){resolve(req.result);};
    req.onerror=function(){reject(req.error);};
  });
}

// バイナリ取得 → ObjectURL生成
function getBlobUrl(id,type){
  return new Promise(function(resolve,reject){
    var tx=db.transaction('blobs','readonly');
    var req=tx.objectStore('blobs').get(id);
    req.onsuccess=function(){
      if(!req.result){reject(new Error('blob not found'));return;}
      var blob=new Blob([req.result.data],{type:type||'video/mp4'});
      resolve(URL.createObjectURL(blob));
    };
    req.onerror=function(){reject(req.error);};
  });
}

// 動画削除（メタ + バイナリ両方）
function deleteVideoFromDB(id){
  return new Promise(function(resolve,reject){
    var tx=db.transaction(['videos','blobs'],'readwrite');
    tx.objectStore('videos').delete(id);
    tx.objectStore('blobs').delete(id);
    tx.oncomplete=resolve;
    tx.onerror=function(){reject(tx.error);};
  });
}

// DB使用量を概算表示
function updateDbStatus(){
  getAllMeta().then(function(metas){
    var total=metas.reduce(function(s,m){return s+m.size;},0);
    var mb=(total/1024/1024).toFixed(1);
    document.getElementById('dbStatus').textContent=
      'DB: '+metas.length+'件 / 約'+mb+'MB保存済 (IndexedDB)';
  });
}

// =============================================
// プレイリスト（メモリ上はメタデータのみ保持）
// playlist: [ { id, name, size, type, addedAt } ]
// 再生時にgetBlobUrl()でObjectURLを都度生成
// =============================================
var playlist=[];
var plIdx=0;
var repeatMode=1;
var repeatLabels=['🔂 なし','🔁 全曲','🔂 1曲'];
var currentBlobUrl=null; // 再生中のObjectURL（再生後revoke）

// 起動時: DBからメタデータを復元してプレイリストに積む
function loadFromDB(){
  getAllMeta().then(function(metas){
    playlist=metas;
    plIdx=0;
    updatePlUI();
    updateDbStatus();
    if(playlist.length>0)setStatus('DB: '+playlist.length+'件の動画があります');
    else setStatus('待機中 — 動画を追加してください');
  }).catch(function(e){
    setStatus('DB読み込みエラー: '+e.message);
  });
}

function addFile(input){
  var files=Array.from(input.files);
  if(!files.length)return;
  input.value='';
  setStatus('保存中... (0/'+files.length+')');

  var done=0;
  var saves=files.map(function(file,i){
    return saveVideoToDB(file).then(function(meta){
      done++;
      setStatus('保存中... ('+done+'/'+files.length+')');
      return meta;
    });
  });

  Promise.all(saves).then(function(metas){
    metas.forEach(function(m){playlist.push(m);});
    updatePlUI();
    updateDbStatus();
    if(playlist.length===metas.length){
      // 初回追加なら即再生
      playAtIdx(0);
    } else {
      toast(files.length+'件を保存しました (IndexedDB)');
      setStatus('保存完了');
    }
  }).catch(function(e){
    toast('保存エラー: '+e.message);
    setStatus('エラー');
  });
}

function clearPlaylist(){
  // DBからも全削除
  var deletes=playlist.map(function(p){return deleteVideoFromDB(p.id);});
  Promise.all(deletes).then(function(){
    playlist=[];plIdx=0;
    revokeCurrent();
    vid.pause();vid.src='';
    vid.style.display='none';
    document.getElementById('noVideo').style.display='flex';
    updatePlUI();
    updateDbStatus();
    toast('全動画をDBから削除しました');
  }).catch(function(e){toast('削除エラー: '+e.message);});
}

function revokeCurrent(){
  if(currentBlobUrl){URL.revokeObjectURL(currentBlobUrl);currentBlobUrl=null;}
}

function playAtIdx(idx){
  if(!playlist.length)return;
  plIdx=idx;
  var p=playlist[plIdx];
  updatePlUI();
  setStatus('読み込み中: '+p.name);

  revokeCurrent(); // 前のObjectURLを解放

  getBlobUrl(p.id,p.type).then(function(url){
    currentBlobUrl=url;
    document.getElementById('noVideo').style.display='none';
    vid.style.display='block';
    document.getElementById('vidOverlay').style.display='block';
    vid.src=url;
    vid.playbackRate=curSpeed;
    vid.play().catch(function(){toast('再生できませんでした');});
    setStatus(p.name+' ('+(plIdx+1)+'/'+playlist.length+')');
  }).catch(function(e){
    toast('読み込みエラー: '+e.message);
    setStatus('エラー');
  });
}

function updatePlUI(){
  var sec=document.getElementById('plSection');
  var listEl=document.getElementById('plList');
  if(playlist.length>0){
    sec.style.display=playlist.length>1?'block':'none';
    document.getElementById('plCounter').textContent=(plIdx+1)+' / '+playlist.length;
    document.getElementById('plName').textContent=playlist[plIdx]?playlist[plIdx].name:'';
    listEl.style.display='block';
    listEl.innerHTML=playlist.map(function(p,i){
      var mb=(p.size/1024/1024).toFixed(1);
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;background:'+(i===plIdx?'var(--acc2)':'var(--sur2)')+';margin-bottom:3px;">'
        +'<span style="font-family:var(--mono);font-size:10px;color:'+(i===plIdx?'var(--acc)':'var(--tx2)')+';cursor:pointer;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" onclick="playAtIdx('+i+')">'
        +(i===plIdx?'▶ ':'')+p.name+' <span style="color:var(--tx2);">'+mb+'MB</span></span>'
        +'<button onclick="removeTrack('+i+')" style="background:transparent;border:none;color:var(--tx2);font-size:11px;cursor:pointer;flex-shrink:0;">✕</button>'
        +'</div>';
    }).join('');
  } else {
    sec.style.display='none';
    listEl.style.display='none';
    listEl.innerHTML='';
  }
}

function removeTrack(i){
  var p=playlist[i];
  deleteVideoFromDB(p.id).then(function(){
    playlist.splice(i,1);
    if(plIdx>=playlist.length)plIdx=Math.max(0,playlist.length-1);
    if(i===plIdx||playlist.length===0){
      revokeCurrent();
      if(playlist.length>0)playAtIdx(plIdx);
      else{vid.pause();vid.src='';vid.style.display='none';document.getElementById('noVideo').style.display='flex';}
    }
    updatePlUI();
    updateDbStatus();
    toast(p.name+' を削除しました');
  }).catch(function(e){toast('削除エラー: '+e.message);});
}

function playNext(){
  if(!playlist.length)return;
  var next=plIdx+1;
  if(next>=playlist.length){if(repeatMode===1)next=0;else return;}
  playAtIdx(next);
}
function playPrev(){
  if(!playlist.length)return;
  var prev=plIdx-1;
  if(prev<0)prev=playlist.length-1;
  playAtIdx(prev);
}

function onEnded(){
  if(repeatMode===2){vid.currentTime=0;vid.play();return;}
  if(repeatMode===1){playAtIdx((plIdx+1)%playlist.length);return;}
  if(plIdx+1<playlist.length)playAtIdx(plIdx+1);
}

function cycleRepeat(){
  repeatMode=(repeatMode+1)%3;
  var btn=document.getElementById('plRepeatBtn');
  btn.textContent=repeatLabels[repeatMode];
  btn.className=repeatMode>0?'pl-repeat on':'pl-repeat';
  toast(repeatLabels[repeatMode]);
}

// =============================================
// URL再生（URLはDBに保存せず一時再生）
// =============================================
function clearUrl(){document.getElementById('urlInput').value='';document.getElementById('urlInput').focus();}

function loadUrl(){
  var url=document.getElementById('urlInput').value.trim();
  if(!url){toast('URLを入力してください');return;}
  if(/youtube\.com|youtu\.be/.test(url)){toast('YouTube対応は準備中');return;}
  if(/twitter\.com|x\.com/.test(url)){toast('X/Twitter対応は準備中');return;}
  if(/drive\.google\.com/.test(url)){var m=url.match(/\/d\/([^\/]+)/);if(m)url='https://drive.google.com/uc?export=download&id='+m[1];}
  revokeCurrent();
  document.getElementById('noVideo').style.display='none';
  vid.style.display='block';
  vid.src=url;vid.playbackRate=curSpeed;
  vid.play().catch(function(){toast('再生できませんでした');});
  setStatus('再生中 URL');
}

function onLoaded(){
  vid.playbackRate=curSpeed;
  document.getElementById('durTime').textContent=fmtTime(vid.duration);
  document.getElementById('seekBar').max=Math.floor(vid.duration);
}
function onTimeUpdate(){
  if(!vid.duration)return;
  var t=fmtTime(vid.currentTime);
  document.getElementById('curTime').textContent=t;
  document.getElementById('seekBar').value=Math.floor(vid.currentTime);
  // 動画オーバーレイ同期
  document.getElementById('voCurTime').textContent=t;
  document.getElementById('voSeekBar').value=Math.floor(vid.currentTime);
  document.getElementById('voSeekBar').max=Math.floor(vid.duration||0);
  document.getElementById('voDurTime').textContent=fmtTime(vid.duration);
  document.getElementById('voPlayBtn').textContent=vid.paused?'▶':'⏸';
  document.getElementById('voMuteBtn').textContent=isMuted?'🔇':'🔊';
  document.getElementById('voSpdDisplay').textContent=curSpeed.toFixed(1)+'x';
}
function onError(){toast('動画を読み込めませんでした');setStatus('エラー');}
function togglePlay(){if(vid.paused)vid.play();else vid.pause();}
function updatePlayBtn(){document.getElementById('playBtn').textContent=vid.paused?'▶ 再生':'⏸ 停止';}
function skip(sec){vid.currentTime=Math.max(0,Math.min(vid.duration||0,vid.currentTime+sec));}
function onSeek(v){vid.currentTime=parseFloat(v);}
function toggleMute(){isMuted=!isMuted;vid.muted=isMuted;document.getElementById('muteBtn').textContent=isMuted?'🔇':'🔊';}
function setSpeed(s,el){
  curSpeed=s;vid.playbackRate=s;
  document.getElementById('speedDisplay').textContent=s+'x';
  document.getElementById('speedSlider').value=s;
  document.querySelectorAll('.spd').forEach(function(b){b.classList.remove('on');});
  if(el)el.classList.add('on');
  toast(s+'x に設定');
}
function setSpeedSlider(v){
  var s=parseFloat(parseFloat(v).toFixed(1));
  curSpeed=s;vid.playbackRate=s;
  document.getElementById('speedDisplay').textContent=s+'x';
  document.querySelectorAll('.spd').forEach(function(b){b.classList.toggle('on',parseFloat(b.dataset.s)===s);});
}
function exitFullscreen(){
  if(document.exitFullscreen)document.exitFullscreen();
  else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
  document.getElementById('fsBtn').textContent='⛶';
  document.getElementById('vidCtrlPanel').classList.remove('show');
}
function toggleFullscreen(){
  var el=document.getElementById('vid');
  if(!el.src&&!el.currentSrc){toast('先に動画を選択してください');return;}
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    var wrap=document.querySelector('.video-wrap');
    if(wrap.requestFullscreen)wrap.requestFullscreen();
    else if(wrap.webkitRequestFullscreen)wrap.webkitRequestFullscreen();
    else if(el.webkitEnterFullscreen)el.webkitEnterFullscreen();
    document.getElementById('fsBtn').textContent='✕';
  }else{
    if(document.exitFullscreen)document.exitFullscreen();
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
    document.getElementById('fsBtn').textContent='⛶';
  }
}
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement)document.getElementById('fsBtn').textContent='⛶';
});
document.addEventListener('webkitfullscreenchange',function(){
  if(!document.webkitFullscreenElement)document.getElementById('fsBtn').textContent='⛶';
});

function fmtTime(s){if(isNaN(s))return '0:00';var m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function setStatus(msg){document.getElementById('status').textContent=msg;}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(function(){el.classList.remove('on');},2000);}
// =============================================
// 動画オーバーレイコントロール
// =============================================
var voTimer=null;
function toggleVidOverlay(){
  var panel=document.getElementById('vidCtrlPanel');
  if(panel.classList.contains('show')){
    panel.classList.remove('show');
  }else{
    panel.classList.add('show');
    clearTimeout(voTimer);
    voTimer=setTimeout(function(){panel.classList.remove('show');},4000);
  }
}
function changeSpeedVo(delta){
  var s=Math.round((curSpeed+delta)*10)/10;
  s=Math.max(0.5,Math.min(4.0,s));
  setSpeed(s,null);
  document.getElementById('voSpdDisplay').textContent=s.toFixed(1)+'x';
}

// =============================================
// 起動: IndexedDB を開いてから既存動画を復元
// =============================================
openDB().then(function(){
  document.getElementById('dbStatus').textContent='DB: 接続済';
  loadFromDB();
}).catch(function(e){
  document.getElementById('dbStatus').textContent='DB: エラー — '+e.message;
  setStatus('IndexedDB初期化失敗');
});

document.getElementById('urlInput').addEventListener('keydown',function(e){if(e.key==='Enter')loadUrl();});

var isLoop=false;
function toggleLoop(){
  isLoop=!isLoop;vid.loop=isLoop;
  var btn=document.getElementById('loopBtn');
  btn.textContent=isLoop?'🔁 ループON':'🔁 ループOFF';
  btn.className=isLoop?'btn-ex on':'btn-ex';
  toast(isLoop?'ループON':'ループOFF');
}

var abMode=false,abA=null,abB=null,abInterval=null;
function toggleAB(){
  if(!abMode){
    abMode=true;abA=null;abB=null;
    document.getElementById('abBtn').className='btn-ex neo-on';
    document.getElementById('abBtn').textContent='A点をタップ';
    document.getElementById('abDisplay').style.display='flex';
    document.getElementById('abATime').textContent='A: --';
    document.getElementById('abBTime').textContent='B: --';
    toast('A-Bリピート ON');
  } else if(abA===null){
    abA=vid.currentTime;
    document.getElementById('abATime').textContent='A: '+fmtTime(abA);
    document.getElementById('abBtn').textContent='B点をタップ';
    toast('A点設定: '+fmtTime(abA));
  } else if(abB===null){
    abB=vid.currentTime;
    if(abB<=abA){toast('B点はA点より後にしてください');return;}
    document.getElementById('abBTime').textContent='B: '+fmtTime(abB);
    document.getElementById('abBtn').textContent='A-B再生中';
    vid.currentTime=abA;
    if(abInterval)clearInterval(abInterval);
    abInterval=setInterval(function(){if(vid.currentTime>=abB)vid.currentTime=abA;},200);
    toast('A-Bリピート開始');
  }
}
function resetAB(){
  abMode=false;abA=null;abB=null;
  if(abInterval){clearInterval(abInterval);abInterval=null;}
  document.getElementById('abBtn').className='btn-ex';
  document.getElementById('abBtn').textContent='A-B リピート';
  document.getElementById('abDisplay').style.display='none';
  toast('A-Bリセット');
}

var brightness=100,contrast=100;
function updateFilter(type,v){
  if(type==='brightness'){brightness=parseInt(v);document.getElementById('brightVal').textContent=v+'%';}
  else{contrast=parseInt(v);document.getElementById('contrastVal').textContent=v+'%';}
  vid.style.filter='brightness('+brightness+'%) contrast('+contrast+'%)';
}

// =============================================
// モード切替 (Type-A / Type-B)
// =============================================
var currentMode='A';

function switchMode(mode){
  currentMode=mode;
  var tabA=document.getElementById('tabA');
  var tabB=document.getElementById('tabB');
  var panelA=document.getElementById('typeAPanel');
  var panelB=document.getElementById('typeBPanel');
  var subtitle=document.getElementById('modeSubtitle');

  if(mode==='A'){
    tabA.className='mode-tab active-a';
    tabB.className='mode-tab';
    panelA.style.display='block';
    panelB.style.display='none';
    subtitle.textContent='TYPE-A · IndexedDB永続保存';
    // Type-B再生中なら停止・解放
    if(bCurrentUrl){
      vid.pause();
      URL.revokeObjectURL(bCurrentUrl);
      bCurrentUrl=null;
    }
    // Type-Aの状態復元
    if(playlist.length>0){
      vid.style.display='block';
      document.getElementById('noVideo').style.display='none';
      document.getElementById('vidOverlay').style.display='block';
    }
  } else {
    tabA.className='mode-tab';
    tabB.className='mode-tab active-b';
    panelA.style.display='none';
    panelB.style.display='block';
    subtitle.textContent='TYPE-B · Blob即再生（一時）';
    // Type-A再生中なら停止（revoke不要 – IndexedDB管理）
    if(!vid.paused) vid.pause();
    // Type-Bのリストがあれば再生状態を復元
    if(bList.length>0){
      vid.style.display='block';
      document.getElementById('noVideo').style.display='none';
      document.getElementById('vidOverlay').style.display='block';
    } else {
      vid.style.display='none';
      document.getElementById('noVideo').style.display='flex';
      document.getElementById('vidOverlay').style.display='none';
    }
  }
}

// =============================================
// TYPE-B ロジック
// =============================================
// bList: [{ name, file, blobUrl }]  ← File参照を保持することでページ内は即再生可
var bList=[];
var bIdx=0;
var bCurrentUrl=null;

function bAddFiles(input){
  var files=Array.from(input.files);
  if(!files.length)return;
  input.value='';
  files.forEach(function(f){
    // 同名ファイルの重複チェック（軽量）
    var dup=bList.some(function(b){return b.name===f.name&&b.file.size===f.size;});
    if(!dup) bList.push({name:f.name,file:f,blobUrl:null});
  });
  bUpdateUI();
  // 初回追加なら即先頭再生
  if(bList.length===files.length) bPlayAt(0);
  else toast(files.length+'件を追加');
}

function bPlayAt(idx){
  if(!bList.length)return;
  bIdx=Math.max(0,Math.min(idx,bList.length-1));

  // 前のBlobUrl解放
  if(bCurrentUrl){URL.revokeObjectURL(bCurrentUrl);bCurrentUrl=null;}

  var item=bList[bIdx];
  bCurrentUrl=URL.createObjectURL(item.file);
  item.blobUrl=bCurrentUrl; // 参照保持（UIのみ用）

  document.getElementById('noVideo').style.display='none';
  vid.style.display='block';
  document.getElementById('vidOverlay').style.display='block';
  vid.src=bCurrentUrl;
  vid.playbackRate=curSpeed;
  vid.play().catch(function(){toast('再生できませんでした');});
  setStatus('[TYPE-B] '+item.name+' ('+(bIdx+1)+'/'+bList.length+')');
  bUpdateUI();
}

function bClearAll(){
  if(bCurrentUrl){URL.revokeObjectURL(bCurrentUrl);bCurrentUrl=null;}
  bList=[];bIdx=0;
  vid.pause();vid.src='';
  vid.style.display='none';
  document.getElementById('noVideo').style.display='flex';
  document.getElementById('vidOverlay').style.display='none';
  bUpdateUI();
  toast('Type-Bリストをクリアしました');
}

function bRemove(i){
  if(i===bIdx&&bCurrentUrl){URL.revokeObjectURL(bCurrentUrl);bCurrentUrl=null;}
  bList.splice(i,1);
  if(!bList.length){bClearAll();return;}
  if(bIdx>=bList.length)bIdx=bList.length-1;
  if(i===bIdx)bPlayAt(bIdx);
  else bUpdateUI();
}

function bUpdateUI(){
  var pl=document.getElementById('bPlaylist');
  var ctrl=document.getElementById('bCtrl');
  if(!bList.length){pl.style.display='none';ctrl.style.display='none';return;}
  pl.style.display='block';
  ctrl.style.display='flex';
  pl.innerHTML=bList.map(function(b,i){
    var active=i===bIdx;
    return '<div class="b-item'+(active?' playing':'')+'" onclick="bPlayAt('+i+')">'
      +'<span style="font-family:var(--mono);font-size:10px;color:'+(active?'var(--neo)':'var(--tx2)')+';">'+('0'+(i+1)).slice(-2)+'</span>'
      +'<span class="b-item-name">'+(active?'▶ ':'')+b.name+'</span>'
      +'<button class="b-item-del" onclick="event.stopPropagation();bRemove('+i+')">✕</button>'
      +'</div>';
  }).join('');
}

// Type-B 終了時に前・次を上書き（onEndedも対応）
var _origOnEnded=window.onEnded;
function onEnded(){
  if(currentMode==='B'){
    // Type-B: repeatMode準拠
    if(repeatMode===2){vid.currentTime=0;vid.play();return;}
    var next=bIdx+1;
    if(next<bList.length)bPlayAt(next);
    else if(repeatMode===1)bPlayAt(0);
    return;
  }
  // Type-A
  if(repeatMode===2){vid.currentTime=0;vid.play();return;}
  if(repeatMode===1){playAtIdx((plIdx+1)%playlist.length);return;}
  if(plIdx+1<playlist.length)playAtIdx(plIdx+1);
}

// Type-Bドラッグ&ドロップ（Android Chromeでは動作しないが念のため）
(function(){
  var drop=document.getElementById('bDrop');
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('dragover');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('dragover');});
  drop.addEventListener('drop',function(e){
    e.preventDefault();drop.classList.remove('dragover');
    var files=Array.from(e.dataTransfer.files).filter(function(f){return f.type.startsWith('video/')||f.type.startsWith('audio/');});
    if(!files.length)return;
    files.forEach(function(f){bList.push({name:f.name,file:f,blobUrl:null});});
    bUpdateUI();
    if(bList.length===files.length)bPlayAt(0);
  });
})();

// ページ離脱時にType-BのBlobUrlを解放
window.addEventListener('pagehide',function(){
  if(bCurrentUrl)URL.revokeObjectURL(bCurrentUrl);
});
</script>
