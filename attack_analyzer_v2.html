<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ATTACK ANALYZER v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
:root{
  --bg:#0a0a0f;--sur:#0f0f1a;--sur2:#1a1a2e;
  --red:#ff2244;--red2:rgba(255,34,68,0.15);
  --cy:#00ffcc;--cy2:rgba(0,255,204,0.12);
  --am:#ffaa00;--am2:rgba(255,170,0,0.15);
  --pu:#cc44ff;--pu2:rgba(204,68,255,0.12);
  --tx:#f0f0f0;--tx2:#888;
  --mono:'Space Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

/* 背景画像 */
.page-bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0.18;pointer-events:none;transition:background-image .3s;}

/* ===== UPLOAD PAGE ===== */
#page-upload{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;position:relative;z-index:1;}
.up-title{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--red);margin-bottom:.3rem;text-align:center;}
.up-main{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--tx);letter-spacing:.1em;text-align:center;margin-bottom:.2rem;}
.up-sub{font-size:11px;color:var(--tx2);margin-bottom:1rem;text-align:center;font-family:var(--mono);}

/* キャラ選択 */
.chara-row{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap;justify-content:center;}
.chara-card{width:72px;cursor:pointer;border-radius:12px;border:2px solid #333;background:var(--sur);padding:6px;text-align:center;transition:all .2s;position:relative;}
.chara-card.on{border-color:var(--red);box-shadow:0 0 15px var(--red2);}
.chara-img{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 4px;}
.chara-img img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.chara-name{font-family:var(--mono);font-size:9px;color:var(--tx2);}
.chara-card.on .chara-name{color:var(--red);}
.chara-edit{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);border:none;color:var(--tx2);border-radius:4px;font-size:9px;padding:1px 4px;cursor:pointer;}

/* アップロードゾーン */
.up-zone{width:100%;max-width:320px;aspect-ratio:1;border:2px dashed #333;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative;background:var(--sur);overflow:hidden;}
.up-zone:hover,.up-zone.drag{border-color:var(--red);background:var(--red2);}
.up-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.up-icon{font-size:40px;margin-bottom:10px;opacity:.4;}
.up-txt{font-size:12px;color:var(--tx2);font-family:var(--mono);}
.up-preview{width:100%;height:100%;object-fit:cover;border-radius:18px;}
.up-btn{margin-top:1.2rem;background:var(--red);color:#fff;border:none;border-radius:12px;padding:12px 36px;font-size:14px;font-weight:700;font-family:var(--mono);cursor:pointer;letter-spacing:.1em;transition:all .2s;display:none;}
.up-btn.show{display:block;}
.up-btn:active{transform:scale(0.97);}

/* BGM */
.bgm-bar{display:flex;align-items:center;gap:8px;margin-top:1rem;background:var(--sur);border:1px solid #222;border-radius:10px;padding:8px 12px;width:100%;max-width:320px;}
.bgm-lbl{font-family:var(--mono);font-size:9px;color:var(--tx2);white-space:nowrap;}
.bgm-file{display:none;}
.bgm-pick{background:transparent;border:1px solid #333;color:var(--tx2);border-radius:6px;padding:3px 8px;font-size:10px;font-family:var(--mono);cursor:pointer;white-space:nowrap;}
.bgm-pick:hover{border-color:var(--cy);color:var(--cy);}
.bgm-name{flex:1;font-size:10px;color:var(--tx2);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bgm-vol{width:60px;accent-color:var(--cy);}
.bgm-stop{background:transparent;border:none;color:var(--tx2);font-size:12px;cursor:pointer;padding:0 4px;}


/* バトル演出 */
.battle-flash{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;}
@keyframes flashWhite{0%{opacity:0;}20%{opacity:0.9;}100%{opacity:0;}}
@keyframes flashRed{0%{opacity:0;}15%{opacity:0.7;}100%{opacity:0;}}
@keyframes shake{0%,100%{transform:translate(0,0);}10%{transform:translate(-8px,4px);}20%{transform:translate(8px,-4px);}30%{transform:translate(-6px,6px);}40%{transform:translate(6px,-2px);}50%{transform:translate(-4px,4px);}60%{transform:translate(4px,-6px);}70%{transform:translate(-6px,2px);}80%{transform:translate(4px,4px);}90%{transform:translate(-2px,-4px);}}
/* ===== SCAN PAGE ===== */
#page-scan{display:none;position:fixed;inset:0;background:#000;z-index:100;overflow:hidden;flex-direction:column;align-items:center;justify-content:center;}
/* カードデザイン */
.scan-card{position:relative;width:72vw;max-width:300px;aspect-ratio:0.65;border-radius:20px;overflow:hidden;box-shadow:0 0 40px var(--red),0 0 0 3px var(--red);animation:cardPulse 1.5s infinite;flex-shrink:0;}
@keyframes cardPulse{0%,100%{box-shadow:0 0 30px var(--red),0 0 0 3px var(--red);}50%{box-shadow:0 0 60px var(--red),0 0 0 5px #ff6688;}}
.scan-img{width:100%;height:100%;object-fit:cover;opacity:1;filter:none;}
.scan-card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(255,34,68,0.25) 0%,transparent 50%,rgba(255,34,68,0.1) 100%);pointer-events:none;z-index:2;}
.scan-overlay{position:absolute;inset:0;pointer-events:none;z-index:3;}
.grid-h,.grid-v{position:absolute;background:var(--red);opacity:0;}
.grid-h{left:0;right:0;height:1px;}
.grid-v{top:0;bottom:0;width:1px;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(transparent,var(--red),transparent);box-shadow:0 0 15px var(--red);top:-5px;}
.target-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border:2px solid var(--red);opacity:0;}
.target-box::before,.target-box::after{content:'';position:absolute;border-color:var(--red);border-style:solid;}
.target-box::before{top:-2px;left:-2px;width:20px;height:20px;border-width:2px 0 0 2px;}
.target-box::after{bottom:-2px;right:-2px;width:20px;height:20px;border-width:0 2px 2px 0;}
/* キャラ表示 */
.scan-chara{position:absolute;bottom:12px;right:10px;width:56px;height:56px;border-radius:50%;border:2px solid var(--red);overflow:hidden;opacity:0;box-shadow:0 0 12px var(--red2);z-index:4;}
.scan-chara img{width:100%;height:100%;object-fit:cover;}
.scan-chara-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--sur2);}
/* テキストエリア（カードの下） */
.scan-text{width:72vw;max-width:300px;padding:.8rem 0 0;}
.scan-log{font-family:var(--mono);font-size:10px;color:var(--red);margin-bottom:3px;opacity:0;letter-spacing:.05em;}
.scan-pct{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--tx);letter-spacing:.1em;opacity:0;}
.scan-bar-wrap{width:100%;height:4px;background:#222;border-radius:2px;margin-top:6px;overflow:hidden;}
.scan-bar{height:100%;background:var(--red);width:0%;transition:width .1s linear;box-shadow:0 0 8px var(--red);}

/* ===== RESULT PAGE ===== */
#page-result{display:none;min-height:100vh;padding:1.5rem 1rem 3rem;position:relative;z-index:1;}
.res-header{text-align:center;margin-bottom:1.2rem;}
.res-title{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--red);margin-bottom:.2rem;}
.res-name{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--tx);letter-spacing:.1em;}

/* キャラ＋ランク別画像 */
.res-chara-wrap{position:relative;width:160px;margin:0 auto 1.5rem;}
.res-chara-img{width:160px;height:220px;border-radius:16px;border:3px solid var(--red);overflow:hidden;box-shadow:0 0 40px var(--red2);position:relative;}
.res-chara-img::before{content:'';position:absolute;inset:0;border-radius:16px;background:linear-gradient(135deg,rgba(255,34,68,0.2) 0%,transparent 60%);z-index:1;pointer-events:none;}
.res-chara-img img{width:100%;height:100%;object-fit:cover;}
.res-chara-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--sur2);}
.res-rank-badge{position:absolute;top:8px;right:8px;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;border:2px solid rgba(0,0,0,0.5);z-index:2;}

/* Momoコメント */
.momo-box{background:var(--sur2);border:1px solid #2a2a3a;border-left:3px solid var(--red);border-radius:12px;padding:.9rem 1rem;margin-bottom:1.2rem;position:relative;}
.momo-lbl{font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:.1em;margin-bottom:.3rem;}
.momo-txt{font-size:14px;line-height:1.7;color:var(--tx);}
.momo-tts{position:absolute;top:8px;right:8px;background:transparent;border:1px solid #333;color:var(--tx2);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:var(--mono);}
.momo-tts:hover{border-color:var(--red);color:var(--red);}

/* ステータス */
.stats-box{display:flex;flex-direction:column;gap:12px;margin-bottom:1.2rem;}
.stat-row{background:var(--sur);border:1px solid #1a1a2e;border-radius:12px;padding:.8rem 1rem;}
.stat-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.stat-name{font-family:var(--mono);font-size:10px;color:var(--tx2);letter-spacing:.1em;}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:700;}
.stat-bar-bg{height:5px;background:#1a1a2e;border-radius:3px;overflow:hidden;}
.stat-bar{height:100%;border-radius:3px;width:0%;transition:width 1s cubic-bezier(.22,1,.36,1);}

/* ランク */
.rank-badge{text-align:center;margin-bottom:1.2rem;}
.rank-lbl{font-family:var(--mono);font-size:9px;color:var(--tx2);letter-spacing:.15em;margin-bottom:.2rem;}
.rank-val{font-family:var(--mono);font-size:44px;font-weight:700;letter-spacing:.05em;}

/* ボタン */
.res-btns{display:flex;gap:10px;}
.btn-retry{flex:1;background:transparent;border:1px solid #333;color:var(--tx2);border-radius:10px;padding:11px;font-size:12px;font-family:var(--mono);cursor:pointer;}
.btn-retry:hover{border-color:var(--red);color:var(--red);}
.btn-share{flex:1;background:var(--red);border:none;color:#fff;border-radius:10px;padding:11px;font-size:12px;font-family:var(--mono);font-weight:700;cursor:pointer;}
.res-voice{display:flex;gap:6px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;}
.vc{background:var(--sur2);border:1px solid #333;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;color:var(--tx2);font-family:var(--mono);transition:all .15s;}
.vc.on{border-color:var(--red);color:var(--red);background:var(--red2);}

/* キャラ画像編集モーダル */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center;padding:1rem;}
.modal-ov.on{display:flex;}
.modal{background:var(--sur);border:1px solid #333;border-radius:16px;padding:1.2rem;width:100%;max-width:380px;}
.modal-ttl{font-family:var(--mono);font-size:12px;color:var(--red);margin-bottom:1rem;letter-spacing:.1em;}
.modal-chara-name{font-size:13px;color:var(--tx);margin-bottom:.8rem;font-family:var(--mono);}
.rank-imgs{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.rank-img-row{display:flex;align-items:center;gap:10px;}
.rank-img-lbl{font-family:var(--mono);font-size:10px;color:var(--tx2);width:36px;}
.rank-img-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--sur2);border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;cursor:pointer;position:relative;}
.rank-img-thumb img{width:100%;height:100%;object-fit:cover;}
.rank-img-inp{display:none;}
.rank-img-txt{font-size:10px;color:var(--tx2);flex:1;}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;}
.btn-modal-cancel{background:transparent;border:1px solid #333;color:var(--tx2);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:var(--mono);}
.btn-modal-ok{background:var(--red);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono);}

/* 背景設定ボタン */
.bg-bar{display:flex;align-items:center;gap:8px;margin-top:.6rem;background:var(--sur);border:1px solid #222;border-radius:10px;padding:7px 12px;width:100%;max-width:320px;}
.bg-file{display:none;}
.bg-pick{background:transparent;border:1px solid #333;color:var(--tx2);border-radius:6px;padding:3px 8px;font-size:10px;font-family:var(--mono);cursor:pointer;}
.bg-pick:hover{border-color:var(--pu);color:var(--pu);}
.bg-name{flex:1;font-size:10px;color:var(--tx2);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bg-clear{background:transparent;border:none;color:var(--tx2);font-size:11px;cursor:pointer;}
</style>
</head>
<body>

<div class="page-bg" id="pageBg"></div>
<div class="battle-flash" id="battleFlash"></div>

<!-- ===== UPLOAD PAGE ===== -->
<div id="page-upload">
  <div class="up-title">◆ COMBAT ANALYSIS SYSTEM ◆</div>
  <div class="up-main">ATTACK ANALYZER</div>
  <div class="up-sub">SELECT CHARACTER</div>

  <!-- キャラ選択 -->
  <div class="chara-row" id="charaRow"></div>

  <div class="up-zone" id="upZone">
    <input type="file" accept="image/*" id="fileInput" onchange="onFile(this)">
    <div class="up-icon">⚔</div>
    <div class="up-txt">TAP TO UPLOAD</div>
    <img class="up-preview" id="upPreview" style="display:none">
  </div>

  <!-- BGM -->
  <div class="bgm-bar">
    <span class="bgm-lbl">BGM</span>
    <input type="file" accept="audio/*" class="bgm-file" id="bgmFile" onchange="onBgm(this)">
    <button class="bgm-pick" onclick="document.getElementById('bgmFile').click()">♪ 選択</button>
    <span class="bgm-name" id="bgmName">未選択</span>
    <input type="range" class="bgm-vol" id="bgmVol" min="0" max="1" step="0.05" value="0.5" oninput="setBgmVol(this.value)">
    <button class="bgm-stop" onclick="toggleBgm()">⏹</button>
  </div>

  <!-- 背景画像 -->
  <div class="bg-bar">
    <span class="bgm-lbl">BG</span>
    <input type="file" accept="image/*" class="bg-file" id="bgFile" onchange="onBgImg(this)">
    <button class="bg-pick" onclick="document.getElementById('bgFile').click()">🖼 背景</button>
    <span class="bg-name" id="bgName">未設定</span>
    <button class="bg-clear" onclick="clearBg()">✕</button>
  </div>

  <button class="up-btn" id="analyzeBtn" onclick="startScan()">▶ ANALYZE</button>
</div>

<!-- ===== SCAN PAGE ===== -->
<div id="page-scan" style="display:none;">
  <div class="scan-card">
    <img class="scan-img" id="scanImg">
    <div class="scan-overlay" id="scanOverlay">
      <div class="target-box" id="targetBox"></div>
      <div class="scan-line" id="scanLine"></div>
      <div class="scan-chara" id="scanChara"></div>
    </div>
  </div>
  <div class="scan-text">
    <div class="scan-log" id="log1">INITIALIZING COMBAT SCANNER...</div>
    <div class="scan-log" id="log2">TARGET LOCKED</div>
    <div class="scan-log" id="log3">ANALYZING POWER LEVEL...</div>
    <div class="scan-log" id="log4">CALCULATING STATS...</div>
    <div class="scan-pct" id="scanPct">0%</div>
    <div class="scan-bar-wrap"><div class="scan-bar" id="scanBar"></div></div>
  </div>
</div>

<!-- ===== RESULT PAGE ===== -->
<div id="page-result">
  <div class="res-header">
    <div class="res-title">◆ ANALYSIS COMPLETE ◆</div>
    <div class="res-name" id="resCharaName">COMBAT DATA</div>
  </div>
  <div class="res-chara-wrap">
    <div class="res-chara-img" id="resCharaImg"></div>
    <div class="res-rank-badge" id="resRankBadge"></div>
  </div>
  <div class="momo-box">
    <div class="momo-lbl" id="momoLbl">COMMENT</div>
    <div class="momo-txt" id="momoTxt"></div>

  </div>
  <div class="stats-box" id="statsBox"></div>
  <div class="rank-badge">
    <div class="rank-lbl">OVERALL RANK</div>
    <div class="rank-val" id="rankVal"></div>
  </div>

  <div class="res-btns">
    <button class="btn-retry" onclick="retry()">↺ もう一度</button>
    <button class="btn-share" onclick="shareResult()">↑ シェア</button>
  </div>
</div>

<!-- キャラ画像編集モーダル -->
<div class="modal-ov" id="charaModal">
  <div class="modal">
    <div class="modal-ttl">◆ CHARACTER IMAGE SET</div>
    <div class="modal-chara-name" id="modalCharaName"></div>
    <div class="rank-imgs" id="rankImgList"></div>
    <div class="modal-acts">
      <button class="btn-modal-cancel" onclick="closeCharaModal()">キャンセル</button>
      <button class="btn-modal-ok" onclick="saveCharaImages()">保存</button>
    </div>
  </div>
</div>

<script>
// ===== 定数 =====
var CHARA_KEY='aa_charas_v1',BG_KEY='aa_bg_v1',SE_KEY='aa_se_v2';
var RANKS=['D','C','B','A','S','SS','SSS'];
var RANK_COLORS={'D':'#666','C':'#888','B':'#4488ff','A':'#00ffcc','S':'#cc44ff','SS':'#ff2244','SSS':'#ffaa00'};

// ===== キャラ定義 =====
var charaList=[
  {id:'momo',name:'',icon:'🔥',color:'#ff2244'},
  {id:'sakura',name:'',icon:'🌸',color:'#f9a8d4'},
  {id:'ritsu',name:'',icon:'📖',color:'#00ffcc'},
  {id:'glock',name:'',icon:'⚙',color:'#34d399'}
];

// キャラ画像データ {charaId: {default:dataUrl, D:dataUrl, C:..., SSS:...}}
var charaImages={};
var currentCharaId='momo';
var imgDataUrl='',resultStats=null,resultComment='';
var editingCharaId=null,editImgTemp={};
var bgmAudio=null,bgmPlaying=false;
var bgImgUrl='';
// SE: キャラ別音源データ {charaId: {target, attack, rank, voice}}
var seData={};
// SE再生ボックス×2（ラウンドロビン）
var sePool=[new Audio(),new Audio()];
var sePoolIdx=0;
var SE_TYPES=[
  {key:'target', label:'🎯 ターゲット', desc:'狙う・飛ぶ音'},
  {key:'attack', label:'⚔ 攻撃',      desc:'斬撃・ヒット音'},
  {key:'rank',   label:'🏆 ランク発表', desc:'結果発表音'},
  {key:'voice',  label:'💬 セリフ前',  desc:'喋る前の演出音'}
];



// ===== 初期化 =====
function init(){
  // キャラ画像ロード
  try{var s=localStorage.getItem(CHARA_KEY);if(s)charaImages=JSON.parse(s);}catch(e){}
  // 背景ロード
  try{var b=localStorage.getItem(BG_KEY);if(b){bgImgUrl=b;applyBg(b);document.getElementById('bgName').textContent='設定済';}}catch(e){}
  // SEロード
  try{var se=localStorage.getItem(SE_KEY);if(se)seData=JSON.parse(se);}catch(e){}
  buildCharaRow();
}


// ===== バトル演出 =====
function battleFlash(color,duration){
  var el=document.getElementById('battleFlash');
  el.style.background=color||'#ffffff';
  el.style.animation='none';
  el.offsetHeight; // reflow
  el.style.animation=(color==='#ff2244'?'flashRed':'flashWhite')+' '+duration+'ms ease-out forwards';
}
function battleShake(){
  var sp=document.getElementById('page-scan');
  sp.style.animation='none';
  sp.offsetHeight;
  sp.style.animation='shake 0.4s ease-out';
  setTimeout(function(){sp.style.animation='';},400);
}
function battleDarken(duration){
  var el=document.getElementById('battleFlash');
  el.style.background='#000';
  el.style.opacity='0.85';
  setTimeout(function(){
    el.style.transition='opacity '+duration+'ms ease';
    el.style.opacity='0';
    setTimeout(function(){el.style.transition='';},duration);
  },100);
}

// ===== SE再生 =====
function playSE(type){
  var d=seData[currentCharaId];
  var src=d&&d[type]?d[type]:null;
  if(!src)return;
  var audio=sePool[sePoolIdx%2];
  sePoolIdx++;
  audio.src=src;
  audio.currentTime=0;
  audio.volume=0.8;
  audio.play().catch(function(){});
}

function buildCharaRow(){
  var el=document.getElementById('charaRow');
  el.innerHTML=charaList.map(function(c){
    var imgs=charaImages[c.id]||{};
    var imgHtml=imgs.default
      ?'<img src="'+imgs.default+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">'
      :'<span>'+c.icon+'</span>';
    return '<div class="chara-card'+(currentCharaId===c.id?' on':'')+'" onclick="pickChara(\''+c.id+'\',this)">'
      +'<div class="chara-img">'+imgHtml+'</div>'

      +'<button class="chara-edit" onclick="event.stopPropagation();openCharaModal(\''+c.id+'\')">✎</button>'
      +'</div>';
  }).join('');
}

// ===== 解析ロジック =====
function analyzeImage(dataUrl,cb){
  var canvas=document.createElement('canvas');
  var img=new Image();
  img.onload=function(){
    canvas.width=img.width;canvas.height=img.height;
    var ctx=canvas.getContext('2d');ctx.drawImage(img,0,0);
    var data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
    var r=0,g=0,b=0,count=0;
    for(var i=0;i<data.length;i+=16){r+=data[i];g+=data[i+1];b+=data[i+2];count++;}
    r=r/count;g=g/count;b=b/count;
    var brightness=(r*0.299+g*0.587+b*0.114);
    var colorfulness=Math.abs(r-g)+Math.abs(g-b)+Math.abs(b-r);
    var darkness=255-brightness;
    var atk=Math.floor(darkness*35+r*8+colorfulness*3+Math.random()*1200)%9000+500;
    var def=Math.floor(brightness*30+b*10+Math.random()*1000)%7000+300;
    var mag=Math.floor(g*30+colorfulness*5+Math.random()*1500)%8000+200;
    cb({atk:atk,def:def,mag:mag,total:atk+def+mag});
  };
  img.src=dataUrl;
}

function getRank(total){
  if(total>=22000)return'SSS';if(total>=18000)return'SS';if(total>=14000)return'S';
  if(total>=10000)return'A';if(total>=7000)return'B';if(total>=4000)return'C';return'D';
}

  sc.style.boxShadow='0 0 20px '+ch.color+'44';
  setTimeout(function(){sc.style.transition='opacity .5s';sc.style.opacity='1';},600);

  var overlay=document.getElementById('scanOverlay');
  for(var i=1;i<8;i++){
    var h=document.createElement('div');h.className='grid-h';h.style.top=(i*12.5)+'%';overlay.appendChild(h);
    var v=document.createElement('div');v.className='grid-v';v.style.left=(i*12.5)+'%';overlay.appendChild(v);
  }
  var logs=['log1','log2','log3','log4'];
  logs.forEach(function(id,i){setTimeout(function(){var el=document.getElementById(id);el.style.transition='opacity .4s';el.style.opacity='1';},400+i*600);});
  var tb=document.getElementById('targetBox');
  setTimeout(function(){tb.style.transition='opacity .5s';tb.style.opacity='1';soundTargetLock();playSE('target');},300);
  setTimeout(function(){document.querySelectorAll('.grid-h,.grid-v').forEach(function(el,i){setTimeout(function(){el.style.transition='opacity .3s';el.style.opacity='0.25';},i*30);});},500);
  // スキャン中盤：暗転→フラッシュ→揺れ→攻撃SE
  setTimeout(function(){battleDarken(300);},1600);
  setTimeout(function(){battleFlash('#ffffff',400);battleShake();playSE('attack');},2000);
  setTimeout(function(){battleFlash('#ff2244',600);},2300);

  var linePos=0,lineDir=1;
  var sl=document.getElementById('scanLine');
  var lineInt=setInterval(function(){linePos+=lineDir*2;if(linePos>100)lineDir=-1;if(linePos<0)lineDir=1;sl.style.top=linePos+'%';},16);

  var pct=0,barEl=document.getElementById('scanBar'),pctEl=document.getElementById('scanPct');
  var progInt=setInterval(function(){
    pct+=Math.random()*3+0.5;if(pct>100)pct=100;
    barEl.style.width=pct+'%';
    pctEl.style.transition='opacity .3s';pctEl.style.opacity='1';
    pctEl.textContent=Math.floor(pct)+'%';
    if(pct>=100){clearInterval(progInt);clearInterval(lineInt);setTimeout(showResult,600);}
  },60);
}

// ===== 効果音 =====
var AC=null,scanBeepIdx=0;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function getMaster(){var ac=getAC();var comp=ac.createDynamicsCompressor();comp.threshold.value=-6;comp.knee.value=3;comp.ratio.value=4;comp.attack.value=0.001;comp.release.value=0.1;comp.connect(ac.destination);return comp;}
function osc(freq,type,vol,atk,dec,sus,rel,dest,ac,st,et){try{var o=ac.createOscillator();var g=ac.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol,st+atk);g.gain.linearRampToValueAtTime(vol*sus,st+atk+dec);g.gain.setValueAtTime(vol*sus,et-rel);g.gain.linearRampToValueAtTime(0,et);o.connect(g);g.connect(dest);o.start(st);o.stop(et+0.01);}catch(e){}}
function noise(dur,vol,freq,dest,ac,t){try{var buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1);var src=ac.createBufferSource();src.buffer=buf;var filt=ac.createBiquadFilter();filt.type='bandpass';filt.frequency.value=freq||200;filt.Q.value=0.5;var g=ac.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);src.connect(filt);filt.connect(g);g.connect(dest);src.start(t);src.stop(t+dur+0.01);}catch(e){}}
function soundTap(){try{var ac=getAC();var m=getMaster();var t=ac.currentTime;osc(1200,'sine',0.15,0.001,0.02,0.3,0.03,m,ac,t,t+0.06);}catch(e){}}
function soundTargetLock(){try{var ac=getAC();var m=getMaster();var t=ac.currentTime;var seq=[440,660,880,1320];seq.forEach(function(f,i){var st=t+i*0.1;osc(f,'square',0.3,0.001,0.02,0.8,0.03,m,ac,st,st+0.09);});setTimeout(function(){try{var ac2=getAC();var m2=getMaster();var t2=ac2.currentTime;var o=ac2.createOscillator();var g=ac2.createGain();o.type='sawtooth';o.frequency.setValueAtTime(220,t2);o.frequency.exponentialRampToValueAtTime(2200,t2+0.4);g.gain.setValueAtTime(0.3,t2);g.gain.exponentialRampToValueAtTime(0.001,t2+0.5);o.connect(g);g.connect(m2);o.start(t2);o.stop(t2+0.5);}catch(e){}},400);}catch(e){}}
// soundScanBeep廃止（SE登録に移行）
function soundRankReveal(rank){try{var ac=getAC();var m=getMaster();var t=ac.currentTime;for(var i=0;i<16;i++){(function(idx){var st=t+idx*0.05;noise(0.04,0.25+idx*0.01,100+idx*20,m,ac,st);if(idx%4===3)osc(80,'sine',0.4,0.001,0.05,0.3,0.1,m,ac,st,st+0.15);})(i);}var ft=t+0.85;noise(0.5,0.6,80,m,ac,ft);osc(60,'sine',0.5,0.001,0.1,0.8,0.2,m,ac,ft,ft+0.6);var ff={'D':[[220,0],[196,0.15],[220,0.3]],'C':[[262,0],[294,0.1],[330,0.2],[294,0.35]],'B':[[330,0],[392,0.1],[440,0.2],[392,0.3],[440,0.45]],'A':[[440,0],[494,0.1],[523,0.2],[587,0.3],[523,0.45],[587,0.55],[660,0.7]],'S':[[523,0],[587,0.08],[659,0.16],[698,0.24],[784,0.32],[880,0.42],[988,0.52],[1047,0.65]],'SS':[[659,0],[784,0.07],[880,0.14],[988,0.21],[1047,0.28],[1175,0.35],[1319,0.42],[1047,0.52],[1319,0.62],[1568,0.75]],'SSS':[[880,0],[1047,0.06],[1175,0.12],[1319,0.18],[1480,0.24],[1568,0.3],[1760,0.36],[1976,0.42],[2093,0.5],[1760,0.6],[1976,0.7],[2093,0.8],[1760,0.9],[2093,1.0],[2637,1.12]]};var notes=ff[rank]||ff['C'];notes.forEach(function(n){var st=ft+0.1+n[1];osc(n[0],'square',0.25,0.001,0.03,0.7,0.05,m,ac,st,st+0.12);osc(n[0]*0.5,'sine',0.15,0.001,0.02,0.5,0.04,m,ac,st,st+0.1);});if(rank==='SSS'){setTimeout(function(){try{var ac2=getAC();var m2=getMaster();var t2=ac2.currentTime;noise(0.8,0.8,200,m2,ac2,t2);for(var j=0;j<5;j++){(function(jj){setTimeout(function(){var ac3=getAC();var m3=getMaster();var t3=ac3.currentTime;osc(220+jj*440,'sawtooth',0.3,0.001,0.05,0.5,0.1,m3,ac3,t3,t3+0.3);},jj*80);})(j);}}catch(e){}},1400);}}catch(e){}}
