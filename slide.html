<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>コマ送りくん</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');
:root{
  --bg:#1a1a1a;--sur:#242424;--sur2:#2e2e2e;--bdr:#3a3a3a;
  --tx:#f0f0f0;--tx2:#888;
  --acc:#ff6b2b;--acc2:rgba(255,107,43,0.15);
  --neo:#00ffe0;--neo2:rgba(0,255,224,0.1);
  --mono:'Space Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow:hidden;}

/* ── VIEWER ── */
#viewer{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);}
#slideImg{max-width:100%;max-height:100%;object-fit:contain;display:block;transition:opacity .15s;}
#slideImg.fade{opacity:0;}
#noSlide{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--tx2);font-size:14px;}
#noSlide .icon{font-size:48px;opacity:.3;}

/* ── タップゾーン ── */
#tapLeft{position:fixed;left:0;top:0;width:30%;height:100%;z-index:10;cursor:pointer;}
#tapRight{position:fixed;right:0;top:0;width:30%;height:100%;z-index:10;cursor:pointer;}
#tapCenter{position:fixed;left:30%;top:0;width:40%;height:100%;z-index:10;cursor:pointer;}

/* ── インジケーター ── */
#indicator{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid var(--bdr);border-radius:20px;padding:4px 14px;font-family:var(--mono);font-size:12px;color:var(--tx);z-index:20;transition:opacity .3s;pointer-events:none;}
#indicator.hide{opacity:0;}

/* ── シークバー ── */
#seekWrap{position:fixed;bottom:0;left:0;right:0;height:28px;z-index:20;display:flex;align-items:center;padding:0 8px;background:linear-gradient(transparent,rgba(0,0,0,0.5));}
#seekBar{width:100%;accent-color:var(--acc);cursor:pointer;height:3px;}

/* ── メニューオーバーレイ ── */
#menuOverlay{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;justify-content:flex-end;}
#menuOverlay.on{display:flex;}
#menuBg{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);}
#menuPanel{position:relative;background:var(--sur);border-top:1px solid var(--bdr);border-radius:20px 20px 0 0;padding:1.2rem 1rem 2rem;display:flex;flex-direction:column;gap:12px;}
.menu-title{font-family:var(--mono);font-size:11px;color:var(--tx2);letter-spacing:.1em;text-align:center;margin-bottom:4px;}
.menu-row{display:flex;gap:8px;}
.btn-m{flex:1;background:var(--sur2);border:1px solid var(--bdr);color:var(--tx);border-radius:12px;padding:12px 8px;font-size:13px;cursor:pointer;text-align:center;font-family:var(--sans);transition:all .15s;}
.btn-m:active{transform:scale(0.97);}
.btn-m.on{background:var(--acc2);border-color:var(--acc);color:var(--acc);}
.btn-m.neo{background:var(--neo2);border-color:var(--neo);color:var(--neo);}

/* オートプレイ速度 */
.speed-row{display:flex;gap:6px;flex-wrap:wrap;}
.spd{background:var(--sur2);border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:6px 10px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .15s;}
.spd.on{background:var(--acc2);border-color:var(--acc);color:var(--acc);}

/* サムネイル一覧 */
#thumbPanel{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,0.92);display:none;flex-direction:column;}
#thumbPanel.on{display:flex;}
#thumbHeader{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);}
#thumbHeader span{font-family:var(--mono);font-size:12px;color:var(--tx2);}
.btn-close{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;}
#thumbGrid{flex:1;overflow-y:auto;padding:.75rem;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.thumb{border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;aspect-ratio:3/4;background:var(--sur2);}
.thumb.cur{border-color:var(--acc);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb-num{font-family:var(--mono);font-size:9px;color:var(--tx2);text-align:center;margin-top:3px;}

/* ファイル読み込み */
#loadWrap{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:2rem;}
#loadWrap.hide{display:none;}
.logo-txt{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--acc);letter-spacing:.15em;}
.logo-sub{font-size:11px;color:var(--neo);font-family:var(--mono);}
.btn-load{background:var(--acc);color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);width:100%;max-width:300px;}
.hint{font-size:11px;color:var(--tx2);text-align:center;line-height:1.6;}

/* トースト */
.toast{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);background:var(--sur2);border:1px solid var(--acc);color:var(--acc);padding:8px 16px;border-radius:8px;font-size:12px;font-family:var(--mono);opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;}
</style>
</head>
<body>

<!-- 読み込み画面 -->
<div id="loadWrap">
  <div class="logo-txt">コマ送りくん</div>
  <div class="logo-sub">SLIDE VIEWER</div>
  <button class="btn-load" onclick="document.getElementById('fileInput').click()">📂 画像ファイルを選択</button>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="loadFiles(this)">
  <div class="hint">JPG・PNG・GIF・WebP対応<br>複数選択でまとめて読み込み<br>ファイル名順に並びます</div>
</div>

<!-- ビューア -->
<div id="viewer">
  <div id="noSlide"><div class="icon">🖼</div>画像を読み込んでください</div>
  <img id="slideImg" src="" alt="" style="display:none">
</div>

<!-- タップゾーン -->
<div id="tapLeft" onclick="prev()"></div>
<div id="tapCenter" onclick="toggleMenu()"></div>
<div id="tapRight" onclick="next()"></div>

<!-- インジケーター -->
<div id="indicator" class="hide">1 / 1</div>

<!-- シークバー -->
<div id="seekWrap" style="display:none;">
  <input type="range" id="seekBar" min="0" max="100" value="0" oninput="seekTo(this.value)">
</div>

<!-- メニューオーバーレイ -->
<div id="menuOverlay">
  <div id="menuBg" onclick="closeMenu()"></div>
  <div id="menuPanel">
    <div class="menu-title">MENU</div>
    <div class="menu-row">
      <button class="btn-m" id="autoBtn" onclick="toggleAuto()">▶ 自動再生</button>
      <button class="btn-m neo" onclick="openThumb()">🖼 一覧</button>
      <button class="btn-m" onclick="document.getElementById('fileInput').click()">📂 読込</button>
    </div>
    <div class="menu-row">
      <button class="btn-m" onclick="prev();closeMenu()">◀ 前へ</button>
      <button class="btn-m" onclick="next();closeMenu()">次へ ▶</button>
      <button class="btn-m" id="fsBtn" onclick="toggleFS()">⛶ 全画面</button>
    </div>
    <div class="menu-title" style="margin-top:4px;">AUTO SPEED</div>
    <div class="speed-row" id="speedRow">
      <button class="spd" data-s="2" onclick="setAutoSpeed(2,this)">2秒</button>
      <button class="spd on" data-s="5" onclick="setAutoSpeed(5,this)">5秒</button>
      <button class="spd" data-s="8" onclick="setAutoSpeed(8,this)">8秒</button>
      <button class="spd" data-s="15" onclick="setAutoSpeed(15,this)">15秒</button>
    </div>
  </div>
</div>

<!-- サムネイル一覧 -->
<div id="thumbPanel">
  <div id="thumbHeader">
    <span id="thumbCount">0枚</span>
    <button class="btn-close" onclick="closeThumb()">閉じる</button>
  </div>
  <div id="thumbGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var slides=[],cur=0,autoPlay=false,autoTimer=null,autoSpeed=5;
var touchStartX=0,touchStartY=0;

// ── ファイル読み込み ──
function loadFiles(input){
  var files=Array.from(input.files).sort(function(a,b){return a.name.localeCompare(b.name,undefined,{numeric:true});});
  if(!files.length) return;
  slides=[];
  var loaded=0;
  files.forEach(function(file,i){
    var url=URL.createObjectURL(file);
    slides.push({url:url,name:file.name});
    loaded++;
    if(loaded===files.length){
      cur=0;
      document.getElementById('loadWrap').classList.add('hide');
      document.getElementById('noSlide').style.display='none';
      document.getElementById('slideImg').style.display='block';
      document.getElementById('seekWrap').style.display='flex';
      document.getElementById('seekBar').max=slides.length-1;
      showSlide(0);
      buildThumbs();
      toast(slides.length+'枚読み込みました');
    }
  });
}

// ── スライド表示 ──
function showSlide(idx){
  if(!slides.length) return;
  idx=Math.max(0,Math.min(slides.length-1,idx));
  cur=idx;
  var img=document.getElementById('slideImg');
  img.classList.add('fade');
  setTimeout(function(){
    img.src=slides[cur].url;
    img.classList.remove('fade');
  },100);
  document.getElementById('indicator').textContent=(cur+1)+' / '+slides.length;
  document.getElementById('indicator').classList.remove('hide');
  document.getElementById('seekBar').value=cur;
  clearTimeout(indicatorTimer);
  indicatorTimer=setTimeout(function(){document.getElementById('indicator').classList.add('hide');},2500);
  // サムネイルのハイライト更新
  document.querySelectorAll('.thumb').forEach(function(t,i){t.classList.toggle('cur',i===cur);});
}

var indicatorTimer=null;

function next(){if(cur<slides.length-1){showSlide(cur+1);}else{if(autoPlay)stopAuto();}}
function prev(){showSlide(cur-1);}
function seekTo(v){showSlide(parseInt(v));}

// ── オートプレイ ──
function toggleAuto(){
  if(autoPlay) stopAuto();
  else startAuto();
}
function startAuto(){
  if(!slides.length){toast('画像を読み込んでください');return;}
  autoPlay=true;
  document.getElementById('autoBtn').textContent='⏸ 停止';
  document.getElementById('autoBtn').className='btn-m on';
  autoTimer=setInterval(function(){
    if(cur<slides.length-1) showSlide(cur+1);
    else stopAuto();
  },autoSpeed*1000);
  toast('自動再生 '+autoSpeed+'秒間隔');
}
function stopAuto(){
  autoPlay=false;
  clearInterval(autoTimer);
  document.getElementById('autoBtn').textContent='▶ 自動再生';
  document.getElementById('autoBtn').className='btn-m';
}
function setAutoSpeed(s,el){
  autoSpeed=s;
  document.querySelectorAll('.spd').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  if(autoPlay){stopAuto();startAuto();}
}

// ── メニュー ──
function toggleMenu(){closeThumb();var o=document.getElementById('menuOverlay');o.classList.toggle('on');}
function closeMenu(){document.getElementById('menuOverlay').classList.remove('on');}

// ── サムネイル ──
function buildThumbs(){
  var grid=document.getElementById('thumbGrid');
  document.getElementById('thumbCount').textContent=slides.length+'枚';
  grid.innerHTML=slides.map(function(s,i){
    return '<div class="thumb'+(i===cur?' cur':'')+'" onclick="goThumb('+i+')">'+
      '<img src="'+s.url+'" loading="lazy">'+
      '<div class="thumb-num">'+(i+1)+'</div></div>';
  }).join('');
}
function openThumb(){closeMenu();document.getElementById('thumbPanel').classList.add('on');}
function closeThumb(){document.getElementById('thumbPanel').classList.remove('on');}
function goThumb(i){showSlide(i);closeThumb();}

// ── 全画面 ──
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
    document.getElementById('fsBtn').textContent='⛶ 解除';
  } else {
    document.exitFullscreen&&document.exitFullscreen();
    document.getElementById('fsBtn').textContent='⛶ 全画面';
  }
}

// ── スワイプ ──
document.addEventListener('touchstart',function(e){
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    if(dx<0) next();
    else prev();
  }
},{passive:true});

// ── キーボード ──
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ') next();
  if(e.key==='ArrowLeft') prev();
  if(e.key==='Escape') closeMenu();
});

// ── トースト ──
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  setTimeout(function(){el.classList.remove('on');},2000);
}
</script>
</body>
</html>
