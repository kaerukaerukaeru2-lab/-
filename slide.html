<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>コマ送りくん</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1a1a;--surface:#252525;--surface2:#2e2e2e;
  --orange:#e06c20;--orange2:#c45a10;--teal:#00d4aa;
  --text:#f0f0f0;--text2:#aaa;--border:#3a3a3a;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Helvetica Neue',sans-serif;overflow:hidden}

/* ===== TOP SCREEN ===== */
#topScreen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:16px;padding:20px;background:#f0ebe4;
}
#topScreen h1{font-size:28px;color:#c45a10;font-weight:900;letter-spacing:2px}
#topScreen .ver{font-size:11px;color:#00a080;letter-spacing:3px;font-family:monospace}
#mascot{width:140px;height:140px;object-fit:contain}
#mascotBox{
  background:#fff;border-radius:12px;padding:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);position:relative;
}
#startBtn{
  background:var(--orange);color:#fff;border:none;border-radius:12px;
  padding:14px 32px;font-size:17px;font-weight:700;cursor:pointer;
  width:100%;max-width:320px;
}
#topHint{font-size:11px;color:#888;text-align:center;line-height:1.8}
#startFileInput{display:none}

/* ===== VIEWER ===== */
#viewer{display:none;flex-direction:column;height:100%;position:relative}

/* slide area */
#slideWrap{
  flex:1;overflow:hidden;position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;
}
#slideImg{
  max-width:100%;max-height:100%;object-fit:contain;
  position:absolute;transition:none;
}
#slideImg.fade{animation:fadeIn .4s ease}
#slideImg.fadeS{animation:fadeIn .25s ease}
#slideImg.slideX{animation:slideInX .4s ease}
#slideImg.slideXS{animation:slideInX .25s ease}
#slideImg.slideY{animation:slideInY .4s ease}
#slideImg.slideYS{animation:slideInY .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInX{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInY{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* flash overlay */
#flashOverlay{
  position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
  transition:opacity .05s;z-index:5;
}

/* bottom bar */
#bottomBar{
  background:var(--surface);border-top:1px solid var(--border);
  padding:6px 8px;display:flex;align-items:center;gap:6px;flex-shrink:0;
}
#counter{font-size:11px;color:var(--text2);min-width:44px;text-align:center;font-family:monospace}
#progressWrap{flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer}
#progressBar{height:100%;background:var(--teal);border-radius:2px;transition:width .2s}
.barBtn{
  background:var(--surface2);border:none;color:var(--text);
  border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;flex-shrink:0;
}
.barBtn.active{background:var(--orange);color:#fff}
#menuBtn{font-size:18px;padding:6px 8px}

/* ===== MENU PANEL ===== */
#menuOverlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  align-items:flex-end;
}
#menuOverlay.open{display:flex}
#menuPanel{
  background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:85vh;overflow-y:auto;padding:12px 14px 28px;
  display:flex;flex-direction:column;gap:10px;
}
.mClose{
  align-self:flex-end;background:var(--surface2);border:none;
  color:var(--text2);border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer;
}
.mSec{font-size:10px;color:var(--text2);letter-spacing:2px;text-align:center;margin-top:2px}
.mRow{display:flex;gap:6px;flex-wrap:wrap}
.mBtn{
  flex:1;min-width:80px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;padding:8px 4px;font-size:12px;
  cursor:pointer;text-align:center;white-space:nowrap;
}
.mBtn.on{background:var(--orange);border-color:var(--orange);color:#fff}
.mBtn.teal{background:var(--teal);border-color:var(--teal);color:#000}
.mBtn.sm{min-width:52px;font-size:11px;padding:6px 4px}

/* volume */
.volRow{display:flex;align-items:center;gap:8px}
.volRow label{font-size:11px;color:var(--text2);white-space:nowrap}
.volRow input[type=range]{flex:1;accent-color:var(--teal)}
.volRow span{font-size:11px;color:var(--teal);min-width:34px;text-align:right}

/* storage info */
#storageInfo{font-size:10px;color:var(--text2);text-align:center}
.dangerBtn{background:#8b1a1a!important;border-color:#a02020!important;color:#ffa!important}

/* ===== GALLERY ===== */
#galleryOverlay{
  display:none;position:fixed;inset:0;background:var(--bg);z-index:200;
  flex-direction:column;
}
#galleryOverlay.open{display:flex}
#galleryHeader{
  padding:10px 12px;display:flex;align-items:center;gap:8px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
#galleryHeader h2{flex:1;font-size:14px}
#galleryClose{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}
#galleryGrid{
  flex:1;overflow-y:auto;padding:8px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
}
.thumbItem{
  aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;
  border:2px solid transparent;cursor:pointer;background:#111;
}
.thumbItem.current{border-color:var(--teal)}
.thumbItem img{width:100%;height:100%;object-fit:cover}
.thumbNum{
  position:absolute;bottom:2px;left:3px;font-size:9px;
  color:#fff;text-shadow:0 0 3px #000;
}
.thumbVoice{
  position:absolute;top:2px;right:3px;font-size:9px;
}
.voiceBtn{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);border-radius:8px;padding:6px;font-size:11px;cursor:pointer;
}
.voiceSet{border-color:var(--teal);color:var(--teal)}
#voiceFileInput{display:none}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.85);color:#fff;border-radius:20px;
  padding:7px 18px;font-size:12px;pointer-events:none;opacity:0;
  transition:opacity .3s;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- TOP -->
<div id="topScreen">
  <div id="mascotBox">
    <canvas id="mascotCanvas" width="140" height="140"></canvas>
  </div>
  <h1>コマ送りくん</h1>
  <div class="ver">SLIDE VIEWER v4.0</div>
  <button id="startBtn" onclick="document.getElementById('startFileInput').click()">
    📂 画像を選択してスタート
  </button>
  <button id="startBtn" style="background:#555;margin-top:-8px" onclick="tryRestore()">
    🔄 前回の続きを再開
  </button>
  <div id="topHint">JPG・PNG・GIF・WebP対応<br>複数選択でまとめて読み込み<br>IndexedDB永続保存対応</div>
  <input type="file" id="startFileInput" accept="image/*" multiple>
</div>

<!-- VIEWER -->
<div id="viewer">
  <div id="slideWrap" id="slideWrap">
    <img id="slideImg" src="" alt="">
    <div id="flashOverlay"></div>
  </div>
  <div id="bottomBar">
    <button class="barBtn" id="prevBtn">◀</button>
    <div id="counter">0/0</div>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <button class="barBtn" id="nextBtn">▶</button>
    <button class="barBtn" id="autoBtn">▷</button>
    <button class="barBtn" id="menuBtn">☰</button>
  </div>
</div>

<!-- MENU -->
<div id="menuOverlay">
  <div id="menuPanel">
    <button class="mClose" id="menuClose">✕ 閉じる</button>
    <div class="mSec">MENU</div>
    <div class="mRow">
      <button class="mBtn teal" onclick="openGallery()">🖼 一覧</button>
      <button class="mBtn" onclick="goFirst();closeMenu()">🏠 最初へ</button>
      <button class="mBtn" onclick="toggleFullscreen()">⛶ 全画面</button>
    </div>
    <div class="mSec">SCROLL MODE</div>
    <div class="mRow">
      <button class="mBtn" id="modeH" onclick="setMode('h')">↔ 横送り</button>
      <button class="mBtn" id="modeV" onclick="setMode('v')">↕ 縦送り</button>
    </div>
    <div class="mSec">FX EFFECTS</div>
    <div class="mRow">
      <button class="mBtn" id="fxFlash" onclick="toggleFx('flash')">⬛ 暗転</button>
      <button class="mBtn" id="fxSound" onclick="toggleFx('sound')">🔔 効果音</button>
      <button class="mBtn" id="fxVib" onclick="toggleFx('vib')">📳 振動</button>
    </div>
    <div class="mSec">AUDIO</div>
    <div class="mRow">
      <button class="mBtn" id="bgmBtn" onclick="document.getElementById('bgmFileInput').click()">🎵 BGMを選択</button>
      <button class="mBtn" id="loopBtn" onclick="toggleLoop()">🔁 ループOFF</button>
    </div>
    <div class="volRow">
      <label>音量</label>
      <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
      <span id="volLabel">80%</span>
    </div>
    <input type="file" id="bgmFileInput" accept="audio/*">
    <div class="mSec">コマ別セリフ音声</div>
    <button class="mBtn teal" style="width:100%;padding:10px" onclick="openGallery()">🎤 コマ音声を設定（一覧から）</button>
    <div class="mSec">TRANSITION TYPE</div>
    <div class="mRow">
      <button class="mBtn sm" id="trFade" onclick="setTr('fade')">▣ フェード</button>
      <button class="mBtn sm" id="trX" onclick="setTr('slideX')">→ 横スライド</button>
      <button class="mBtn sm" id="trY" onclick="setTr('slideY')">↓ 縦スライド</button>
    </div>
    <div class="mSec">TRANSITION SPEED</div>
    <div class="mRow">
      <button class="mBtn sm" id="spFast" onclick="setSpeed('fast')">⚡ 速い</button>
      <button class="mBtn sm" id="spNorm" onclick="setSpeed('normal')">▶ 普通</button>
      <button class="mBtn sm" id="spSlow" onclick="setSpeed('slow')">■ ゆっくり</button>
    </div>
    <div class="mSec">AUTO SPEED</div>
    <div class="mRow" id="autoSpeedRow"></div>
    <div class="mSec">DATA</div>
    <div id="storageInfo">読み込み中...</div>
    <div class="mRow" style="margin-top:4px">
      <button class="mBtn" onclick="exportMeta()">💾 設定エクスポート</button>
      <button class="mBtn dangerBtn" onclick="clearAll()">🗑 全削除</button>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div id="galleryOverlay">
  <div id="galleryHeader">
    <h2>📋 コマ一覧</h2>
    <button id="galleryClose">✕</button>
  </div>
  <div id="galleryGrid"></div>
</div>
<input type="file" id="voiceFileInput" accept="audio/*">

<div id="toast"></div>
<audio id="bgmAudio" loop></audio>
<audio id="voiceAudio"></audio>
<audio id="fxAudio"></audio>

<script>
// ============================================================
// IndexedDB 2ストア設計
// ============================================================
const DB_NAME = 'KomaDB';
const DB_VER = 1;
const META_STORE = 'meta';   // 設定・構成（小さいJSON）
const BIN_STORE = 'binary';  // 画像・音声バイナリ（Blob）

let db = null;

function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains(META_STORE))
        d.createObjectStore(META_STORE, {keyPath:'key'});
      if(!d.objectStoreNames.contains(BIN_STORE))
        d.createObjectStore(BIN_STORE, {keyPath:'key'});
    };
    req.onsuccess = e=>{ db=e.target.result; res(db); };
    req.onerror = e=>rej(e);
  });
}
function dbPut(store,key,value){
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).put({key,value});
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e);
  });
}
function dbGet(store,key){
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess=e=>res(e.target.result?.value);
    req.onerror=e=>rej(e);
  });
}
function dbDel(store,key){
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e);
  });
}
function dbClear(store){
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).clear();
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e);
  });
}
function dbGetAll(store){
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e);
  });
}

// ============================================================
// STATE
// ============================================================
let slides = [];       // [{id,name,voiceKey}]  ※バイナリはBIN_STOREに
let current = 0;
let autoTimer = null;
let settings = {
  mode:'v', fx:{flash:false,sound:true,vib:false},
  tr:'fade', speed:'normal', autoSec:5,
  vol:80, loop:false
};
let bgmBlob = null;
let bgmUrl = null;
let objUrls = [];      // 解放管理

function trackUrl(url){ objUrls.push(url); return url; }
function releaseAll(){ objUrls.forEach(u=>URL.revokeObjectURL(u)); objUrls=[]; }

// ============================================================
// INIT
// ============================================================
async function init(){
  await openDB();
  drawMascot();
  buildAutoSpeedBtns();
  applySettings();
  loadBgmFromDB();
  updateStorageInfo();
}
init();

// ============================================================
// TOP SCREEN
// ============================================================
document.getElementById('startFileInput').onchange = async function(e){
  const files = [...e.target.files].filter(f=>f.type.startsWith('image/'));
  if(!files.length) return;
  files.sort((a,b)=>a.name.localeCompare(b.name));

  showToast('📥 保存中...');
  // 既存スライドに追加
  const existing = slides.map(s=>s.id);
  for(const f of files){
    const id = 'img_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    await dbPut(BIN_STORE, id, f);
    slides.push({id, name:f.name, voiceKey:null});
  }
  await saveMeta();
  showViewer();
  showToast('✅ '+files.length+'枚読み込み完了');
  e.target.value='';
};

async function tryRestore(){
  const saved = await dbGet(META_STORE,'slides');
  if(!saved || !saved.length){ showToast('保存データなし'); return; }
  slides = saved;
  const pos = await dbGet(META_STORE,'position') || 0;
  const s = await dbGet(META_STORE,'settings');
  if(s) settings = {...settings,...s};
  current = pos;
  applySettings();
  showViewer();
  showToast('🔄 前回の続きから再開');
}

// ============================================================
// META SAVE/LOAD
// ============================================================
async function saveMeta(){
  await dbPut(META_STORE,'slides', slides);
  await dbPut(META_STORE,'position', current);
  await dbPut(META_STORE,'settings', settings);
}

// ============================================================
// VIEWER
// ============================================================
function showViewer(){
  document.getElementById('topScreen').style.display='none';
  const v = document.getElementById('viewer');
  v.style.display='flex';
  showSlide(current);
  setupSwipe();
  setupProgress();
}

// Object URL cache (メモリ節約：表示中だけ解放しない)
let urlCache = {};
async function getImgUrl(id){
  if(urlCache[id]) return urlCache[id];
  const blob = await dbGet(BIN_STORE, id);
  if(!blob) return '';
  const url = URL.createObjectURL(blob);
  urlCache[id] = url;
  return url;
}
function evictCache(keepIds){
  // 表示範囲外のURLを解放
  for(const id in urlCache){
    if(!keepIds.includes(id)){
      URL.revokeObjectURL(urlCache[id]);
      delete urlCache[id];
    }
  }
}

async function showSlide(idx, dir=1){
  if(!slides.length) return;
  current = Math.max(0, Math.min(idx, slides.length-1));

  const s = slides[current];
  const url = await getImgUrl(s.id);

  // 前後2枚だけキャッシュ、残り解放
  const keepIds = [
    slides[current]?.id,
    slides[current+1]?.id,
    slides[current-1]?.id,
  ].filter(Boolean);
  evictCache(keepIds);
  // 先読み
  if(slides[current+1]) getImgUrl(slides[current+1].id);

  const img = document.getElementById('slideImg');
  img.className='';
  void img.offsetWidth;
  const cls = getTransClass();
  img.src = url;
  img.className = cls;

  updateCounter();
  if(settings.fx.flash) doFlash();
  if(settings.fx.sound) doFxSound();
  if(settings.fx.vib && navigator.vibrate) navigator.vibrate(30);
  playVoice(s);

  saveMeta();
}

function getTransClass(){
  const s = settings.speed==='fast'?'S':'';
  return settings.tr+s;
}

function updateCounter(){
  document.getElementById('counter').textContent = `${current+1}/${slides.length}`;
  const pct = slides.length>1 ? (current/(slides.length-1))*100 : 0;
  document.getElementById('progressBar').style.width = pct+'%';
}

function goNext(){ if(current<slides.length-1) showSlide(current+1); else if(settings.loop) showSlide(0); }
function goPrev(){ if(current>0) showSlide(current-1); }
function goFirst(){ showSlide(0); }

document.getElementById('prevBtn').onclick = goPrev;
document.getElementById('nextBtn').onclick = goNext;

// AUTO PLAY
function buildAutoSpeedBtns(){
  const row = document.getElementById('autoSpeedRow');
  [2,5,8,15].forEach(sec=>{
    const b = document.createElement('button');
    b.className='mBtn sm';
    b.id='as'+sec;
    b.textContent=sec+'秒';
    b.onclick=()=>{ settings.autoSec=sec; buildAutoSpeedBtns(); saveSettings(); };
    if(settings.autoSec===sec) b.classList.add('on');
    row.appendChild(b);
  });
}
function toggleAuto(){
  const btn = document.getElementById('autoBtn');
  if(autoTimer){
    clearInterval(autoTimer);
    autoTimer=null;
    btn.textContent='▷';
    btn.classList.remove('active');
  } else {
    autoTimer=setInterval(()=>{ if(current<slides.length-1) goNext(); else { if(settings.loop) showSlide(0); else toggleAuto(); }}, settings.autoSec*1000);
    btn.textContent='⏸';
    btn.classList.add('active');
  }
}
document.getElementById('autoBtn').onclick=toggleAuto;

// ============================================================
// SWIPE
// ============================================================
function setupSwipe(){
  const wrap = document.getElementById('slideWrap');
  let sx=0,sy=0,moved=false;
  wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;},{passive:true});
  wrap.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)>8||Math.abs(dy)>8) moved=true;
  },{passive:true});
  wrap.addEventListener('touchend',e=>{
    if(!moved) return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(settings.mode==='h'){
      if(Math.abs(dx)>40){ dx<0?goNext():goPrev(); }
    } else {
      if(Math.abs(dy)>40){ dy<0?goNext():goPrev(); }
    }
  });
}

// ============================================================
// PROGRESS TAP
// ============================================================
function setupProgress(){
  document.getElementById('progressWrap').onclick=e=>{
    const r=e.currentTarget.getBoundingClientRect();
    const ratio=(e.clientX-r.left)/r.width;
    showSlide(Math.round(ratio*(slides.length-1)));
  };
}

// ============================================================
// FX
// ============================================================
function doFlash(){
  const o = document.getElementById('flashOverlay');
  o.style.opacity='0.5';
  setTimeout(()=>o.style.opacity='0', 80);
}
let fxCtx=null;
function doFxSound(){
  try{
    if(!fxCtx) fxCtx=new AudioContext();
    const buf=fxCtx.createBuffer(1,fxCtx.sampleRate*.05,fxCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/300);
    const src=fxCtx.createBufferSource();
    src.buffer=buf;
    src.connect(fxCtx.destination);
    src.start();
  }catch(e){}
}

// ============================================================
// AUDIO
// ============================================================
document.getElementById('bgmFileInput').onchange=async function(e){
  const f=e.target.files[0];
  if(!f) return;
  await dbPut(BIN_STORE,'bgm',f);
  await saveMeta();
  loadBgmFromDB();
  document.getElementById('bgmBtn').textContent='🎵 '+f.name.slice(0,12);
  e.target.value='';
  showToast('BGM保存完了');
};
async function loadBgmFromDB(){
  const blob = await dbGet(BIN_STORE,'bgm');
  if(!blob) return;
  const el=document.getElementById('bgmAudio');
  if(bgmUrl) URL.revokeObjectURL(bgmUrl);
  bgmUrl=URL.createObjectURL(blob);
  el.src=bgmUrl;
  el.volume=settings.vol/100;
  el.loop=settings.loop;
  document.getElementById('bgmBtn').textContent='🎵 BGM読込済';
}
function setVol(v){
  settings.vol=+v;
  document.getElementById('volLabel').textContent=v+'%';
  document.getElementById('bgmAudio').volume=v/100;
  document.getElementById('voiceAudio').volume=v/100;
  saveSettings();
}
function toggleLoop(){
  settings.loop=!settings.loop;
  const el=document.getElementById('bgmAudio');
  el.loop=settings.loop;
  document.getElementById('loopBtn').textContent='🔁 ループ'+(settings.loop?'ON':'OFF');
  document.getElementById('loopBtn').classList.toggle('on',settings.loop);
  saveSettings();
}

async function playVoice(slide){
  if(!slide.voiceKey) return;
  const blob=await dbGet(BIN_STORE,slide.voiceKey);
  if(!blob) return;
  const el=document.getElementById('voiceAudio');
  const old=el.src;
  if(old) URL.revokeObjectURL(old);
  el.src=URL.createObjectURL(blob);
  el.volume=settings.vol/100;
  el.play().catch(()=>{});
}

// ============================================================
// SETTINGS
// ============================================================
function setMode(m){
  settings.mode=m;
  document.getElementById('modeH').classList.toggle('on',m==='h');
  document.getElementById('modeV').classList.toggle('on',m==='v');
  saveSettings();
}
function toggleFx(k){
  settings.fx[k]=!settings.fx[k];
  document.getElementById('fx'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('on',settings.fx[k]);
  saveSettings();
}
function setTr(t){
  settings.tr=t;
  ['trFade','trX','trY'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(t==='fade'?'trFade':t==='slideX'?'trX':'trY').classList.add('on');
  saveSettings();
}
function setSpeed(s){
  settings.speed=s;
  ['spFast','spNorm','spSlow'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(s==='fast'?'spFast':s==='normal'?'spNorm':'spSlow').classList.add('on');
  saveSettings();
}
function applySettings(){
  setMode(settings.mode);
  Object.keys(settings.fx).forEach(k=>{ settings.fx[k]=settings.fx[k]; toggleFx(k); toggleFx(k); });
  setTr(settings.tr);
  setSpeed(settings.speed);
  document.getElementById('volSlider').value=settings.vol;
  document.getElementById('volLabel').textContent=settings.vol+'%';
  document.getElementById('loopBtn').textContent='🔁 ループ'+(settings.loop?'ON':'OFF');
  document.getElementById('loopBtn').classList.toggle('on',settings.loop);
}
async function saveSettings(){
  await dbPut(META_STORE,'settings',settings);
}

// ============================================================
// MENU
// ============================================================
document.getElementById('menuBtn').onclick=openMenu;
document.getElementById('menuClose').onclick=closeMenu;
document.getElementById('menuOverlay').onclick=e=>{ if(e.target===document.getElementById('menuOverlay')) closeMenu(); };
function openMenu(){
  document.getElementById('menuOverlay').classList.add('open');
  updateStorageInfo();
}
function closeMenu(){ document.getElementById('menuOverlay').classList.remove('open'); }

async function updateStorageInfo(){
  const bins=await dbGetAll(BIN_STORE);
  let total=0;
  bins.forEach(r=>total+=r.value?.size||0);
  const metas=await dbGetAll(META_STORE);
  document.getElementById('storageInfo').textContent=
    `画像+音声: ${bins.length}件 / 約${(total/1024/1024).toFixed(1)}MB | 設定: ${metas.length}件`;
}

function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
}

async function clearAll(){
  if(!confirm('全データを削除しますか？')) return;
  await dbClear(META_STORE);
  await dbClear(BIN_STORE);
  slides=[];current=0;
  releaseAll();urlCache={};
  location.reload();
}

function exportMeta(){
  const data=JSON.stringify({slides:slides.map(s=>({name:s.name,voiceKey:s.voiceKey})),settings},null,2);
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(data);
  a.download='koma_meta.json';
  a.click();
}

// ============================================================
// GALLERY
// ============================================================
document.getElementById('galleryClose').onclick=closeGallery;
let voiceTargetIdx=null;

async function openGallery(){
  closeMenu();
  const grid=document.getElementById('galleryGrid');
  grid.innerHTML='';
  for(let i=0;i<slides.length;i++){
    const s=slides[i];
    const url=await getImgUrl(s.id);
    const div=document.createElement('div');
    div.className='thumbItem'+(i===current?' current':'');
    div.innerHTML=`
      <img src="${url}" loading="lazy">
      <span class="thumbNum">${i+1}</span>
      ${s.voiceKey?'<span class="thumbVoice">🔊</span>':''}
    `;
    div.onclick=()=>{ showSlide(i); closeGallery(); };

    // 長押しで音声設定
    let lt;
    div.addEventListener('touchstart',()=>{ lt=setTimeout(()=>{ voiceTargetIdx=i; document.getElementById('voiceFileInput').click(); },600); },{passive:true});
    div.addEventListener('touchend',()=>clearTimeout(lt),{passive:true});

    grid.appendChild(div);
  }
  document.getElementById('galleryOverlay').classList.add('open');
}
function closeGallery(){ document.getElementById('galleryOverlay').classList.remove('open'); }

document.getElementById('voiceFileInput').onchange=async function(e){
  const f=e.target.files[0];
  if(!f||voiceTargetIdx===null) return;
  const key='voice_'+Date.now();
  // 旧音声削除
  if(slides[voiceTargetIdx].voiceKey) await dbDel(BIN_STORE, slides[voiceTargetIdx].voiceKey);
  await dbPut(BIN_STORE,key,f);
  slides[voiceTargetIdx].voiceKey=key;
  await saveMeta();
  showToast(`🎤 コマ${voiceTargetIdx+1}に音声セット`);
  voiceTargetIdx=null;
  e.target.value='';
  openGallery();
};

// ============================================================
// MASCOT (canvas描画)
// ============================================================
function drawMascot(){
  const c=document.getElementById('mascotCanvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  const w=140,h=140;
  // 体
  ctx.fillStyle='#8B6914';
  roundRect(ctx,35,65,70,55,10);ctx.fill();
  // 顔
  ctx.fillStyle='#c8a050';
  roundRect(ctx,38,38,64,42,8);ctx.fill();
  // 目
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(57,57,10,12,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(83,57,10,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(59,58,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(85,58,5,0,Math.PI*2);ctx.fill();
  // 笑顔
  ctx.strokeStyle='#222';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(70,63,10,0.2,Math.PI-.2);ctx.stroke();
  // リール
  ctx.fillStyle='#5a4a20';
  ctx.beginPath();ctx.arc(52,32,14,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(88,32,14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(52,32,6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(88,32,6,0,Math.PI*2);ctx.fill();
  // 帽子
  ctx.fillStyle='#1a1a1a';
  roundRect(ctx,42,18,56,12,4);ctx.fill();
  ctx.fillRect(48,10,44,12);
  // 足
  ctx.fillStyle='#5a4a20';
  roundRect(ctx,42,115,22,20,6);ctx.fill();
  roundRect(ctx,76,115,22,20,6);ctx.fill();
  // レンズ
  ctx.fillStyle='#1a6080';
  ctx.beginPath();ctx.arc(70,98,12,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#888';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(70,98,12,0,Math.PI*2);ctx.stroke();
  // スマホ
  ctx.fillStyle='#ddd';roundRect(ctx,98,60,20,32,4);ctx.fill();
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.strokeRect(101,63,14,24);
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// ============================================================
// TOAST
// ============================================================
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ============================================================
// PAGE UNLOAD: Object URL解放
// ============================================================
window.addEventListener('pagehide',()=>{ releaseAll(); });
</script>
