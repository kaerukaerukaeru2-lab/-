<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#09090f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BABEL — Voice Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090f;
      --surface:   #111118;
      --border:    rgba(255,255,255,0.07);
      --border-hi: rgba(255,255,255,0.15);
      --text:      #e8e8f0;
      --muted:     rgba(232,232,240,0.35);
      --accent:    #00ffe0;
      --accent2:   #7b5ef8;
      --danger:    #ff3860;
      --r:         16px;
      --font-mono: 'Space Mono', monospace;
      --font-display: 'Syne', sans-serif;
      --font-body: 'Noto Sans JP', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    .noise {
      pointer-events: none;
      position: fixed; inset: 0; z-index: 999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.25em;
      position: relative;
    }
    .build-id {
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.15em;
      color: var(--muted); opacity: 0.4;
      margin-left: 6px; align-self: flex-end; padding-bottom: 4px;
    }
    .logo::after {
      content: '';
      position: absolute;
      left: 0; bottom: -3px;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-pill.listening  .status-dot { background: var(--danger);  box-shadow: 0 0 8px var(--danger);  animation: blink 1s infinite; }
    .status-pill.translating .status-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: blink 0.6s infinite; }
    .status-pill.done       .status-dot { background: var(--accent);   box-shadow: 0 0 8px var(--accent); }
    .status-text {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.12em;
      color: var(--muted); transition: color 0.3s;
    }
    .status-pill.listening   .status-text { color: var(--danger); }
    .status-pill.translating .status-text { color: var(--accent2); }
    .status-pill.done        .status-text { color: var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* MAIN */
    .main {
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 20px 32px;
      min-height: calc(100vh - 60px);
      gap: 16px;
    }

    /* LANG BAR */
    .lang-bar {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 20px;
    }
    .lang-btn {
      background: transparent; border: none;
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700; letter-spacing: 0.15em;
      color: var(--muted); cursor: pointer;
      padding: 4px 10px; border-radius: 999px;
      transition: all 0.2s;
    }
    .lang-btn.active { color: var(--bg); background: var(--accent); }
    .lang-arrow { color: var(--muted); display: flex; align-items: center; }
    .swap-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted); cursor: pointer;
      padding: 6px 10px;
      display: flex; align-items: center;
      transition: all 0.25s;
    }
    .swap-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); }

    /* VISUALIZER */
    .visualizer-wrap {
      position: relative;
      width: 100%; max-width: 340px;
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .visualizer {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border-radius: 50%;
    }
    .mic-btn {
      position: relative; z-index: 2;
      width: 80px; height: 80px; border-radius: 50%;
      border: 1px solid var(--border-hi);
      background: var(--surface);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .mic-btn:hover { transform: scale(1.08); border-color: var(--accent); box-shadow: 0 0 30px rgba(0,255,224,0.2); }
    .mic-btn.active { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 40px rgba(255,56,96,0.4); }
    .mic-icon, .stop-icon { width: 28px; height: 28px; }

    .mic-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0;
    }
    .mic-btn.active .mic-ring { animation: ripple 2s ease-out infinite; }
    .mic-btn.active .ring2   { animation: ripple 2s ease-out 1s infinite; }
    @keyframes ripple {
      0%   { width: 80px;  height: 80px;  opacity: 0.6; }
      100% { width: 240px; height: 240px; opacity: 0; }
    }

    /* CARDS */
    .cards { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      min-height: 90px;
      position: relative;
      transition: border-color 0.3s;
    }
    .card--src { border-left: 2px solid var(--accent2); }
    .card--tgt { border-left: 2px solid var(--accent); }
    .card-label {
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.2em;
      color: var(--muted); margin-bottom: 8px;
    }
    .card-text {
      font-size: 15px; line-height: 1.7;
      color: var(--text); word-break: break-word; min-height: 1.7em;
    }
    .placeholder { color: var(--muted); font-size: 13px; }
    .interim { color: var(--muted); font-style: italic; }

    .card-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 6px;
    }
    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      cursor: pointer; padding: 6px;
      display: flex; align-items: center;
      transition: all 0.2s;
    }
    .icon-btn:hover  { border-color: var(--accent); color: var(--accent); }
    .icon-btn.active { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 10px rgba(123,94,248,0.3); }
    .icon-btn.copied { border-color: var(--accent); color: var(--accent); }

    .api-badge {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.15em;
      color: var(--muted); opacity: 0.5;
    }

    /* FAVORITES */
    .fav-section {
      width: 100%; max-width: 480px;
    }
    .fav-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2px 10px;
    }
    .fav-title {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.2em; color: var(--muted);
    }
    .fav-toggle-btn {
      background: transparent;
      border: 1px solid var(--border); border-radius: 4px;
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em;
      color: var(--muted); cursor: pointer; padding: 3px 8px;
      transition: all 0.2s;
    }
    .fav-toggle-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .fav-list {
      display: flex; flex-direction: column; gap: 6px;
    }
    .fav-empty {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); text-align: center;
      padding: 16px 0; opacity: 0.4;
    }
    .fav-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent2);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.25s ease;
      cursor: pointer; transition: border-color 0.2s;
    }
    .fav-item:hover { border-color: var(--accent2); }
    .fav-item-texts { flex: 1; min-width: 0; }
    .fav-item-src {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fav-item-tgt {
      font-size: 14px; color: var(--text); line-height: 1.5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fav-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .fav-speak-btn, .fav-del-btn {
      background: transparent; border: none;
      color: var(--muted); cursor: pointer; padding: 4px;
      display: flex; align-items: center; transition: color 0.2s;
    }
    .fav-speak-btn:hover { color: var(--accent); }
    .fav-del-btn:hover   { color: var(--danger); }
    .icon-btn.pinned { border-color: var(--accent2); color: var(--accent2); }

    /* INPUT MODE BAR */
    .input-mode-bar {
      display: flex; gap: 6px;
      margin-top: 10px;
    }
    .mode-btn {
      display: flex; align-items: center; gap: 5px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.1em;
      color: var(--muted); cursor: pointer;
      padding: 5px 10px;
      transition: all 0.18s;
    }
    .mode-btn.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(123,94,248,0.1);
    }
    .mode-btn:not(.active):hover { border-color: var(--border-hi); color: var(--text); }

    /* TEXTAREA */
    .src-textarea {
      width: 100%;
      background: transparent;
      border: none; outline: none; resize: none;
      font-family: var(--font-body);
      font-size: 15px; line-height: 1.7;
      color: var(--text);
      min-height: 80px;
      padding: 0;
      caret-color: var(--accent);
    }
    .src-textarea::placeholder { color: var(--muted); font-size: 13px; }

    /* TRANSLATE BUTTON */
    .translate-btn {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px;
      background: var(--accent2);
      border: none; border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      color: #fff; cursor: pointer;
      padding: 8px 16px;
      transition: opacity 0.2s, transform 0.15s;
      width: 100%;
      justify-content: center;
    }
    .translate-btn:hover { opacity: 0.85; transform: scale(0.99); }
    .translate-btn:active { transform: scale(0.97); }
    .translate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* REPEAT BUTTON (音声→音声モード) */
    .repeat-btn {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--accent); cursor: pointer;
      padding: 8px 16px;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
    }
    .repeat-btn:hover { background: rgba(0,255,224,0.1); }
    .repeat-btn.speaking { background: rgba(0,255,224,0.15); animation: pulse 1.2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* LANG PICKER */
    .lang-picker {
      width: 100%; max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: var(--r);
      padding: 10px;
      animation: slideIn 0.18s ease;
    }
    .lang-picker-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .lang-pick-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--muted); cursor: pointer;
      padding: 10px 4px;
      transition: all 0.18s;
    }
    .lang-pick-btn:hover  { border-color: var(--accent); color: var(--accent); }
    .lang-pick-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,224,0.08); }

    /* SUBTITLE MODE */
    .subtitle-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      gap: 24px;
    }
    .subtitle-overlay.active { display: flex; }
    .subtitle-lang-bar {
      display: flex; align-items: center; gap: 10px;
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    }
    .subtitle-lang { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.2em; }
    .subtitle-arrow { color: rgba(255,255,255,0.2); font-size: 12px; }
    .subtitle-src {
      font-size: clamp(18px, 4vw, 28px);
      color: rgba(255,255,255,0.35);
      text-align: center; line-height: 1.5;
      max-width: 90vw;
    }
    .subtitle-tgt {
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 400;
      color: #fff;
      text-align: center; line-height: 1.3;
      max-width: 90vw;
      word-break: break-word;
      text-shadow: 0 0 40px rgba(0,255,224,0.3);
    }
    .subtitle-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: rgba(255,255,255,0.5);
      cursor: pointer; padding: 8px 12px;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
    }
    .subtitle-close:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .subtitle-mic {
      position: absolute; bottom: 40px;
      width: 64px; height: 64px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .subtitle-mic.active { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 30px rgba(255,56,96,0.5); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* HISTORY */
    .history-section {
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; gap: 0;
    }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2px 10px;
    }
    .history-title {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.2em;
      color: var(--muted);
    }
    .history-clear {
      background: transparent; border: none;
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.1em;
      color: var(--muted); cursor: pointer;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all 0.2s;
    }
    .history-clear:hover { color: var(--danger); border-color: var(--danger); }
    .history-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .history-empty {
      font-family: var(--font-mono);
      font-size: 11px; color: var(--muted);
      text-align: center; padding: 20px 0;
      opacity: 0.4;
    }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 6px;
      animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: var(--border-hi); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .history-meta {
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-langs {
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.12em;
      color: var(--accent2);
    }
    .history-time {
      font-family: var(--font-mono);
      font-size: 9px; color: var(--muted); opacity: 0.5;
    }
    .history-src {
      font-size: 12px; color: var(--muted);
      line-height: 1.5; word-break: break-word;
    }
    .history-tgt {
      font-size: 14px; color: var(--text);
      line-height: 1.6; word-break: break-word;
      border-left: 2px solid var(--accent);
      padding-left: 8px;
    }
    .history-speak {
      align-self: flex-end;
      background: transparent; border: none;
      color: var(--muted); cursor: pointer;
      padding: 2px 4px;
      transition: color 0.2s;
      display: flex; align-items: center;
    }
    .history-speak:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header class="header">
    <div style="display:flex;align-items:flex-end;gap:6px">
      <div class="logo">BABEL</div>
      <div class="build-id">v2</div>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="status-dot"></span>
      <span class="status-text" id="statusText">READY</span>
    </div>
  </header>

  <main class="main">
    <div class="lang-bar">
      <button class="lang-btn active" id="langSrc">EN</button>
      <button class="swap-btn" id="swapBtn" aria-label="言語を入れ替え">
        <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
          <path d="M1 4h14M11 1l4 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 10H5M9 7l-4 3 4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="lang-btn" id="langTgt">JA</button>
    </div>

    <!-- 言語選択ピッカー（共通） -->
    <div class="lang-picker" id="langPicker" style="display:none">
      <div class="lang-picker-inner" id="langPickerInner"></div>
    </div>

    <div class="visualizer-wrap">
      <canvas id="visualizer" class="visualizer"></canvas>
      <button class="mic-btn" id="micBtn" aria-label="録音開始">
        <div class="mic-ring"></div>
        <div class="mic-ring ring2"></div>
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
          <path d="M5 10a7 7 0 0014 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <svg class="stop-icon" viewBox="0 0 24 24" fill="none" style="display:none">
          <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <div class="cards">
      <div class="card card--src">
        <div class="card-label" id="inputModeLabel">INPUT — 🎤 VOICE</div>
        <div class="card-text" id="srcText"><span class="placeholder">ここに話しかけてください…</span></div>
        <textarea class="src-textarea" id="srcTextarea" placeholder="ここにテキストを入力…" style="display:none"></textarea>
        <div class="input-mode-bar">
          <button class="mode-btn active" id="modeMic" title="音声→テキスト翻訳">
            <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/><path d="M5 10a7 7 0 0014 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            🎤→T
          </button>
          <button class="mode-btn" id="modeMicSpeak" title="音声→音声翻訳">

    <!-- 履歴 -->

  <!-- 字幕モードオーバーレイ -->
  <div class="subtitle-overlay" id="subtitleOverlay">
    <div class="subtitle-lang-bar">
      <span class="subtitle-lang" id="subSrcLang">EN</span>
      <span class="subtitle-arrow">→</span>
      <span class="subtitle-lang" id="subTgtLang">JA</span>
    </div>
    <div class="subtitle-src" id="subtitleSrc">—</div>
    <div class="subtitle-tgt" id="subtitleTgt">翻訳結果</div>
    <button class="subtitle-mic" id="subtitleMic">
      <svg viewBox="0 0 24 24" fill="none" width="26" height="26">
        <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
        <path d="M5 10a7 7 0 0014 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>

    <button class="subtitle-close" id="subtitleClose">✕ CLOSE</button>
  </div>

  <script>
(() => {
  /* ================================================================
     0. UTILS（最初に定義 — どこからでも参照可能）
  ================================================================ */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  const SRC_PH = ['話しかけ','Speak here','말씀해 주세요','请在这里说话','聴いています','Listening','듣고 있습니다','正在聆听','—'];
  const TGT_PH = ['翻訳結果','翻訳中','Translation','Translating','번역 결과','번역 중','翻译结果','翻译中','—'];
  const isSrcPH = t => SRC_PH.some(p => t.includes(p));
  const isTgtPH = t => TGT_PH.some(p => t.includes(p));

  /* ================================================================
     1. DOM 取得
  ================================================================ */
  const micBtn        = document.getElementById('micBtn');
  const micIcon       = micBtn.querySelector('.mic-icon');
  const stopIcon      = micBtn.querySelector('.stop-icon');
  const srcText       = document.getElementById('srcText');
  const tgtText       = document.getElementById('tgtText');
  const statusPill    = document.getElementById('statusPill');
  const statusText    = document.getElementById('statusText');
  const copyBtn       = document.getElementById('copyBtn');
  const speakBtn      = document.getElementById('speakBtn');
  const pinBtn        = document.getElementById('pinBtn');
  const subtitleBtn   = document.getElementById('subtitleBtn');
  const apiBadge      = document.getElementById('apiBadge');
  const canvas        = document.getElementById('visualizer');
  const ctx           = canvas.getContext('2d');
  const langSrcBtn    = document.getElementById('langSrc');
  const langTgtBtn    = document.getElementById('langTgt');
  const swapBtn       = document.getElementById('swapBtn');
  const langPicker    = document.getElementById('langPicker');
  const langPickerInner = document.getElementById('langPickerInner');
  const modeMicBtn    = document.getElementById('modeMic');
  const modeMicSpkBtn = document.getElementById('modeMicSpeak');
  const modeTextBtn   = document.getElementById('modeText');
  const srcTextarea   = document.getElementById('srcTextarea');
  const translateBtn  = document.getElementById('translateBtn');
  const repeatBtn     = document.getElementById('repeatBtn');
  const inputModeLabel= document.getElementById('inputModeLabel');
  const visualizerWrap= document.querySelector('.visualizer-wrap');
  const cardActions   = document.querySelector('.card-actions');
  const favList       = document.getElementById('favList');
  const favEmpty      = document.getElementById('favEmpty');
  const favToggle     = document.getElementById('favToggle');
  const historyList   = document.getElementById('historyList');
  const historyEmpty  = document.getElementById('historyEmpty');
  const historyClear  = document.getElementById('historyClear');
  const subtitleOverlay = document.getElementById('subtitleOverlay');
  const subtitleClose = document.getElementById('subtitleClose');
  const subtitleMic   = document.getElementById('subtitleMic');
  const subtitleSrcEl = document.getElementById('subtitleSrc');
  const subtitleTgtEl = document.getElementById('subtitleTgt');
  const subSrcLangEl  = document.getElementById('subSrcLang');
  const subTgtLangEl  = document.getElementById('subTgtLang');

  /* ================================================================
     2. STATE & CONSTANTS
  ================================================================ */
  const LANGS = { 'en-US':'EN', 'ja-JP':'JA', 'ko-KR':'KO', 'zh-CN':'ZH' };
  const LANG_KEYS = Object.keys(LANGS);
  const FAVS_KEY  = 'babel_favorites';

  let srcLang        = 'en-US';
  let tgtLang        = 'ja-JP';
  let inputMode      = 'voice';   // 'voice' | 'voice-speak' | 'text'
  let autoSpeak      = false;
  let isListening    = false;
  let recognition    = null;
  let restartTimer   = null;
  let audioCtx       = null;
  let analyser       = null;
  let micStream      = null;
  let animFrame      = null;
  let translateTimer = null;
  let lastTranscript = '';
  let noSpeechCount  = 0;
  let isSpeaking     = false;
  let cachedVoices   = [];
  let pickerTarget   = null;
  let favorites      = JSON.parse(localStorage.getItem(FAVS_KEY) || '[]');
  let favVisible     = true;
  let historyLog     = [];
  let subListening   = false;
  let subRecognition = null;
  let subRestartTimer= null;
  let subTranslateTimer = null;
  let subTranscript  = '';
  let micBusy        = false; // 二重クリックガード用

  /* ================================================================
     3. 関数定義
  ================================================================ */

  /* --- Status --- */
  function setStatus(state, label) {
    statusPill.className = 'status-pill ' + state;
    statusText.textContent = label;
  }

  /* --- Canvas & Visualizer --- */
  function resizeCanvas() {
    if (visualizerWrap.offsetWidth === 0) return;
    const size = Math.min(visualizerWrap.offsetWidth, visualizerWrap.offsetHeight);
    canvas.width  = size * devicePixelRatio;
    canvas.height = size * devicePixelRatio;
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  function drawIdleRing() {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    ctx.arc(w/2, h/2, w/2 * 0.72, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1; ctx.stroke();
  }

  function drawViz() {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const cx = w/2, cy = h/2, radius = cx * 0.72;
    const data = new Uint8Array(analyser ? analyser.frequencyBinCount : 64);
    if (analyser) analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, w, h);
    const bars = 64, step = Math.floor(data.length / bars);
    const color = isListening ? '#ff3860' : '#00ffe0';
    for (let i = 0; i < bars; i++) {
      const val   = data[i * step] / 255;
      const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle)*radius, cy + Math.sin(angle)*radius);
      ctx.lineTo(cx + Math.cos(angle)*(radius + val*radius*0.45+2),
                 cy + Math.sin(angle)*(radius + val*radius*0.45+2));
      ctx.strokeStyle = color; ctx.lineWidth = 2.5;
      ctx.globalAlpha = 0.2 + val*0.8; ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, radius-1, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1; ctx.stroke();
    animFrame = requestAnimationFrame(drawViz);
  }

  async function startVisualizer() {
    // getUserMedia は使わない → Web Speech API とのマイク競合を防ぐ
    // アクティブ中はダミーアニメーションで波形を表現
    drawVizDummy();
  }

  function drawVizDummy() {
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const cx = w/2, cy = h/2, radius = cx * 0.72;
    ctx.clearRect(0, 0, w, h);
    const bars = 64;
    const t = Date.now() / 400;
    const color = isListening ? '#ff3860' : '#00ffe0';
    for (let i = 0; i < bars; i++) {
      const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
      const val = (Math.sin(t + i * 0.4) * 0.5 + 0.5) * (isListening ? 0.6 : 0.15);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
      ctx.lineTo(cx + Math.cos(angle) * (radius + val * radius * 0.45 + 2),
                 cy + Math.sin(angle) * (radius + val * radius * 0.45 + 2));
      ctx.strokeStyle = color; ctx.lineWidth = 2.5;
      ctx.globalAlpha = 0.2 + val * 0.8; ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, radius - 1, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1; ctx.stroke();
    animFrame = requestAnimationFrame(drawVizDummy);
  }

  function stopVisualizer() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)  { audioCtx.close(); audioCtx = null; }
    analyser = null;
    drawIdleRing();
  }

  /* --- Error helper --- */
  function showError(msg) {
    tgtText.innerHTML = `<span class="placeholder" style="color:#ff3860">⚠ ${esc(msg)}</span>`;
    setStatus('', 'ERROR');
    console.error('[BABEL]', msg);
  }

  /* --- Translate API --- */
  async function translate(text) {
    const src = srcLang.split('-')[0];
    const tgt = tgtLang.split('-')[0];
    // 1st: Chrome Translation API
    if ('translation' in self) {
      try {
        const pair = { sourceLanguage: src, targetLanguage: tgt };
        if (await self.translation.canTranslate(pair) !== 'no') {
          const t = await self.translation.createTranslator(pair);
          const r = await t.translate(text);
          if (r && r.trim()) return { text: r, engine: 'chrome' };
        }
      } catch(e) { console.warn('Chrome TL fallback:', e); }
    }
    // 2nd: MyMemory
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
      const res  = await fetch(url, { signal: AbortSignal.timeout(10000) });
      const data = await res.json();
      if (data.responseStatus === 200) return { text: data.responseData.translatedText, engine: 'mymemory' };
      throw new Error('MyMemory: ' + data.responseDetails);
    } catch(e) {
      let msg = e.message || '';
      if (msg.includes('Failed to fetch') || msg.includes('network')) msg = 'ネットワーク接続失敗（オフライン？）';
      else if (msg.includes('timeout') || msg.includes('Abort'))      msg = 'タイムアウト（10秒超過）';
      else if (msg.includes('quota') || msg.includes('QUOTA'))        msg = 'MyMemory 日次上限超過（明日リセット）';
      throw new Error(msg || '翻訳API接続失敗');
    }
  }

  /* --- TTS --- */
  if ('speechSynthesis' in window) {
    cachedVoices = window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { cachedVoices = window.speechSynthesis.getVoices(); };
  }

  function speak(text, lang, allowRestart = false) {
    if (!('speechSynthesis' in window)) { alert('このブラウザは音声読み上げに対応していません。'); return; }
    if (isSpeaking && !allowRestart) {
      window.speechSynthesis.cancel();
      isSpeaking = false; speakBtn.classList.remove('active'); return;
    }
    window.speechSynthesis.cancel(); isSpeaking = false;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang  = lang; utter.rate = 0.95; utter.pitch = 1;
    const match = cachedVoices.find(v => v.lang.startsWith(lang.split('-')[0]));
    if (match) utter.voice = match;
    utter.onstart = () => {
      isSpeaking = true;
      if (cardActions.style.display !== 'none') speakBtn.classList.add('active');
    };
    utter.onend = utter.onerror = () => {
      isSpeaking = false;
      speakBtn.classList.remove('active');
      repeatBtn.classList.remove('speaking');
    };
    window.speechSynthesis.speak(utter);
  }

  /* --- runTranslate --- */
  function scheduleTranslate() {
    clearTimeout(translateTimer);
    translateTimer = setTimeout(runTranslate, 800);
  }

  async function runTranslate() {
    const text = lastTranscript.trim();
    if (!text) return;
    setStatus('translating', 'TRANSLATING');
    const ph = { 'ja-JP':'翻訳中…', 'ko-KR':'번역 중…', 'zh-CN':'翻译中…' }[tgtLang] || 'Translating...';
    tgtText.innerHTML = `<span class="placeholder">${ph}</span>`;
    try {
      const result = await translate(text);
      tgtText.textContent = result.text;
      setStatus('done', 'DONE');
      apiBadge.textContent = 'via ' + result.engine.toUpperCase();
      addHistory(text, result.text, srcLang, tgtLang);
      updatePinBtn();
      if (autoSpeak) {
        repeatBtn.style.display = '';
        repeatBtn.classList.add('speaking');
        speak(result.text, tgtLang, true);
      }
    } catch(e) { showError(e.message || '翻訳に失敗しました'); }
  }

  /* --- Speech Recognition --- */
  function buildRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = srcLang; r.continuous = true; r.interimResults = true; r.maxAlternatives = 1;

    r.onstart = () => { noSpeechCount = 0; setStatus('listening', 'LISTENING'); };

    r.onresult = (e) => {
      noSpeechCount = 0;
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? (final += t) : (interim += t);
      }
      srcText.innerHTML = esc(lastTranscript + final)
        + (interim ? `<span class="interim">${esc(interim)}</span>` : '');
      if (final) { lastTranscript += final; scheduleTranslate(); }
      else if (interim) {
        clearTimeout(translateTimer);
        translateTimer = setTimeout(() => {
          if (!lastTranscript && interim.trim()) { lastTranscript = interim.trim(); runTranslate(); }
        }, 1500);
      }
    };

    r.onerror = (e) => {
      if (e.error === 'no-speech') {
        noSpeechCount++;
        if (noSpeechCount >= 3) setStatus('listening', 'WAITING...');
        return;
      }
      if (e.error === 'aborted') return;
      const msgs = {
        'not-allowed':         'マイク許可が必要です（ブラウザ設定を確認）',
        'service-not-allowed': 'マイク許可が必要です（HTTPS必須）',
        'network':             '音声認識: ネット接続エラー',
        'audio-capture':       'マイクが見つかりません',
        'language-not-supported': 'この言語は音声認識非対応',
      };
      showError(msgs[e.error] || '音声エラー: ' + e.error);
    };

    r.onend = () => {
      if (!isListening) return;
      clearTimeout(restartTimer);
      restartTimer = setTimeout(() => {
        if (!isListening) return;
        try { r.start(); } catch(err) { if (err.name !== 'InvalidStateError') console.warn(err); }
      }, 150);
    };
    return r;
  }

  async function startListening() {
    if (micBusy) return;   // 非同期処理中の二重クリックを防ぐ
    micBusy = true;

    // TTS発話中なら完全に止めてから開始（デッドロック防止）
    if (isSpeaking) {
      window.speechSynthesis.cancel();
      isSpeaking = false;
      speakBtn.classList.remove('active');
      await new Promise(r => setTimeout(r, 150)); // ブラウザがcancel処理を完了するのを待つ
    }

    isListening = true; noSpeechCount = 0; lastTranscript = '';
    const hint = { 'ja-JP':'聴いています…','ko-KR':'듣고 있습니다…','zh-CN':'正在聆听…' }[srcLang] || 'Listening...';
    const tgtHint = { 'ja-JP':'翻訳結果がここに表示されます','ko-KR':'번역 결과가 여기에 표시됩니다','zh-CN':'翻译结果将显示在这里' }[tgtLang] || 'Translation appears here';
    srcText.innerHTML = `<span class="placeholder">${hint}</span>`;
    tgtText.innerHTML = `<span class="placeholder">${tgtHint}</span>`;
    apiBadge.textContent = '— —';
    micBtn.classList.add('active');
    micIcon.style.display = 'none';
    stopIcon.style.display = 'block';
    setStatus('listening', 'LISTENING');
    recognition = buildRecognition();
    if (!recognition) {
      showError('このブラウザはWeb Speech APIに対応していません');
      micBusy = false;
      stopListening(); return;
    }
    await startVisualizer();
    try { recognition.start(); }
    catch(e) { showError('音声認識起動失敗: ' + e.name); }
    micBusy = false;
  }

  function stopListening() {
    isListening = false;
    micBusy = false;
    clearTimeout(restartTimer); clearTimeout(translateTimer);
    micBtn.classList.remove('active');
    micIcon.style.display = 'block';
    stopIcon.style.display = 'none';
    if (recognition) { recognition.onend = null; try { recognition.stop(); } catch(_) {} recognition = null; }
    stopVisualizer();
    if (lastTranscript.trim()) runTranslate();
    else setStatus('', 'READY');
  }

  /* --- Input Mode --- */
  function setInputMode(mode) {
    inputMode = mode;
    autoSpeak = (mode === 'voice-speak');
    lastTranscript = '';
    if (isListening) stopListening();
    window.speechSynthesis && window.speechSynthesis.cancel();
    isSpeaking = false;
    speakBtn.classList.remove('active');
    srcTextarea.value = '';
    srcText.innerHTML = '<span class="placeholder">—</span>';
    tgtText.innerHTML = '<span class="placeholder">—</span>';
    apiBadge.textContent = '— —';
    repeatBtn.style.display = 'none';
    repeatBtn.classList.remove('speaking');
    setStatus('', 'READY');
    [modeMicBtn, modeMicSpkBtn, modeTextBtn].forEach(b => b.classList.remove('active'));

    if (mode === 'voice' || mode === 'voice-speak') {
      (mode === 'voice' ? modeMicBtn : modeMicSpkBtn).classList.add('active');
      srcText.style.display = '';
      srcTextarea.style.display = 'none';
      translateBtn.style.display = 'none';
      visualizerWrap.style.display = '';
      inputModeLabel.textContent = mode === 'voice' ? 'INPUT — 🎤→T' : 'INPUT — 🎤→🔊';
      cardActions.style.display  = mode === 'voice' ? '' : 'none';
    } else {
      modeTextBtn.classList.add('active');
      srcText.style.display = 'none';
      srcTextarea.style.display = '';
      translateBtn.style.display = '';
      visualizerWrap.style.display = 'none';
      cardActions.style.display = '';
      inputModeLabel.textContent = 'INPUT — ⌨️ T→T';
      srcTextarea.focus();
    }
  }

  async function runTextTranslate() {
    const text = srcTextarea.value.trim();
    if (!text) return;
    lastTranscript = text;
    srcText.textContent = text;
    translateBtn.disabled = true;
    await runTranslate();
    translateBtn.disabled = false;
  }

  /* --- Lang --- */
  function resetCards() {
    lastTranscript = '';
    if (isListening) stopListening();
    window.speechSynthesis && window.speechSynthesis.cancel();
    isSpeaking = false; speakBtn.classList.remove('active');
    srcTextarea.value = '';
    repeatBtn.style.display = 'none'; repeatBtn.classList.remove('speaking');
    const hint    = { 'ja-JP':'ここに話しかけてください…','ko-KR':'여기에 말씀해 주세요…','zh-CN':'请在这里说话…' }[srcLang] || 'Speak here...';
    const tgtHint = { 'ja-JP':'翻訳結果がここに表示されます','ko-KR':'번역 결과가 여기에 표시됩니다','zh-CN':'翻译结果将显示在这里' }[tgtLang] || 'Translation appears here';
    srcText.innerHTML = `<span class="placeholder">${hint}</span>`;
    tgtText.innerHTML = `<span class="placeholder">${tgtHint}</span>`;
    apiBadge.textContent = '— —';
    setStatus('', 'READY');
  }

  function swapLang() {
    [srcLang, tgtLang] = [tgtLang, srcLang];
    langSrcBtn.textContent = LANGS[srcLang]; langTgtBtn.textContent = LANGS[tgtLang];
    langSrcBtn.classList.add('active'); langTgtBtn.classList.remove('active');
    resetCards();
  }

  function openLangPicker(target) {
    pickerTarget = target;
    langPickerInner.innerHTML = '';
    LANG_KEYS.forEach(code => {
      const btn = document.createElement('button');
      btn.className = 'lang-pick-btn';
      btn.textContent = LANGS[code];
      if (code === (target === 'src' ? srcLang : tgtLang)) btn.classList.add('active');
      btn.addEventListener('click', () => selectLang(code));
      langPickerInner.appendChild(btn);
    });
    langPicker.style.display = '';
  }

  function closeLangPicker() { langPicker.style.display = 'none'; pickerTarget = null; }

  function selectLang(code) {
    if (pickerTarget === 'src') {
      if (code === tgtLang) { swapLang(); }
      else { srcLang = code; langSrcBtn.textContent = LANGS[srcLang]; langSrcBtn.classList.add('active'); langTgtBtn.classList.remove('active'); resetCards(); }
    } else {
      if (code === srcLang) { swapLang(); }
      else { tgtLang = code; langTgtBtn.textContent = LANGS[tgtLang]; langSrcBtn.classList.add('active'); langTgtBtn.classList.remove('active'); resetCards(); }
    }
    closeLangPicker();
  }

  /* --- Favorites --- */
  function saveFavs() { localStorage.setItem(FAVS_KEY, JSON.stringify(favorites)); }

  function renderFavs() {
    if (favEmpty.parentNode) favEmpty.parentNode.removeChild(favEmpty);
    favList.innerHTML = '';
    if (favorites.length === 0) { favList.appendChild(favEmpty); return; }
    favorites.forEach((fav, idx) => {
      const item = document.createElement('div');
      item.className = 'fav-item';
      item.innerHTML = `
        <div class="fav-item-texts">
          <div class="fav-item-src">${esc(fav.srcTxt)}</div>
          <div class="fav-item-tgt">${esc(fav.tgtTxt)}</div>
        </div>
        <div class="fav-item-actions">
          <button class="fav-speak-btn" data-idx="${idx}">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <button class="fav-del-btn" data-idx="${idx}">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>`;
      item.querySelector('.fav-speak-btn').addEventListener('click', e => {
        e.stopPropagation();
        const f = favorites[+e.currentTarget.dataset.idx];
        speak(f.tgtTxt, f.tLang || tgtLang, true);
      });
      item.querySelector('.fav-del-btn').addEventListener('click', e => {
        e.stopPropagation();
        favorites.splice(+e.currentTarget.dataset.idx, 1);
        saveFavs(); renderFavs(); updatePinBtn();
      });
      item.addEventListener('click', () => { srcText.textContent = fav.srcTxt; tgtText.textContent = fav.tgtTxt; });
      favList.appendChild(item);
    });
  }

  function updatePinBtn() {
    const src = srcText.textContent, tgt = tgtText.textContent;
    pinBtn.classList.toggle('pinned', favorites.some(f => f.srcTxt === src && f.tgtTxt === tgt));
  }

  /* --- History --- */
  function addHistory(srcTxt, tgtTxt, sLang, tLang) {
    historyLog.unshift({ srcTxt, tgtTxt, sLang, tLang, time: new Date() });
    renderHistory();
  }

  function renderHistory() {
    if (historyEmpty.parentNode) historyEmpty.parentNode.removeChild(historyEmpty);
    historyList.innerHTML = '';
    if (historyLog.length === 0) {
      historyList.appendChild(historyEmpty); historyEmpty.style.display = 'block'; return;
    }
    historyEmpty.style.display = 'none';
    historyLog.forEach((entry, idx) => {
      const hh = String(entry.time.getHours()).padStart(2,'0');
      const mm = String(entry.time.getMinutes()).padStart(2,'0');
      const srcCode = entry.sLang.split('-')[0].toUpperCase();
      const tgtCode = entry.tLang.split('-')[0].toUpperCase();
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-meta">
          <span class="history-langs">${srcCode} → ${tgtCode}</span>
          <span class="history-time">${hh}:${mm}</span>
        </div>
        <div class="history-src">${esc(entry.srcTxt)}</div>
        <div class="history-tgt">${esc(entry.tgtTxt)}</div>
        <button class="history-speak" data-idx="${idx}">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>`;
      item.querySelector('.history-speak').addEventListener('click', e => {
        e.stopPropagation();
        const i = +e.currentTarget.dataset.idx;
        speak(historyLog[i].tgtTxt, historyLog[i].tLang, true);
      });
      item.addEventListener('click', () => { srcText.textContent = entry.srcTxt; tgtText.textContent = entry.tgtTxt; });
      historyList.appendChild(item);
    });
  }

  /* --- Subtitle --- */
  function openSubtitle() {
    subtitleOverlay.classList.add('active');
    subSrcLangEl.textContent = LANGS[srcLang];
    subTgtLangEl.textContent = LANGS[tgtLang];
    const curSrc = srcText.textContent, curTgt = tgtText.textContent;
    subtitleSrcEl.textContent = isSrcPH(curSrc) ? '—' : curSrc;
    subtitleTgtEl.textContent = isTgtPH(curTgt) ? '—' : curTgt;
  }

  function closeSubtitle() { subtitleOverlay.classList.remove('active'); stopSubListening(); }

  function startSubListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    subListening = true; subTranscript = ''; subtitleMic.classList.add('active');
    subRecognition = new SR();
    subRecognition.lang = srcLang; subRecognition.continuous = true;
    subRecognition.interimResults = true; subRecognition.maxAlternatives = 1;
    subRecognition.onresult = async (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? (final += t) : (interim += t);
      }
      subtitleSrcEl.textContent = subTranscript + final + interim;
      if (final) {
        subTranscript += final;
        clearTimeout(subTranslateTimer);
        subTranslateTimer = setTimeout(async () => {
          try {
            const result = await translate(subTranscript.trim());
            subtitleTgtEl.textContent = result.text;
            srcText.textContent = subTranscript.trim();
            tgtText.textContent = result.text;
            addHistory(subTranscript.trim(), result.text, srcLang, tgtLang);
          } catch(err) { subtitleTgtEl.textContent = '⚠ ' + (err.message || '翻訳失敗'); }
        }, 800);
      }
    };
    subRecognition.onerror = (e) => { if (e.error !== 'aborted' && e.error !== 'no-speech') console.warn('sub error:', e.error); };
    subRecognition.onend = () => {
      if (!subListening) return;
      clearTimeout(subRestartTimer);
      subRestartTimer = setTimeout(() => { if (!subListening) return; try { subRecognition.start(); } catch(_) {} }, 150);
    };
    try { subRecognition.start(); } catch(e) {}
  }

  function stopSubListening() {
    subListening = false;
    clearTimeout(subRestartTimer); clearTimeout(subTranslateTimer);
    subtitleMic.classList.remove('active');
    if (subRecognition) { subRecognition.onend = null; try { subRecognition.stop(); } catch(_) {} subRecognition = null; }
  }

  /* ================================================================
     4. イベントリスナー登録
  ================================================================ */
  micBtn.addEventListener('click', () => {
    if (micBusy) return; // 処理中は無視
    setStatus('', 'MIC TAPPED');
    isListening ? stopListening() : startListening();
  });

  modeMicBtn.addEventListener('click',    () => setInputMode('voice'));
  modeMicSpkBtn.addEventListener('click', () => setInputMode('voice-speak'));
  modeTextBtn.addEventListener('click',   () => setInputMode('text'));

  srcTextarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runTextTranslate(); }
  });
  translateBtn.addEventListener('click', runTextTranslate);

  repeatBtn.addEventListener('click', () => {
    const text = tgtText.textContent;
    if (!text || isTgtPH(text)) return;
    repeatBtn.classList.add('speaking');
    speak(text, tgtLang, true);
  });

  speakBtn.addEventListener('click', () => {
    const text = tgtText.textContent;
    if (!text || isTgtPH(text)) return;
    speak(text, tgtLang);
  });

  copyBtn.addEventListener('click', async () => {
    const text = tgtText.textContent;
    if (!text || isTgtPH(text)) return;
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.classList.add('copied');
      setTimeout(() => copyBtn.classList.remove('copied'), 1500);
    } catch(e) {
      copyBtn.style.color = '#ff3860'; copyBtn.style.borderColor = '#ff3860';
      setTimeout(() => { copyBtn.style.color = ''; copyBtn.style.borderColor = ''; }, 1500);
    }
  });

  pinBtn.addEventListener('click', () => {
    const src = srcText.textContent, tgt = tgtText.textContent;
    if (!src || !tgt || isSrcPH(src) || isTgtPH(tgt)) return;
    const idx = favorites.findIndex(f => f.srcTxt === src && f.tgtTxt === tgt);
    if (idx >= 0) favorites.splice(idx, 1);
    else favorites.unshift({ srcTxt: src, tgtTxt: tgt, sLang: srcLang, tLang: tgtLang });
    saveFavs(); renderFavs(); updatePinBtn();
  });

  favToggle.addEventListener('click', () => {
    favVisible = !favVisible;
    favList.style.display = favVisible ? '' : 'none';
    favToggle.textContent = favVisible ? '非表示' : '表示';
  });

  swapBtn.addEventListener('click', swapLang);

  langSrcBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    pickerTarget === 'src' ? closeLangPicker() : openLangPicker('src');
  });
  langTgtBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    pickerTarget === 'tgt' ? closeLangPicker() : openLangPicker('tgt');
  });
  document.addEventListener('click', (e) => {
    if (!pickerTarget) return;
    if (!e.target.closest('#langPicker') && !e.target.closest('#langSrc') && !e.target.closest('#langTgt')) closeLangPicker();
  });

  subtitleBtn.addEventListener('click', () => { if (!isTgtPH(tgtText.textContent)) openSubtitle(); });
  subtitleClose.addEventListener('click', closeSubtitle);
  subtitleMic.addEventListener('click', () => subListening ? stopSubListening() : startSubListening());

  historyClear.addEventListener('click', () => { historyLog = []; renderHistory(); });

  screen.orientation && screen.orientation.addEventListener('change', () => {
    if (screen.orientation.type.startsWith('landscape') && !subtitleOverlay.classList.contains('active'))
      if (!isTgtPH(tgtText.textContent)) openSubtitle();
  });

  window.addEventListener('resize', resizeCanvas);

  /* ================================================================
     5. 初期実行
  ================================================================ */
  try {
    resizeCanvas();
    drawIdleRing();
    setInputMode('voice');
    renderFavs();
    renderHistory();
  } catch(e) {
    // 初期化エラーを画面に表示
    document.body.insertAdjacentHTML('afterbegin',
      `<div style="position:fixed;top:0;left:0;right:0;background:#ff3860;color:#fff;font-family:monospace;font-size:12px;padding:8px;z-index:9999;word-break:break-all">
        ⚠ INIT ERROR: ${e.message}<br>${e.stack ? e.stack.split('\n')[1] : ''}
      </div>`
    );
    console.error('[BABEL INIT]', e);
  }

})();
</script>

</body>
</html>
