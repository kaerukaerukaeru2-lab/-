<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CAM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--acc:#00ffcc;--red:#ff2244;--bg:#0a0a0a;--sur:#1a1a1a;--mono:'Courier New',monospace;}
body{background:#000;color:#fff;font-family:var(--mono);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* ===== プレビュー画面 ===== */
#page-preview{display:none;position:fixed;inset:0;background:#000;z-index:50;flex-direction:column;}
#page-preview.on{display:flex;}
.preview-vf{position:relative;flex:1;overflow:hidden;min-height:0;}
#previewImg{width:100%;height:100%;object-fit:contain;display:block;}
#previewCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:5;touch-action:none;}
.preview-ctrl{background:var(--bg);padding:8px 12px env(safe-area-inset-bottom,12px);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.preview-top{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.preview-main{display:flex;gap:8px;justify-content:center;}
.btn-save{background:var(--acc);color:#000;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;font-family:var(--mono);cursor:pointer;letter-spacing:.05em;}
.btn-back{background:var(--sur);border:1px solid #444;color:#aaa;border-radius:10px;padding:10px 18px;font-size:13px;font-family:var(--mono);cursor:pointer;}

.version{position:absolute;top:8px;left:12px;font-size:9px;color:#333;z-index:10;letter-spacing:.1em;}

/* ビューファインダー */
#viewfinder{position:relative;flex:1;overflow:hidden;background:#000;min-height:0;}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
#stampCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:5;touch-action:none;}
.grid-ov{position:absolute;inset:0;pointer-events:none;z-index:2;}
.grid-ov.on{background:linear-gradient(rgba(255,255,255,0.08) 1px,transparent 1px) 0 0/33.33% 33.33%,linear-gradient(90deg,rgba(255,255,255,0.08) 1px,transparent 1px) 0 0/33.33% 33.33%;}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;transition:opacity .1s;}

/* フィルタオーバーレイ */
#filterOv{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:0;transition:opacity .3s;}

/* コントロール */
.ctrl{background:var(--bg);padding:8px 12px env(safe-area-inset-bottom,12px);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.top-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.mode-btn{background:var(--sur);border:1px solid #333;color:#666;border-radius:8px;padding:5px 10px;font-size:10px;cursor:pointer;font-family:var(--mono);letter-spacing:.04em;transition:all .15s;}
.mode-btn.on{border-color:var(--acc);color:var(--acc);}
.main-row{display:flex;align-items:center;justify-content:space-between;padding:0 4px;}
.side-btn{background:var(--sur);border:1px solid #333;color:#aaa;border-radius:10px;width:44px;height:44px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.side-btn:active{transform:scale(0.93);}
.side-btn.on{border-color:var(--acc);color:var(--acc);}
.shutter{width:62px;height:62px;border-radius:50%;border:3px solid #fff;background:transparent;cursor:pointer;position:relative;transition:all .15s;}
.shutter::after{content:'';position:absolute;inset:5px;border-radius:50%;background:#fff;transition:all .15s;}
.shutter:active{transform:scale(0.93);}
.shutter:active::after{background:var(--acc);}
.shutter.burst{border-color:var(--red);}
.shutter.burst::after{background:var(--red);}
.shot-count{font-size:9px;color:#444;text-align:center;font-family:var(--mono);letter-spacing:.1em;min-height:12px;}

/* スタンプパレット */
.stamp-palette{display:none;flex-wrap:wrap;gap:4px;justify-content:center;padding:4px 0;}
.stamp-palette.on{display:flex;}
.sp{background:var(--sur);border:1px solid #333;border-radius:8px;padding:4px 8px;font-size:20px;cursor:pointer;transition:all .15s;}
.sp.on{border-color:var(--acc);background:rgba(0,255,204,0.1);}
.sp:active{transform:scale(0.9);}

/* フィルタパレット */
.filter-palette{display:none;flex-wrap:wrap;gap:4px;justify-content:center;padding:4px 0;}
.filter-palette.on{display:flex;}
.fp{background:var(--sur);border:1px solid #333;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer;color:#888;transition:all .15s;white-space:nowrap;}
.fp.on{border-color:var(--acc);color:var(--acc);}

/* ポエム表示 */
.poem-overlay{position:absolute;inset:0;pointer-events:none;z-index:6;display:none;}
.poem-overlay.on{display:block;}

/* ズームスライダー */
#zoomWrap{position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px;}
#zoomSlider{-webkit-appearance:slider-vertical;writing-mode:vertical-lr;direction:rtl;width:28px;height:120px;accent-color:var(--acc);cursor:pointer;opacity:0.7;}
#zoomSlider:active{opacity:1;}
#zoomLabel{font-size:9px;color:#555;letter-spacing:.05em;}

/* タッチフォーカス */
#focusRing{position:absolute;width:56px;height:56px;border:1.5px solid var(--acc);border-radius:50%;pointer-events:none;display:none;z-index:15;transform:translate(-50%,-50%);}
#focusRing.on{display:block;animation:focusFade 0.8s ease forwards;}
@keyframes focusFade{0%{opacity:1;transform:translate(-50%,-50%) scale(1.3);}100%{opacity:0;transform:translate(-50%,-50%) scale(1);}}

/* タイマー表示 */
#timerDisplay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:18;pointer-events:none;}
#timerDisplay.on{display:flex;}
#timerNum{font-size:80px;font-weight:700;color:#fff;text-shadow:0 0 20px rgba(0,255,204,0.8);font-family:var(--mono);}

/* タイマーボタン */
#timerBtn{background:var(--sur);border:1px solid #333;color:#666;border-radius:8px;padding:5px 10px;font-size:10px;cursor:pointer;font-family:var(--mono);letter-spacing:.04em;transition:all .15s;}
#timerBtn.on{border-color:#ffcc00;color:#ffcc00;}

#memoPanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:80;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#memoPanel.on{display:flex;}
#memoInner{width:100%;max-width:420px;background:var(--sur);border:1px solid #333;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;}
#memoTitle{font-size:10px;color:#555;letter-spacing:.15em;}
#memoList{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.memo-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#111;border:1px solid #222;border-radius:8px;}
.memo-text{flex:1;font-size:12px;color:#ccc;white-space:pre-wrap;word-break:break-all;line-height:1.6;}
.memo-del{background:none;border:none;color:#444;font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;}
.memo-del:hover{color:var(--red);}
#memoInput{background:#111;border:1px solid #333;border-radius:8px;color:#eee;font-family:var(--mono);font-size:13px;padding:10px;resize:none;height:72px;outline:none;}
#memoInput:focus{border-color:var(--acc);}
.memo-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-memo-save{background:var(--acc);color:#000;border:none;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:700;font-family:var(--mono);cursor:pointer;}
.btn-memo-close{background:var(--sur);border:1px solid #444;color:#aaa;border-radius:8px;padding:8px 14px;font-size:12px;font-family:var(--mono);cursor:pointer;}
#memoBtn{position:fixed;bottom:calc(env(safe-area-inset-bottom,12px) + 72px);right:14px;z-index:30;background:var(--sur);border:1px solid #333;color:#555;border-radius:10px;width:36px;height:36px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#memoBtn.has{border-color:#444;color:#aaa;}

/* ===== WebP変換ボタン ===== */
#webpBtn{position:fixed;bottom:calc(env(safe-area-inset-bottom,12px) + 114px);right:14px;z-index:30;background:var(--sur);border:1px solid #333;color:#555;border-radius:10px;width:36px;height:36px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#webpBtn:hover{border-color:var(--acc);color:var(--acc);}

/* ===== WebP変換パネル ===== */
#webpPanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:80;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:env(safe-area-inset-bottom,16px);}
#webpPanel.on{display:flex;}
#webpInner{width:100%;max-width:480px;background:var(--sur);border:1px solid #333;border-radius:16px 16px 0 0;padding:18px 16px 20px;display:flex;flex-direction:column;gap:12px;}
#webpTitle{font-size:10px;color:#555;letter-spacing:.15em;}
#webpDropZone{border:1.5px dashed #333;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;color:#555;font-size:12px;line-height:1.8;}
#webpDropZone.hover{border-color:var(--acc);color:var(--acc);}
#webpFileInput{display:none;}
.webp-slider-row{display:flex;align-items:center;gap:10px;font-size:11px;color:#666;}
.webp-slider-row label{min-width:64px;}
.webp-slider-row input[type=range]{flex:1;accent-color:var(--acc);}
.webp-slider-row span{min-width:44px;text-align:right;color:#aaa;font-size:11px;}
#webpPreviewWrap{display:none;flex-direction:column;gap:8px;}
#webpPreviewWrap.on{display:flex;}
#webpThumb{width:100%;max-height:160px;object-fit:contain;border-radius:8px;border:1px solid #222;}
.webp-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.webp-metric{background:#111;border-radius:8px;padding:7px 10px;}
.webp-metric .lbl{font-size:10px;color:#555;margin-bottom:2px;}
.webp-metric .val{font-size:13px;font-weight:700;color:#ccc;}
.webp-actions{display:flex;gap:8px;}
.btn-webp-dl{background:var(--acc);color:#000;border:none;border-radius:8px;padding:9px 0;font-size:12px;font-weight:700;font-family:var(--mono);cursor:pointer;flex:1;}
.btn-webp-reset{background:var(--sur);border:1px solid #444;color:#aaa;border-radius:8px;padding:9px 12px;font-size:12px;font-family:var(--mono);cursor:pointer;}
.btn-webp-close{background:var(--sur);border:1px solid #333;color:#666;border-radius:8px;padding:9px 12px;font-size:12px;font-family:var(--mono);cursor:pointer;}
#webpStatus{font-size:11px;color:#555;text-align:center;min-height:14px;}
</style>
</head>
<body>
<div id="viewfinder">
  <span class="version">CAM v1.9</span>
  <video id="vid" autoplay playsinline muted></video>
  <div class="grid-ov" id="gridOv"></div>
  <div id="filterOv"></div>
  <canvas id="stampCanvas"></canvas>
  <div class="flash" id="flash"></div>
  <div id="focusRing"></div>
  <div id="timerDisplay"><span id="timerNum"></span></div>
  <div id="zoomWrap">
    <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" oninput="onZoom(this.value)">
    <span id="zoomLabel">1.0x</span>
  </div>
</div>

<div class="ctrl">
  <div class="top-row">
    <button class="mode-btn on" id="modePhoto" onclick="setMode('photo')">📷 写真</button>
    <button class="mode-btn" id="modeBurst" onclick="setMode('burst')">⚡ 連写</button>
    <button class="mode-btn" id="modeStamp" onclick="setMode('stamp')">🎨 スタンプ</button>
    <button class="mode-btn" id="modeFilter" onclick="setMode('filter')">✨ フィルタ</button>
    <button class="mode-btn" id="modePoem" onclick="setMode('poem')">📝 ポエム</button>
    <button id="timerBtn" onclick="cycleTimer()">⏱ OFF</button>
  </div>

  <!-- スタンプパレット -->
  <div class="stamp-palette" id="stampPalette">
    <button class="sp" data-e="⭐" onclick="selectStamp('⭐',this)">⭐</button>
    <button class="sp" data-e="❤️" onclick="selectStamp('❤️',this)">❤️</button>
    <button class="sp" data-e="🔥" onclick="selectStamp('🔥',this)">🔥</button>
    <button class="sp" data-e="🤖" onclick="selectStamp('🤖',this)">🤖</button>
    <button class="sp" data-e="🐱" onclick="selectStamp('🐱',this)">🐱</button>
    <button class="sp" data-e="🚀" onclick="selectStamp('🚀',this)">🚀</button>
    <button class="sp" data-e="🔑" onclick="selectStamp('🔑',this)">🔑</button>
    <button class="sp" data-e="👑" onclick="selectStamp('👑',this)">👑</button>
    <button class="sp" data-e="⚡" onclick="selectStamp('⚡',this)">⚡</button>
    <button class="sp" data-e="🌸" onclick="selectStamp('🌸',this)">🌸</button>
    <button class="sp" data-e="💫" onclick="selectStamp('💫',this)">💫</button>
    <button class="sp" data-e="🎯" onclick="selectStamp('🎯',this)">🎯</button>
    <button class="sp btn-clear" onclick="clearStamps()" style="font-size:11px;color:#f87171;border-color:#f87171;">✕ クリア</button>
  </div>

  <!-- フィルタパレット -->
  <div class="filter-palette" id="filterPalette">
    <button class="fp on" onclick="setFilter('none',this)">なし</button>
    <button class="fp" onclick="setFilter('sepia',this)">セピア</button>
    <button class="fp" onclick="setFilter('mono',this)">モノクロ</button>
    <button class="fp" onclick="setFilter('vivid',this)">ビビッド</button>
    <button class="fp" onclick="setFilter('dark',this)">シネマ</button>
    <button class="fp" onclick="setFilter('bright',this)">明るめ</button>
    <button class="fp" onclick="setFilter('dream',this)">夢っぽい</button>
  </div>

  <div class="main-row">
    <button class="side-btn" onclick="flipCam()" title="カメラ切り替え">🔄</button>
    <button class="shutter" id="shutter" onclick="onShutter()"></button>
    <button class="side-btn" id="gridBtn" onclick="toggleGrid()" title="グリッド">⊞</button>
  </div>
  <div class="shot-count" id="shotCount"></div>
</div>

<button id="webpBtn" onclick="toggleWebp()" title="WebP変換">⬇</button>
<button id="memoBtn" onclick="toggleMemo()" title="メモ">✎</button>

<div id="memoPanel">
  <div id="memoInner">
    <div id="memoTitle">// MEMO</div>
    <div id="memoList"></div>
    <textarea id="memoInput" placeholder="テキストを入力..."></textarea>
    <div class="memo-actions">
      <button class="btn-memo-close" onclick="toggleMemo()">閉じる</button>
      <button class="btn-memo-save" onclick="saveMemo()">保存</button>
    </div>
  </div>
</div>

<!-- ===== WebP変換パネル ===== -->
<div id="webpPanel">
  <div id="webpInner">
    <div id="webpTitle">// IMAGE → WebP CONVERTER</div>
    <div id="webpDropZone" onclick="document.getElementById('webpFileInput').click()">
      📁 タップして画像を選択<br>
      <span style="font-size:10px;color:#444;">JPG / PNG / HEIC / GIF など対応</span>
    </div>
    <input type="file" id="webpFileInput" accept="image/*" multiple onchange="onWebpFiles(this.files)">
    <div class="webp-slider-row">
      <label>最大幅</label>
      <input type="range" id="wpMaxW" min="320" max="3840" step="80" value="1920" oninput="document.getElementById('wpMaxWVal').textContent=this.value+'px'">
      <span id="wpMaxWVal">1920px</span>
    </div>
    <div class="webp-slider-row">
      <label>最大高さ</label>
      <input type="range" id="wpMaxH" min="240" max="2160" step="60" value="1440" oninput="document.getElementById('wpMaxHVal').textContent=this.value+'px'">
      <span id="wpMaxHVal">1440px</span>
    </div>
    <div class="webp-slider-row">
      <label>WebP品質</label>
      <input type="range" id="wpQuality" min="10" max="100" step="5" value="82" oninput="document.getElementById('wpQualVal').textContent=this.value+'%'">
      <span id="wpQualVal">82%</span>
    </div>
    <div id="webpPreviewWrap">
      <img id="webpThumb">
      <div class="webp-info-grid">
        <div class="webp-metric"><div class="lbl">元サイズ</div><div class="val" id="wpOrigSize">—</div></div>
        <div class="webp-metric"><div class="lbl">変換後</div><div class="val" id="wpWebpSize">—</div></div>
        <div class="webp-metric"><div class="lbl">元解像度</div><div class="val" id="wpOrigRes">—</div></div>
        <div class="webp-metric"><div class="lbl">出力解像度</div><div class="val" id="wpOutRes">—</div></div>
      </div>
      <div class="webp-actions">
        <button class="btn-webp-reset" onclick="resetWebp()">↩ 選び直す</button>
        <button class="btn-webp-dl" id="wpDlBtn" onclick="downloadWebp()">↓ WebP保存</button>
      </div>
      <button class="btn-webp-dl" onclick="openPreviewFromWebp()" style="background:transparent;border:1px solid var(--acc);color:var(--acc);margin-top:2px;">✦ プレビューで開いて編集</button>
    </div>
    <div id="webpStatus"></div>
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn-webp-close" onclick="toggleWebp()">閉じる</button>
    </div>
  </div>
</div>

<script>
// ===== 基本変数 =====
var stream=null,facingMode='environment',mode='photo';
var burstTimer=null,burstCount=0,totalShots=0;
var gridOn=false;
var currentFilter='none';
var STAMP_KEY='cam_stamps_v1';

// ===== スタンプデータ =====
var stamps=[]; // {id,emoji,x,y,size}
var selectedEmoji='⭐';
var dragStamp=null,dragOffX=0,dragOffY=0;
var pinchDist=0,pinchStamp=null;

// ===== フィルタ設定 =====
var FILTERS={
  none:{css:'none',ov:''},
  sepia:{css:'sepia(0.7) contrast(1.1)',ov:'rgba(112,66,20,0.12)'},
  mono:{css:'grayscale(1) contrast(1.1)',ov:''},
  vivid:{css:'saturate(1.8) contrast(1.1)',ov:''},
  dark:{css:'brightness(0.75) contrast(1.2)',ov:'rgba(0,0,0,0.15)'},
  bright:{css:'brightness(1.2) saturate(1.1)',ov:''},
  dream:{css:'brightness(1.1) saturate(0.8) blur(0.5px)',ov:'rgba(255,220,255,0.1)'}
};

// ===== ポエム =====
var POEMS=[
  '光は\n消えても\n記憶に\n残る','あの日の\n空は\n誰かの\n夢','時間は\n流れ\n君は\n咲く',
  '言葉より\n早く\n届く\n眼差し','夜明けは\n必ず\nやってくる','迷子の\n星が\n道を\n照らす',
  '笑顔は\n世界を\n救う\n力','雨粒が\n奏でる\n静かな\n歌','あなたと\n歩いた\n道は\n続く',
  '夢は\n見るより\n追うもの','今この\n瞬間が\n永遠になる','風が\n運ぶ\nやさしい\n嘘'
];
var poemActive=false,currentPoem='';

// ===== ズーム・露出・タイマー・フォーカス =====
var currentZoom=1.0;
var timerSec=0,timerTimer=null;
var TIMER_STEPS=[0,3,5];
var timerIdx=0;

function onZoom(v){
  currentZoom=parseFloat(v);
  document.getElementById('zoomLabel').textContent=currentZoom.toFixed(1)+'x';
  applyZoom();
}
function applyZoom(){
  var vid=document.getElementById('vid');
  if(!stream)return;
  var track=stream.getVideoTracks()[0];
  if(!track)return;
  var caps=track.getCapabilities();
  if(caps.zoom){
    try{track.applyConstraints({advanced:[{zoom:Math.min(currentZoom,caps.zoom.max||currentZoom)}]});}catch(e){}
  }
  // CSS fallback for zoom
  var bv=1/currentZoom;
  var offset=((1-bv)/2*100).toFixed(1);
  vid.style.width=(currentZoom*100)+'%';
  vid.style.height=(currentZoom*100)+'%';
  vid.style.top='-'+offset+'%';
  vid.style.left='-'+offset+'%';
  vid.style.filter=FILTERS[currentFilter].css;
}

function cycleTimer(){
  timerIdx=(timerIdx+1)%TIMER_STEPS.length;
  timerSec=TIMER_STEPS[timerIdx];
  var btn=document.getElementById('timerBtn');
  btn.textContent=timerSec===0?'⏱ OFF':'⏱ '+timerSec+'s';
  btn.classList.toggle('on',timerSec>0);
}

function shootWithTimer(callback){
  if(timerSec===0){callback();return;}
  var count=timerSec;
  var disp=document.getElementById('timerDisplay');
  var num=document.getElementById('timerNum');
  disp.classList.add('on');
  num.textContent=count;
  timerTimer=setInterval(function(){
    count--;
    if(count<=0){
      clearInterval(timerTimer);timerTimer=null;
      disp.classList.remove('on');
      callback();
    }else{
      num.textContent=count;
    }
  },1000);
}

function setupTouchFocus(){
  var vf=document.getElementById('viewfinder');
  var ring=document.getElementById('focusRing');
  vf.addEventListener('touchstart',function(e){
    if(mode==='stamp'||mode==='poem')return;
    var rect=vf.getBoundingClientRect();
    var tx=e.touches[0].clientX-rect.left;
    var ty=e.touches[0].clientY-rect.top;
    ring.style.left=tx+'px';ring.style.top=ty+'px';
    ring.classList.remove('on');
    void ring.offsetWidth;
    ring.classList.add('on');
    if(!stream)return;
    var track=stream.getVideoTracks()[0];
    if(!track)return;
    var caps=track.getCapabilities();
    if(caps.focusMode&&caps.focusMode.includes('manual')){
      var px=tx/rect.width,py=ty/rect.height;
      try{track.applyConstraints({advanced:[{focusMode:'manual',focusDistance:(caps.focusDistance&&caps.focusDistance.min)||0,pointsOfInterest:[{x:px,y:py}]}]});}catch(e){}
    }
  },{passive:true});
}


async function startCam(){
  if(stream)stream.getTracks().forEach(function(t){t.stop();});
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false
    });
    document.getElementById('vid').srcObject=stream;
    resizeCanvas();
    document.getElementById('zoomSlider').value=1;
    currentZoom=1;
    document.getElementById('zoomLabel').textContent='1.0x';
    setTimeout(applyZoom,300);

}

function renderStamps(){
  var cv=document.getElementById('stampCanvas');

  ctx.clearRect(0,0,cv.width,cv.height);
  stamps.forEach(function(s){
    ctx.font=s.size+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(s.emoji,s.x,s.y);
  });
  if(poemActive&&currentPoem){

  }

// ===== ポエム縦書き描画 =====
function drawPoem(ctx,w,h){
  var lines=currentPoem.split('\n');
  var fontSize=Math.floor(h/16);
  ctx.font='bold '+fontSize+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  var colW=fontSize+8;
  var startX=w-colW*1.5;
  var startY=h*0.15;
  lines.forEach(function(line,ci){
    var x=startX-ci*colW;
    for(var ri=0;ri<line.length;ri++){
      // テキストシャドウ
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillText(line[ri],x+1,startY+ri*fontSize*1.2+1);
      ctx.fillStyle='rgba(255,255,240,0.95)';
      ctx.fillText(line[ri],x,startY+ri*fontSize*1.2);
    }
  });
}

var cv;
document.addEventListener('DOMContentLoaded',function(){
cv=document.getElementById('stampCanvas');
cv.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===2){
    // ピンチ開始
    pinchDist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    var mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    var my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    var rect=cv.getBoundingClientRect();
    pinchStamp=findStamp(mx-rect.left,my-rect.top);
    return;
  }
  var rect=cv.getBoundingClientRect();
  var tx=e.touches[0].clientX-rect.left;
  var ty=e.touches[0].clientY-rect.top;
  if(mode==='stamp'){
    // 既存スタンプをドラッグ or 新規追加
    var hit=findStamp(tx,ty);
    if(hit){dragStamp=hit;dragOffX=tx-hit.x;dragOffY=ty-hit.y;}
    else{
      stamps.push({id:Date.now(),emoji:selectedEmoji,x:tx,y:ty,size:48});
      renderStamps();
    }
  }else if(mode==='poem'&&poemActive){
    // ポエム再タップで変更
    currentPoem=POEMS[Math.floor(Math.random()*POEMS.length)];
    renderStamps();
  }
},{passive:false});

cv.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===2&&pinchStamp){
    var d=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    var scale=d/pinchDist;
    pinchStamp.size=Math.max(20,Math.min(120,pinchStamp.size*scale));
    pinchDist=d;
    renderStamps();
    return;
  }
  if(dragStamp&&e.touches.length===1){
    var rect=cv.getBoundingClientRect();
    dragStamp.x=e.touches[0].clientX-rect.left-dragOffX;
    dragStamp.y=e.touches[0].clientY-rect.top-dragOffY;
    renderStamps();
  }
},{passive:false});

cv.addEventListener('touchend',function(e){
  dragStamp=null;pinchStamp=null;
});
}); // DOMContentLoaded

function findStamp(x,y){
  for(var i=stamps.length-1;i>=0;i--){
    var s=stamps[i];
    var d=Math.hypot(x-s.x,y-s.y);
    if(d<s.size*0.8)return s;
  }
  return null;
}

// ===== 撮影 =====
function takePhoto(){
  var vid=document.getElementById('vid');
  var cv2=document.getElementById('stampCanvas');
  var out=document.createElement('canvas');
  out.width=vid.videoWidth||1280;
  out.height=vid.videoHeight||720;
  var ctx=out.getContext('2d');
  // フィルタ適用
  var f=FILTERS[currentFilter];
  ctx.filter=f.css;
  if(facingMode==='user'){ctx.translate(out.width,0);ctx.scale(-1,1);}
  ctx.drawImage(vid,0,0,out.width,out.height);
  ctx.filter='none';
  if(facingMode==='user'){ctx.setTransform(1,0,0,1,0,0);}
  // フィルタオーバーレイ
  if(f.ov){ctx.fillStyle=f.ov;ctx.fillRect(0,0,out.width,out.height);}
  // スタンプ・ポエムをスケール合成
  var scaleX=out.width/cv2.width;
  var scaleY=out.height/cv2.height;
  stamps.forEach(function(s){
    ctx.font=Math.round(s.size*scaleX)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s.emoji,s.x*scaleX,s.y*scaleY);
  });
  if(poemActive&&currentPoem){
    var lines=currentPoem.split('\n');
    var fontSize=Math.floor(out.height/16);
    ctx.font='bold '+fontSize+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    var colW=fontSize+8;
    var startX=out.width-colW*1.5;
    var startY=out.height*0.15;
    lines.forEach(function(line,ci){
      var x=startX-ci*colW;
      for(var ri=0;ri<line.length;ri++){
        ctx.fillStyle='rgba(0,0,0,0.5)';
        ctx.fillText(line[ri],x+1,startY+ri*fontSize*1.2+1);
        ctx.fillStyle='rgba(255,255,240,0.95)';
        ctx.fillText(line[ri],x,startY+ri*fontSize*1.2);
      }
    });
  }
  // フラッシュ
  var fl=document.getElementById('flash');
  fl.style.opacity='1';
  setTimeout(function(){fl.style.opacity='0';},120);
  // プレビューへ
  out.toBlob(function(blob){
    var url=URL.createObjectURL(blob);
    openPreview(url);
  },'image/jpeg',0.95);
  totalShots++;
  setStatus('撮影枚数: '+totalShots+'枚');
}

// ===== 連写 =====
function startBurst(){
  if(burstTimer){stopBurst();return;}
  burstCount=0;
  burstTimer=setInterval(function(){
    takePhoto();burstCount++;
    setStatus('連写中 '+burstCount+'枚...');
  },300);
}
function stopBurst(){
  if(burstTimer){clearInterval(burstTimer);burstTimer=null;}
  setStatus('連写完了 '+burstCount+'枚');
  setTimeout(function(){setStatus('撮影枚数: '+totalShots+'枚');},2000);
}

// ===== シャッター =====
function onShutter(){
  if(timerTimer)return;
  shootWithTimer(function(){
    if(mode==='photo'||mode==='stamp'||mode==='filter'||mode==='poem')takePhoto();
    else if(mode==='burst')startBurst();
  });
}

// プレビューCanvas タッチ操作
var pcv;
function findPPoem(x,y){
  if(!pPoemActive||!pPoem)return false;
  var cv=document.getElementById('previewCanvas');
  var fontSize=Math.floor(cv.height/16*pPoemSize);
  var colW=fontSize+8;
  var lines=pPoem.split('\n');
  var px=(pPoemX<0)?cv.width-colW*1.5:pPoemX;
  var py=(pPoemY<0)?cv.height*0.15:pPoemY;
  var maxLen=Math.max.apply(null,lines.map(function(l){return l.length;}));
  var totalW=colW*lines.length;
  var totalH=maxLen*fontSize*1.2;
  return(x>=px-totalW&&x<=px+colW&&y>=py-fontSize&&y<=py+totalH);
}

document.addEventListener('DOMContentLoaded',function(){
pcv=document.getElementById('previewCanvas');
pcv.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===2){
    pPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    var mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    var my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    var rect=pcv.getBoundingClientRect();
    var lx=mx-rect.left,ly=my-rect.top;
    pPinchStamp=findPStamp(lx,ly);
    pPinchPoem=!pPinchStamp&&findPPoem(lx,ly);
    return;
  }
  var rect=pcv.getBoundingClientRect();
  var tx=e.touches[0].clientX-rect.left;
  var ty=e.touches[0].clientY-rect.top;
  if(pMode==='stamp'){
    var hit=findPStamp(tx,ty);
    if(hit){pDragStamp=hit;pDragOffX=tx-hit.x;pDragOffY=ty-hit.y;}
    else{pStamps.push({id:Date.now(),emoji:pSelectedEmoji,x:tx,y:ty,size:48});renderPStamps();}
  }else if(pMode==='poem'&&pPoemActive){
    var now=Date.now();
    if(now-pLastTap<300){
      pPoem=POEMS[Math.floor(Math.random()*POEMS.length)];renderPStamps();
    }else{
      var cv2=document.getElementById('previewCanvas');
      var fontSize=Math.floor(cv2.height/16*pPoemSize);
      var colW=fontSize+8;
      var px=(pPoemX<0)?cv2.width-colW*1.5:pPoemX;
      var py=(pPoemY<0)?cv2.height*0.15:pPoemY;
      pDragPoem=true;pDragPoemOffX=tx-px;pDragPoemOffY=ty-py;
    }
    pLastTap=now;
  }
},{passive:false});

pcv.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===2){
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pPinchStamp){
      pPinchStamp.size=Math.max(20,Math.min(150,pPinchStamp.size*(d/pPinchDist)));
    }else if(pPinchPoem){
      pPoemSize=Math.max(0.3,Math.min(3.0,pPoemSize*(d/pPinchDist)));
    }
    pPinchDist=d;renderPStamps();return;
  }
  if(pDragStamp&&e.touches.length===1){
    var rect=pcv.getBoundingClientRect();
    pDragStamp.x=e.touches[0].clientX-rect.left-pDragOffX;
    pDragStamp.y=e.touches[0].clientY-rect.top-pDragOffY;
    renderPStamps();
  }else if(pDragPoem&&e.touches.length===1){
    var rect=pcv.getBoundingClientRect();
    pPoemX=e.touches[0].clientX-rect.left-pDragPoemOffX;
    pPoemY=e.touches[0].clientY-rect.top-pDragPoemOffY;
    renderPStamps();
  }
},{passive:false});

pcv.addEventListener('touchend',function(){pDragStamp=null;pPinchStamp=null;pDragPoem=false;pPinchPoem=false;});
}); // DOMContentLoaded

function findPStamp(x,y){

}

function savePreview(){
  var img=new Image();
  img.onload=function(){
    var out=document.createElement('canvas');
    out.width=img.naturalWidth;out.height=img.naturalHeight;
    var ctx=out.getContext('2d');
    // フィルタ
    ctx.filter=FILTERS[pFilter].css;
    ctx.drawImage(img,0,0);
    ctx.filter='none';
    if(FILTERS[pFilter].ov){ctx.fillStyle=FILTERS[pFilter].ov;ctx.fillRect(0,0,out.width,out.height);}
    // スタンプ・ポエムをスケール合成
    var cv=document.getElementById('previewCanvas');
    var sx=out.width/cv.width,sy=out.height/cv.height;
    pStamps.forEach(function(s){
      ctx.font=Math.round(s.size*sx)+'px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(s.emoji,s.x*sx,s.y*sy);
    });
    if(pPoemActive&&pPoem){
      var lines=pPoem.split('\n');
      var fontSize=Math.floor(out.height/16*pPoemSize);
      ctx.font='bold '+fontSize+'px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      var colW=fontSize+8;
      var cv2=document.getElementById('previewCanvas');
      var defPx=cv2.width-colW*(1.5/sx),defPy=cv2.height*0.15;
      var startX=((pPoemX<0)?defPx:pPoemX)*sx;
      var startY=((pPoemY<0)?defPy:pPoemY)*sy;
      lines.forEach(function(line,ci){
        var x=startX-ci*colW;
        for(var ri=0;ri<line.length;ri++){
          ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(line[ri],x+1,startY+ri*fontSize*1.2+1);
          ctx.fillStyle='rgba(255,255,240,0.95)';ctx.fillText(line[ri],x,startY+ri*fontSize*1.2);
        }
      });
    }
    out.toBlob(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='CAM_'+Date.now()+'.jpg';a.click();
      URL.revokeObjectURL(url);
      document.getElementById('pStatus').textContent='保存しました ✦';
      setTimeout(function(){closePreview();},800);
    },'image/jpeg',0.92);
  };

}

      var maxW=parseInt(document.getElementById('wpMaxW').value);
      var maxH=parseInt(document.getElementById('wpMaxH').value);
      var quality=parseInt(document.getElementById('wpQuality').value)/100;
      var origW=img.naturalWidth, origH=img.naturalHeight;
      var outW=origW, outH=origH;
      var ratio=origW/origH;
      if(outW>maxW){outW=maxW;outH=Math.round(outW/ratio);}
      if(outH>maxH){outH=maxH;outW=Math.round(outH*ratio);}

      var cvs=document.createElement('canvas');
      cvs.width=outW; cvs.height=outH;
      var ctx=cvs.getContext('2d');
      ctx.drawImage(img,0,0,outW,outH);

      cvs.toBlob(function(blob){
        wpBlob=blob;
        var thumb=document.getElementById('webpThumb');
        var url=URL.createObjectURL(blob);
        thumb.src=url;
        document.getElementById('wpOrigSize').textContent=formatBytes(origSize);
        document.getElementById('wpWebpSize').textContent=formatBytes(blob.size)+' ('+Math.round((1-blob.size/origSize)*100)+'%↓)';
        document.getElementById('wpOrigRes').textContent=origW+'×'+origH;
        document.getElementById('wpOutRes').textContent=outW+'×'+outH;
        document.getElementById('webpPreviewWrap').classList.add('on');
        status.textContent='変換完了 ✦';
      },'image/webp',quality);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function downloadWebp(){
  if(!wpBlob)return;
  var url=URL.createObjectURL(wpBlob);
  var a=document.createElement('a');
  a.href=url; a.download=wpFileName+'_webp.webp'; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},5000);
  document.getElementById('webpStatus').textContent='ダウンロード開始 ✦';
}

function openPreviewFromWebp(){
  if(!wpBlob)return;
  var url=URL.createObjectURL(wpBlob);
  toggleWebp();
  openPreview(url);
}

function resetWebp(){
  wpBlob=null;
  document.getElementById('webpPreviewWrap').classList.remove('on');
  document.getElementById('webpStatus').textContent='';
  document.getElementById('webpFileInput').value='';
  document.getElementById('webpDropZone').style.display='';
}

function formatBytes(b){
  if(b<1024)return b+'B';
  if(b<1048576)return Math.round(b/1024)+'KB';
  return (b/1048576).toFixed(1)+'MB';
}

// ドラッグ&ドロップ対応
document.addEventListener('DOMContentLoaded',function(){
  var dz=document.getElementById('webpDropZone');
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('hover');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('hover');});
  dz.addEventListener('drop',function(e){
    e.preventDefault();dz.classList.remove('hover');
    if(e.dataTransfer.files.length)onWebpFiles(e.dataTransfer.files);
  });
});
</script>
