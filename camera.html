<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CAM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--acc:#00ffcc;--red:#ff2244;--bg:#0a0a0a;--sur:#1a1a1a;--mono:'Courier New',monospace;}
body{background:#000;color:#fff;font-family:var(--mono);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* バージョン */
.version{position:absolute;top:8px;left:12px;font-size:9px;color:#333;z-index:10;letter-spacing:.1em;}

/* ビューファインダー */
#viewfinder{position:relative;flex:1;overflow:hidden;background:#000;min-height:0;}
#vid{width:100%;height:100%;object-fit:cover;display:block;}
#qrCanvas{display:none;}

/* グリッドオーバーレイ */
.grid-ov{position:absolute;inset:0;pointer-events:none;z-index:2;}
.grid-ov.on{background:
  linear-gradient(rgba(255,255,255,0.08) 1px,transparent 1px) 0 0/33.33% 33.33%,
  linear-gradient(90deg,rgba(255,255,255,0.08) 1px,transparent 1px) 0 0/33.33% 33.33%;}

/* フォーカス枠 */
.focus-ring{position:absolute;width:70px;height:70px;border:2px solid var(--acc);border-radius:4px;transform:translate(-50%,-50%);opacity:0;transition:opacity .2s;pointer-events:none;z-index:3;}
.focus-ring.on{opacity:1;}
.focus-ring::before,.focus-ring::after{content:'';position:absolute;background:var(--acc);}
.focus-ring::before{top:-6px;left:-6px;width:12px;height:12px;border-top:2px solid var(--acc);border-left:2px solid var(--acc);background:none;}
.focus-ring::after{bottom:-6px;right:-6px;width:12px;height:12px;border-bottom:2px solid var(--acc);border-right:2px solid var(--acc);background:none;}

/* QR結果 */
.qr-result{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);padding:10px 14px;font-size:12px;color:var(--acc);display:none;z-index:5;word-break:break-all;border-top:1px solid var(--acc);}
.qr-result.on{display:block;}

/* シャッターフラッシュ */
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:10;transition:opacity .1s;}

/* コントロールバー */
.ctrl{background:var(--bg);padding:10px 16px env(safe-area-inset-bottom,16px);display:flex;flex-direction:column;gap:8px;flex-shrink:0;}

/* 上段：モード切り替え */
.top-row{display:flex;gap:8px;justify-content:center;}
.mode-btn{background:var(--sur);border:1px solid #333;color:#666;border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:var(--mono);letter-spacing:.05em;transition:all .15s;}
.mode-btn.on{border-color:var(--acc);color:var(--acc);}

/* 下段：メインコントロール */
.main-row{display:flex;align-items:center;justify-content:space-between;padding:0 8px;}

/* サイドボタン */
.side-btn{background:var(--sur);border:1px solid #333;color:#aaa;border-radius:10px;width:46px;height:46px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.side-btn:active{transform:scale(0.93);}
.side-btn.on{border-color:var(--acc);color:var(--acc);}

/* シャッターボタン */
.shutter{width:64px;height:64px;border-radius:50%;border:3px solid #fff;background:transparent;cursor:pointer;position:relative;transition:all .15s;}
.shutter::after{content:'';position:absolute;inset:5px;border-radius:50%;background:#fff;transition:all .15s;}
.shutter:active{transform:scale(0.93);}
.shutter:active::after{background:var(--acc);}
.shutter.burst{border-color:var(--red);}
.shutter.burst::after{background:var(--red);}

/* カウンター */
.shot-count{font-size:9px;color:#444;text-align:center;font-family:var(--mono);letter-spacing:.1em;}

/* QRモード表示 */
.qr-scan-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid var(--acc);border-radius:12px;display:none;z-index:3;}
.qr-scan-ring.on{display:block;animation:scanAnim 2s linear infinite;}
@keyframes scanAnim{0%,100%{border-color:var(--acc);}50%{border-color:var(--red);}}
.qr-line{position:absolute;left:0;right:0;height:2px;background:var(--acc);top:0;animation:scanLine 2s linear infinite;box-shadow:0 0 8px var(--acc);}
@keyframes scanLine{0%{top:0;}100%{top:100%;}}
</style>
</head>
<body>

<div id="viewfinder">
  <span class="version">CAM v1.1</span>
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="qrCanvas"></canvas>
  <div class="grid-ov" id="gridOv"></div>
  <div class="focus-ring" id="focusRing"></div>
  <div class="qr-scan-ring" id="qrRing"><div class="qr-line"></div></div>
  <div class="flash" id="flash"></div>
  <div class="qr-result" id="qrResult"></div>
</div>

<div class="ctrl">
  <div class="top-row">
    <button class="mode-btn on" id="modePhoto" onclick="setMode('photo')">📷 写真</button>
    <button class="mode-btn" id="modeBurst" onclick="setMode('burst')">⚡ 連写</button>
    <button class="mode-btn" id="modeQr" onclick="setMode('qr')">▣ QR</button>
  </div>
  <div class="main-row">
    <button class="side-btn" onclick="flipCam()" title="カメラ切り替え">🔄</button>
    <button class="shutter" id="shutter" onclick="onShutter()"></button>
    <button class="side-btn" id="gridBtn" onclick="toggleGrid()" title="グリッド">⊞</button>
  </div>
  <div class="shot-count" id="shotCount"></div>
</div>

<script>
var stream=null,facingMode='environment',mode='photo';
var burstTimer=null,burstCount=0,totalShots=0;
var qrInterval=null;

// カメラ起動
async function startCam(){
  if(stream){stream.getTracks().forEach(function(t){t.stop();});}
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false
    });
    document.getElementById('vid').srcObject=stream;
  }catch(e){alert('カメラにアクセスできません: '+e.message);}
}

// カメラ切り替え
function flipCam(){
  facingMode=facingMode==='environment'?'user':'environment';
  startCam();
}

// モード切り替え
function setMode(m){
  mode=m;
  ['photo','burst','qr'].forEach(function(id){
    document.getElementById('mode'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('on',id===m);
  });
  var sh=document.getElementById('shutter');
  sh.className='shutter'+(m==='burst'?' burst':'');
  document.getElementById('qrRing').classList.toggle('on',m==='qr');
  document.getElementById('qrResult').classList.remove('on');
  if(m==='qr')startQR(); else stopQR();
}

// シャッター
function onShutter(){
  if(mode==='photo'){takePhoto();}
  else if(mode==='burst'){startBurst();}
  else if(mode==='qr'){/* QRは自動検出 */}
}

// 撮影
function takePhoto(){
  var vid=document.getElementById('vid');
  var canvas=document.createElement('canvas');
  canvas.width=vid.videoWidth||1280;
  canvas.height=vid.videoHeight||720;
  var ctx=canvas.getContext('2d');
  // 前カメラは鏡反転
  if(facingMode==='user'){ctx.translate(canvas.width,0);ctx.scale(-1,1);}
  ctx.drawImage(vid,0,0);
  // フラッシュ
  var fl=document.getElementById('flash');
  fl.style.opacity='1';
  setTimeout(function(){fl.style.opacity='0';},100);
  // 保存
  canvas.toBlob(function(blob){
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='CAM_'+Date.now()+'.jpg';
    a.click();
    URL.revokeObjectURL(url);
  },'image/jpeg',0.92);
  totalShots++;
  updateCount();
}

// 連写
function startBurst(){
  if(burstTimer){stopBurst();return;}
  burstCount=0;
  burstTimer=setInterval(function(){
    takePhoto();
    burstCount++;
    document.getElementById('shotCount').textContent='連写中 '+burstCount+'枚...';
  },300);
}
function stopBurst(){
  if(burstTimer){clearInterval(burstTimer);burstTimer=null;}
  document.getElementById('shotCount').textContent='連写完了 '+burstCount+'枚';
  setTimeout(function(){updateCount();},2000);
}

// グリッド
var gridOn=false;
function toggleGrid(){
  gridOn=!gridOn;
  document.getElementById('gridOv').classList.toggle('on',gridOn);
  document.getElementById('gridBtn').classList.toggle('on',gridOn);
}

// カウント表示
function updateCount(){
  document.getElementById('shotCount').textContent=totalShots?'撮影枚数: '+totalShots+'枚':'';
}

// タップでフォーカス
document.getElementById('viewfinder').addEventListener('click',function(e){
  if(mode==='burst'&&burstTimer){stopBurst();return;}
  var ring=document.getElementById('focusRing');
  var rect=e.currentTarget.getBoundingClientRect();
  ring.style.left=(e.clientX-rect.left)+'px';
  ring.style.top=(e.clientY-rect.top)+'px';
  ring.classList.add('on');
  setTimeout(function(){ring.classList.remove('on');},800);
});

// QRコード読み取り
function startQR(){
  if(!('BarcodeDetector' in window)){
    document.getElementById('qrResult').textContent='このブラウザはQR読み取り非対応です';
    document.getElementById('qrResult').classList.add('on');
    return;
  }
  var detector=new BarcodeDetector({formats:['qr_code','ean_13','code_128']});
  var vid=document.getElementById('vid');
  qrInterval=setInterval(async function(){
    try{
      var codes=await detector.detect(vid);
      if(codes.length>0){
        var val=codes[0].rawValue;
        var res=document.getElementById('qrResult');
        res.textContent='▣ '+val;
        res.classList.add('on');
        // URLなら開く
        if(val.startsWith('http')){
          res.innerHTML='▣ <a href="'+val+'" target="_blank" style="color:var(--acc);">'+val+'</a> → タップで開く';
        }
      }
    }catch(e){}
  },500);
}
function stopQR(){
  if(qrInterval){clearInterval(qrInterval);qrInterval=null;}
}

startCam();
</script>
</body>
</html>
