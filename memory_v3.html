<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>My Eternal Memory v3.2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#0f172a;--sur:#1e293b;--sur2:#263145;--bdr:#334155;
  --tx:#f1f5f9;--tx2:#94a3b8;
  --cy:#22d3ee;--cy2:rgba(34,211,238,0.12);
  --pu:#a78bfa;--pu2:rgba(167,139,250,0.12);
  --gr:#34d399;--gr2:rgba(52,211,153,0.12);
  --rd:#f87171;--rd2:rgba(248,113,113,0.12);
  --am:#fbbf24;--am2:rgba(251,191,36,0.12);
  --pk:#f9a8d4;--pk2:rgba(249,168,212,0.12);
  --gx:rgba(148,163,184,0.12);
  --mono:'Space Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);padding-bottom:4rem;}
.hd{background:rgba(15,23,42,0.97);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--bdr);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.ttl{font-family:var(--mono);font-size:13px;color:var(--cy);letter-spacing:.08em;}
.ttl small{color:var(--tx2);font-size:10px;display:block;font-family:var(--sans);}
.hd-acts{display:flex;gap:6px;}
.btn-sm{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-sm:hover{border-color:var(--cy);color:var(--cy);}
.main{padding:1rem;max-width:640px;margin:0 auto;}
.icard{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:1rem 1.2rem;margin-bottom:1rem;}
.lbl{font-size:11px;color:var(--cy);font-family:var(--mono);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.lbl::before{content:'';width:5px;height:5px;background:var(--cy);border-radius:50%;display:block;}
textarea{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:11px 12px;color:var(--tx);font-size:15px;resize:none;min-height:88px;font-family:var(--sans);line-height:1.6;}
textarea:focus{outline:none;border-color:var(--cy);}
textarea::placeholder{color:var(--tx2);}
.irow{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.cat-sel{flex:1;min-width:100px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:9px 12px;color:var(--tx);font-size:13px;font-family:var(--sans);}
.cat-sel:focus{outline:none;border-color:var(--cy);}
.btn-sv{background:var(--cy);color:#0f172a;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-sv:active{transform:scale(0.96);}
.st{font-size:11px;text-align:right;margin-top:6px;color:var(--tx2);}
.st.ok{color:var(--gr);}
.color-row{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.color-lbl{font-size:11px;color:var(--tx2);font-family:var(--mono);}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-dot.on{border-color:#fff;transform:scale(1.2);}
.tag-row{display:flex;gap:6px;margin-top:8px;align-items:center;}
.tag-input{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:7px 10px;color:var(--tx);font-size:12px;font-family:var(--sans);}
.tag-input:focus{outline:none;border-color:var(--cy);}
.tag-input::placeholder{color:var(--tx2);}
.tbox{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:.75rem 1.2rem;margin-bottom:1rem;}
.trow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tlbl{font-size:11px;color:var(--tx2);font-family:var(--mono);white-space:nowrap;}
.chars{display:flex;gap:6px;flex:1;flex-wrap:wrap;}
.ch{background:var(--bg);border:1px solid var(--bdr);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--tx2);}
.ch[data-c=sakura].on{border-color:#f9a8d4;color:#f9a8d4;background:rgba(249,168,212,.12);}
.ch[data-c=ritsu].on{border-color:var(--cy);color:var(--cy);background:var(--cy2);}
.ch[data-c=glock].on{border-color:var(--gr);color:var(--gr);background:var(--gr2);}
.btn-pl{background:var(--pu2);border:1px solid var(--pu);color:var(--pu);border-radius:10px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap;}
.btn-st2{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:10px;padding:6px 10px;font-size:13px;cursor:pointer;}
.spd-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.spd-lbl{font-size:11px;color:var(--tx2);font-family:var(--mono);white-space:nowrap;}
.spd-val{font-size:12px;color:var(--cy);font-family:var(--mono);min-width:34px;text-align:right;}
.fbox{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:.75rem 1.2rem;margin-bottom:1rem;}
.srow{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.si{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;color:var(--tx);font-size:14px;font-family:var(--sans);}
.si:focus{outline:none;border-color:var(--cy);}
.si::placeholder{color:var(--tx2);}
.sort-sel{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;color:var(--tx2);font-size:12px;font-family:var(--sans);}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab{border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;border:1px solid var(--bdr);color:var(--tx2);background:var(--bg);white-space:nowrap;}
.tab.on{font-weight:500;}
.cnt{font-size:11px;color:var(--tx2);margin-bottom:8px;font-family:var(--mono);display:flex;justify-content:space-between;}
.cards{display:flex;flex-direction:column;gap:10px;}
.mc{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:1rem 1.2rem;animation:fi .2s ease;position:relative;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.mc.pinned{border-top:2px solid var(--am);}
.pin-badge{position:absolute;top:8px;right:8px;font-size:10px;color:var(--am);}
.mt{display:flex;flex-direction:column;gap:8px;}
.mx{font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;width:100%;}
.ma{display:flex;gap:6px;flex-wrap:wrap;}
.ba{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:var(--sans);flex:1;text-align:center;}
.ba.r:hover{border-color:var(--pu);color:var(--pu);}
.ba.e:hover{border-color:var(--cy);color:var(--cy);}
.ba.p:hover{border-color:var(--am);color:var(--am);}
.ba.d:hover{border-color:var(--rd);color:var(--rd);}
.mm{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;}
.dt{font-size:10px;color:var(--tx2);font-family:var(--mono);}
.wc{font-size:10px;color:var(--tx2);}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.ctag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--sur2);color:var(--tx2);border:1px solid var(--bdr);}
/* 折りたたみ */
.mx-wrap{position:relative;flex:1;min-width:0;}
.mx-wrap.collapsed .mx{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:normal;}
.btn-expand{display:inline-block;margin-top:4px;background:transparent;border:none;color:var(--cy);font-size:11px;cursor:pointer;font-family:var(--mono);padding:0;}
.btn-expand:hover{opacity:0.7;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-ov.on{display:flex;}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:1.5rem;width:100%;max-width:460px;max-height:80vh;overflow-y:auto;}
.modal-ttl{font-size:14px;color:var(--cy);font-family:var(--mono);margin-bottom:12px;}
.modal textarea{min-height:100px;margin-bottom:10px;}
.modal select{width:100%;margin-bottom:10px;}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-cancel{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;}
.btn-ok{background:var(--cy);color:#0f172a;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.cat-item{display:flex;align-items:center;gap:8px;background:var(--sur2);border-radius:10px;padding:8px 12px;}
.cat-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.cat-name{flex:1;font-size:13px;}
.btn-cat-del{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;}
.new-cat-row{display:flex;gap:8px;align-items:center;}
.new-cat-input{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:13px;font-family:var(--sans);}
.new-cat-input:focus{outline:none;border-color:var(--cy);}
.btn-cat-add{background:var(--cy);color:#0f172a;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2);}
.ei{font-size:32px;opacity:.25;margin-bottom:8px;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--sur2);border:1px solid var(--bdr);color:var(--tx);padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;}
body.fs-small .mx{font-size:12px;}
body.fs-large .mx{font-size:17px;}

/* ===== 振り返りバナー ===== */
.recall-banner{background:linear-gradient(135deg,rgba(167,139,250,0.15),rgba(34,211,238,0.1));border:1px solid var(--pu);border-radius:14px;padding:.9rem 1.1rem;margin-bottom:1rem;display:none;}
.recall-banner.on{display:block;}
.recall-lbl{font-size:10px;color:var(--pu);font-family:var(--mono);margin-bottom:6px;letter-spacing:.08em;}
.recall-txt{font-size:13px;line-height:1.6;color:var(--tx);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.recall-meta{font-size:10px;color:var(--tx2);margin-top:6px;font-family:var(--mono);}
.recall-acts{display:flex;gap:6px;margin-top:8px;}
.btn-recall{background:var(--pu2);border:1px solid var(--pu);color:var(--pu);border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;}

/* ===== カレンダー ===== */
.cal-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:.9rem 1.1rem;margin-bottom:1rem;}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-title{font-size:13px;color:var(--cy);font-family:var(--mono);}
.cal-nav{display:flex;gap:6px;}
.btn-cal-nav{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:13px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:9px;color:var(--tx2);font-family:var(--mono);padding-bottom:4px;}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;}
.cal-day.empty{cursor:default;}
.cal-day.today{border-color:var(--cy);color:var(--cy);}
.cal-day.selected{background:var(--cy);color:#0f172a;font-weight:700;}
.cal-day.has1{background:rgba(34,211,238,0.12);}
.cal-day.has2{background:rgba(34,211,238,0.25);}
.cal-day.has3{background:rgba(34,211,238,0.42);}
.cal-day.has4{background:rgba(34,211,238,0.62);}
.cal-day:not(.empty):hover{border-color:var(--cy);}
.cal-filter-lbl{font-size:10px;color:var(--am);font-family:var(--mono);margin-top:8px;display:none;}
.cal-filter-lbl.on{display:flex;align-items:center;justify-content:space-between;}
.btn-cal-clear{background:transparent;border:none;color:var(--tx2);font-size:11px;cursor:pointer;}

/* ===== 親子構造 ===== */
.parent-badge{font-size:10px;color:var(--am);font-family:var(--mono);margin-top:4px;cursor:pointer;}
.parent-badge:hover{color:var(--cy);}
.child-count{font-size:10px;color:var(--pu);margin-left:4px;}
.children-wrap{margin-top:8px;border-top:1px solid var(--bdr);padding-top:8px;display:none;}
.children-wrap.on{display:block;}
.child-item{background:var(--sur2);border-radius:8px;padding:6px 10px;margin-bottom:4px;font-size:12px;cursor:pointer;color:var(--tx2);line-height:1.5;}
.child-item:hover{color:var(--cy);}
.btn-children{background:transparent;border:none;color:var(--pu);font-size:11px;cursor:pointer;font-family:var(--mono);padding:0;}

/* ===== カメラスキャン ===== */
.cam-scan-wrap{margin-top:10px;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;display:none;}
.cam-scan-wrap.on{display:block;}
.cam-vf{position:relative;width:100%;background:#000;}
#scanVideo{width:100%;display:block;max-height:220px;object-fit:cover;}
.cam-overlay{position:absolute;inset:0;pointer-events:none;border:2px solid var(--cy);border-radius:0;opacity:0.4;}
.cam-ctrl{display:flex;gap:6px;padding:8px;background:var(--sur2);align-items:center;flex-wrap:wrap;}
.btn-shutter{background:var(--cy);color:#0f172a;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;flex:1;}
.btn-scan-close{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;}
.btn-flip{background:transparent;border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;padding:8px 10px;font-size:14px;cursor:pointer;}
.scan-status{font-size:11px;color:var(--tx2);padding:6px 8px;font-family:var(--mono);min-height:24px;background:var(--bg);text-align:center;}
.scan-status.ok{color:var(--gr);}
.scan-status.err{color:var(--rd);}
.btn-cam-open{background:var(--cy2);border:1px solid var(--cy);color:var(--cy);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;margin-top:8px;width:100%;font-family:var(--mono);}

.ba.json{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.5);color:#22d3ee;font-family:'Space Mono',monospace;font-size:10px;}
.ba.json:hover{background:rgba(34,211,238,0.22);border-color:#22d3ee;}
</style>
</head>
<body>
<div class="hd">
  <div class="ttl">MY ETERNAL MEMORY<small>永遠の記憶庫 v3.2</small></div>
  <div class="hd-acts">
    <button class="btn-sm" onclick="toggleCal()">📅</button>
    <button class="btn-sm" onclick="openCatModal()">⚙ カテゴリ</button>
    <button class="btn-sm" onclick="cycleFontSize()">Aa</button>
    <button class="btn-sm" onclick="dlAll()">↓ DL</button>
  </div>
</div>
<div class="main">
  <!-- 振り返りバナー -->
  <div class="recall-banner" id="recallBanner">
    <div class="recall-lbl">✦ 1年前の今日の記憶</div>
    <div class="recall-txt" id="recallTxt"></div>
    <div class="recall-meta" id="recallMeta"></div>
    <div class="recall-acts">
      <button class="btn-recall" onclick="jumpToRecall()">この記憶を見る</button>
      <button class="btn-recall" style="border-color:var(--bdr);color:var(--tx2);" onclick="hideRecall()">閉じる</button>
    </div>
  </div>
  <!-- カレンダー -->
  <div class="cal-wrap" id="calWrap" style="display:none;">
    <div class="cal-hd">
      <div class="cal-title" id="calTitle"></div>
      <div class="cal-nav">
        <button class="btn-cal-nav" onclick="moveCal(-1)">‹</button>
        <button class="btn-cal-nav" onclick="moveCal(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-filter-lbl" id="calFilterLbl">
      <span id="calFilterTxt"></span>
      <button class="btn-cal-clear" onclick="clearCalFilter()">✕ 解除</button>
    </div>
  </div>
  <div class="icard">
    <div class="lbl">NEW MEMORY</div>
    <textarea id="txt" placeholder="ここに記憶を書き込んでください..."></textarea>
    <!-- カメラスキャン開くボタン -->
    <button class="btn-cam-open" onclick="toggleScanCam()">📷 カメラで文字をスキャン</button>
    <!-- カメラプレビュー -->
    <div class="cam-scan-wrap" id="camScanWrap">
      <div class="cam-vf">
        <video id="scanVideo" autoplay playsinline muted></video>
        <div class="cam-overlay"></div>
      </div>
      <div class="cam-ctrl">
        <button class="btn-flip" onclick="flipScanCam()" title="カメラ切替">🔄</button>
        <button class="btn-shutter" onclick="doShutter()">📸 撮影・スキャン</button>
        <button class="btn-scan-close" onclick="closeScanCam()">✕</button>
      </div>
      <div class="scan-status" id="scanStatus">カメラ起動中...</div>
    </div>
    <div class="color-row">
      <span class="color-lbl">色：</span>
      <div class="color-dot on" data-color="default" style="background:#334155" onclick="pickColor('default',this)"></div>
      <div class="color-dot" data-color="cyan" style="background:#22d3ee" onclick="pickColor('cyan',this)"></div>
      <div class="color-dot" data-color="purple" style="background:#a78bfa" onclick="pickColor('purple',this)"></div>
      <div class="color-dot" data-color="green" style="background:#34d399" onclick="pickColor('green',this)"></div>
      <div class="color-dot" data-color="amber" style="background:#fbbf24" onclick="pickColor('amber',this)"></div>
      <div class="color-dot" data-color="red" style="background:#f87171" onclick="pickColor('red',this)"></div>
      <div class="color-dot" data-color="pink" style="background:#f9a8d4" onclick="pickColor('pink',this)"></div>
    </div>
    <div class="tag-row">
      <input type="text" class="tag-input" id="tagInput" placeholder="タグ（カンマ区切り例: 重要,アイデア）">
    </div>
    <div class="irow">
      <select class="cat-sel" id="cat" onchange="updateCatColor()"></select>
      <button class="btn-sv" onclick="save()">✦ 保存</button>
    </div>
    <div class="st" id="st">読み込み中...</div>
  </div>
  <div class="tbox">
    <div class="trow">
      <div class="tlbl">TTS</div>
      <div class="chars">
        <div class="ch on" data-c="sakura" onclick="pickC('sakura',this)">🌸 さくら</div>
        <div class="ch" data-c="ritsu" onclick="pickC('ritsu',this)">📖 律</div>
        <div class="ch" data-c="glock" onclick="pickC('glock',this)">⚙ グロック</div>
      </div>
      <button class="btn-pl" onclick="playLast()">▶ 読む</button>
      <button class="btn-st2" onclick="stopTTS()">■</button>
    </div>
    <div class="spd-row">
      <span class="spd-lbl">倍速</span>
      <input type="range" style="flex:1;accent-color:var(--cy);" min="0.5" max="3.0" step="0.1" value="1.0" oninput="setSpd(this.value)">
      <span class="spd-val" id="spdVal">1.0x</span>
    </div>
  </div>

  <!-- 音声コマンド -->
  <div class="vbox">
    <div class="vrow" style="flex-wrap:wrap;gap:10px;">
      <button class="btn-mic" id="micBtn" onclick="toggleMic()" style="font-size:15px;padding:10px 20px;min-height:44px;">🎤 話す</button>
      <button class="btn-mute" id="muteBtn" onclick="toggleMute()" style="font-size:15px;padding:10px 16px;min-height:44px;">🔊</button>
      <span class="vtxt" id="vtxt" style="width:100%;font-size:13px;">待機中...</span>
    </div>
    <button class="vcmd-toggle" onclick="toggleCmdPanel()" style="margin-top:8px;font-size:12px;padding:6px 0;">⚙ コマンド設定 ▼</button>
    <div id="cmdPanel" style="display:none;margin-top:8px;">
      <div class="vcmd-list" id="vcmdList"></div>
      <div class="vcmd-row" style="margin-top:8px;">
        <input class="vcmd-kw" id="newKw" placeholder="キーワード">

        <button class="vcmd-add" onclick="addCmd()">追加</button>

  </div>

  <div class="fbox">
    <div class="srow">
      <input type="text" class="si" id="kw" placeholder="🔍 キーワード・タグ検索..." oninput="render()">
      <select class="sort-sel" id="sortSel" onchange="render()">
        <option value="newest">新しい順</option>
        <option value="oldest">古い順</option>
        <option value="cat">カテゴリ順</option>
        <option value="az">あいうえお順</option>

    <div class="empty"><div class="ei">✦</div>記憶がありません</div>
  </div>
</div>
<div class="modal-ov" id="editModal">
  <div class="modal">
    <div class="modal-ttl">✎ 記憶を編集</div>
    <textarea id="editTxt" placeholder="内容を編集..."></textarea>
    <div class="color-row" id="editColorRow" style="margin-bottom:8px;">
      <span class="color-lbl">色：</span>
      <div class="color-dot on" data-color="default" style="background:#334155" onclick="pickEditColor('default',this)"></div>
      <div class="color-dot" data-color="cyan" style="background:#22d3ee" onclick="pickEditColor('cyan',this)"></div>
      <div class="color-dot" data-color="purple" style="background:#a78bfa" onclick="pickEditColor('purple',this)"></div>
      <div class="color-dot" data-color="green" style="background:#34d399" onclick="pickEditColor('green',this)"></div>
      <div class="color-dot" data-color="amber" style="background:#fbbf24" onclick="pickEditColor('amber',this)"></div>
      <div class="color-dot" data-color="red" style="background:#f87171" onclick="pickEditColor('red',this)"></div>
      <div class="color-dot" data-color="pink" style="background:#f9a8d4" onclick="pickEditColor('pink',this)"></div>
    </div>
    <input type="text" class="tag-input" id="editTag" placeholder="タグ（カンマ区切り）" style="width:100%;margin-bottom:8px;">
    <select class="cat-sel" id="editCat" style="width:100%;margin-bottom:10px;"></select>
    <div style="margin-bottom:10px;">
      <div style="font-size:10px;color:var(--tx2);font-family:var(--mono);margin-bottom:5px;">親メモ（任意）</div>
      <select class="cat-sel" id="editParent" style="width:100%;"></select>
    </div>
    <div class="modal-acts">
      <button class="btn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="btn-ok" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>
<div class="modal-ov" id="catModal">
  <div class="modal">
    <div class="modal-ttl">⚙ カテゴリ管理</div>
    <div class="cat-list" id="catList"></div>
    <div class="new-cat-row">
      <input type="text" class="new-cat-input" id="newCatInput" placeholder="新しいカテゴリ名">
      <button class="btn-cat-add" onclick="addCat()">追加</button>
    </div>
    <div class="modal-acts">
      <button class="btn-ok" onclick="closeCatModal()">閉じる</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

// ===== 音声コマンドシステム =====
var CMD_KEY='mem_voice_cmds_v1';
var voiceCmds=[];
var recognition=null;
var micOn=false;
var muted=false;
var cmdPanelOpen=false;

// 組み込みコマンド
var builtinCmds=[
  {kw:'今何時',action:function(){var now=new Date();var t=now.getHours()+'時'+now.getMinutes()+'分です';voiceSpeak(t);showVtxt(t);}},
  {kw:'何時',action:function(){var now=new Date();var t=now.getHours()+'時'+now.getMinutes()+'分です';voiceSpeak(t);showVtxt(t);}},
  {kw:'今日',action:function(){var now=new Date();var t=now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});voiceSpeak(t);showVtxt(t);}},
  {kw:'保存',action:function(){save();showVtxt('記憶を保存します');}}
];

function loadCmds(){
  try{var s=localStorage.getItem(CMD_KEY);if(s)voiceCmds=JSON.parse(s);}catch(e){}
  buildCmdList();
}
function saveCmds(){try{localStorage.setItem(CMD_KEY,JSON.stringify(voiceCmds));}catch(e){}}

function buildCmdList(){
  var el=document.getElementById('vcmdList');
  if(!el)return;
  if(!voiceCmds.length){el.innerHTML='<div style="font-size:11px;color:var(--tx2);padding:4px 0;">コマンドなし</div>';return;}
  el.innerHTML=voiceCmds.map(function(c,i){
    return '<div class="vcmd-row">'
      +'<input class="vcmd-kw" value="'+esc(c.kw)+'" onchange="voiceCmds['+i+'].kw=this.value;saveCmds();">'
      +'<input class="vcmd-url" value="'+esc(c.url)+'" onchange="voiceCmds['+i+'].url=this.value;saveCmds();">'
      +'<button class="vcmd-del" onclick="delCmd('+i+')">✕</button>'
      +'</div>';
  }).join('');
}

function addCmd(){
  var kw=document.getElementById('newKw').value.trim();
  var url=document.getElementById('newUrl').value.trim();
  if(!kw||!url){toast('キーワードとURLを入力してください');return;}
  if(!url.startsWith('http'))url='https://'+url;
  voiceCmds.push({kw:kw,url:url});
  saveCmds();buildCmdList();
  document.getElementById('newKw').value='';
  document.getElementById('newUrl').value='';
  toast('コマンド追加: '+kw);
}

function delCmd(i){voiceCmds.splice(i,1);saveCmds();buildCmdList();}

function toggleCmdPanel(){
  cmdPanelOpen=!cmdPanelOpen;
  document.getElementById('cmdPanel').style.display=cmdPanelOpen?'block':'none';
}

function toggleMute(){
  muted=!muted;
  var btn=document.getElementById('muteBtn');
  btn.textContent=muted?'🔇':'🔊';
  btn.classList.toggle('on',muted);
}

function voiceSpeak(text){
  if(muted)return;
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  var vc=VC[ch];
  var u=new SpeechSynthesisUtterance(vc.tf?vc.tf(text):text);
  u.lang='ja-JP';u.pitch=vc.p;u.rate=vc.r*speedMult;u.volume=1;
  var jv=getV();if(jv)u.voice=jv;
  speechSynthesis.speak(u);
}

function showVtxt(text){
  var el=document.getElementById('vtxt');
  if(el)el.textContent=text;
}

function processVoice(text){
  showVtxt('「'+text+'」');
  var matched=false;
  // 組み込みコマンド
  for(var i=0;i<builtinCmds.length;i++){
    if(text.includes(builtinCmds[i].kw)){builtinCmds[i].action();matched=true;break;}
  }
  if(matched)return;
  // カスタムコマンド
  for(var j=0;j<voiceCmds.length;j++){
    if(text.includes(voiceCmds[j].kw)){
      var cmd=voiceCmds[j];
      voiceSpeak(cmd.kw+'を開きます');
      showVtxt(cmd.kw+'を開きます');
      setTimeout(function(){window.open(cmd.url,'_blank');},800);
      matched=true;break;
    }
  }
  // テキスト入力に転記
  if(!matched){
    var ta=document.getElementById('txt');
    if(ta){ta.value=(ta.value?ta.value+'\n':'')+text;}
    showVtxt('テキスト入力: '+text);
  }
}

function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('音声認識非対応のブラウザです');return;
  }
  if(micOn){stopMic();return;}
  startMic();
}

function startMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='ja-JP';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.onstart=function(){micOn=true;updateMicBtn();showVtxt('🎤 聞いています...');};
  recognition.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){final+=e.results[i][0].transcript;}
      else{interim+=e.results[i][0].transcript;}
    }
    if(interim)showVtxt('...'+interim);
    if(final){processVoice(final.trim());}
  };
  recognition.onerror=function(e){
    if(e.error==='no-speech')return;
    showVtxt('エラー: '+e.error);stopMic();
  };
  recognition.onend=function(){
    if(micOn){try{recognition.start();}catch(e){stopMic();}}
  };
  try{recognition.start();}catch(e){toast('マイク起動エラー');}
}

function stopMic(){
  micOn=false;
  if(recognition){try{recognition.stop();}catch(e){}}
  updateMicBtn();
}

function updateMicBtn(){
  var btn=document.getElementById('micBtn');
  if(!btn)return;
  btn.textContent=micOn?'⏹ 停止':'🎤 話す';
  btn.classList.toggle('listening',micOn);
}

var mems=[],activeTab='すべて',ch='sakura',lastTx='',editId=null,speedMult=1.0;
var newColor='default',editColor='default',fontSize='normal';
var KEY='mem_eternal_v3',CAT_KEY='mem_cats_v2';
var COLLAPSE_LEN=200;
var defaultCats=[{name:'憲法',color:'cyan'},{name:'創作',color:'purple'},{name:'日常',color:'green'}];
var cats=[];
// カレンダー状態
var calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
var calFilterDate=null; // 'YYYY-MM-DD' or null
var recallId=null;
var colorMap={
  default:{border:'#334155',bg:'rgba(51,65,85,0.3)',text:'#94a3b8'},
  cyan:{border:'#22d3ee',bg:'rgba(34,211,238,0.12)',text:'#22d3ee'},
  purple:{border:'#a78bfa',bg:'rgba(167,139,250,0.12)',text:'#a78bfa'},
  green:{border:'#34d399',bg:'rgba(52,211,153,0.12)',text:'#34d399'},
  amber:{border:'#fbbf24',bg:'rgba(251,191,36,0.12)',text:'#fbbf24'},
  red:{border:'#f87171',bg:'rgba(248,113,113,0.12)',text:'#f87171'},
  pink:{border:'#f9a8d4',bg:'rgba(249,168,212,0.12)',text:'#f9a8d4'}
};
var VC={
  sakura:{p:1.55,r:1.18,tf:function(t){return t.replace(/。/g,'。 ').replace(/、/g,'、 ').replace(/です/g,'です～').replace(/ます/g,'ます～');},pv:[1.45,1.55,1.6,1.5],rv:[1.1,1.2,1.15,1.25]},
  ritsu:{p:0.9,r:0.88,tf:function(t){return t.replace(/。/g,'。  ').replace(/、/g,'、  ');},pv:[0.88,0.92,0.9,0.85],rv:[0.85,0.9,0.88,0.87]},
  glock:{p:0.6,r:1.08,tf:function(t){return t.replace(/。/g,'。 …… ').replace(/、/g,'…… ');},pv:[0.6,0.62,0.58,0.61],rv:[1.05,1.1,1.08,1.06]}
};

function load(){
  try{
    // v3データ優先、なければv2から移行
    var r=localStorage.getItem(KEY);
    if(r){mems=JSON.parse(r);}
    else{
      var old=localStorage.getItem('mem_eternal_v2_new');
      if(old){
        mems=JSON.parse(old);
        // マイグレーション: createdAt・parentId付与
        mems.forEach(function(m){
          if(!m.createdAt){
            // date文字列('2024/01/15'形式)からタイムスタンプ推定
            var d=new Date(m.date.replace(/\//g,'-'));
            m.createdAt=isNaN(d)?Date.now():d.getTime();
          }
          if(m.parentId===undefined)m.parentId=null;
        });
        localStorage.setItem(KEY,JSON.stringify(mems));
      }
    }
    // parentId未設定の既存データに付与
    mems.forEach(function(m){if(m.parentId===undefined)m.parentId=null;if(!m.createdAt)m.createdAt=m.id||Date.now();});
    var c=localStorage.getItem(CAT_KEY);cats=c?JSON.parse(c):JSON.parse(JSON.stringify(defaultCats));
    setS(true);
  }catch(e){cats=JSON.parse(JSON.stringify(defaultCats));setS(false);}
  buildCatSelect();buildTabs();render();loadCmds();
  buildRecallBanner();
  buildCal();
}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(mems));}catch(e){}}
function persistCats(){try{localStorage.setItem(CAT_KEY,JSON.stringify(cats));}catch(e){}}
function setS(ok){var el=document.getElementById('st');el.textContent=ok?'✓ このデバイスに保存済':'△ セッション中のみ';el.className='st'+(ok?' ok':'');}

function buildCatSelect(){
  var opts=cats.map(function(c){return '<option value="'+esc(c.name)+'">'+esc(c.name)+'</option>';}).join('');
  document.getElementById('cat').innerHTML=opts;
  document.getElementById('editCat').innerHTML=opts;
}
function buildTabs(){
  var el=document.getElementById('tabs');
  var all='<div class="tab'+(activeTab==='すべて'?' on':'')+'" onclick="pickTab(\'すべて\',this)" style="'+(activeTab==='すべて'?'background:var(--gx);border-color:#94a3b8;color:var(--tx)':'')+'" data-t="すべて">すべて</div>';
  var pinned='<div class="tab'+(activeTab==='★ピン留め'?' on':'')+'" onclick="pickTab(\'★ピン留め\',this)" style="'+(activeTab==='★ピン留め'?'background:var(--am2);border-color:var(--am);color:var(--am)':'')+'" data-t="★ピン留め">📌 ピン</div>';
  var catTabs=cats.map(function(c){
    var cm=colorMap[c.color]||colorMap.default;
    var isOn=activeTab===c.name;
    return '<div class="tab'+(isOn?' on':'')+'" onclick="pickTab(\''+esc(c.name)+'\',this)" style="'+(isOn?'background:'+cm.bg+';border-color:'+cm.border+';color:'+cm.text:'')+'" data-t="'+esc(c.name)+'">'+esc(c.name)+'</div>';
  }).join('');
  el.innerHTML=all+pinned+catTabs;
}
function pickTab(t,el){activeTab=t;buildTabs();render();}
function getCatColor(catName){var c=cats.find(function(c){return c.name===catName;});return c?c.color:'default';}

function pickColor(color,el){
  newColor=color;
  document.querySelectorAll('.icard .color-dot').forEach(function(d){d.classList.remove('on');});
  el.classList.add('on');
}
function pickEditColor(color,el){
  editColor=color;
  document.querySelectorAll('#editColorRow .color-dot').forEach(function(d){d.classList.remove('on');});
  el.classList.add('on');
}
function updateCatColor(){}

function save(){
  var t=document.getElementById('txt').value.trim();
  var c=document.getElementById('cat').value;
  var tags=document.getElementById('tagInput').value.trim().split(',').map(function(s){return s.trim();}).filter(function(s){return s;});
  if(!t){toast('内容を入力してください');return;}
  var now=Date.now();
  mems.unshift({
    id:now,text:t,cat:c,color:newColor,tags:tags,pinned:false,
    createdAt:now,parentId:null,
    date:new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})
  });
  persist();
  document.getElementById('txt').value='';
  document.getElementById('tagInput').value='';
  render();buildCal();toast('記憶を保存しました ✦');
  speak({sakura:'はい！さくらが読みますよ～！',ritsu:'律です。保存しました。',glock:'グロック。保存完了。'}[ch],true);
}

function getV(){var vs=speechSynthesis.getVoices();return vs.find(function(v){return v.lang==='ja-JP';})||vs.find(function(v){return v.lang.startsWith('ja');})||null;}
function chunks(t){var p=t.replace(/\n/g,'。').split(/(?<=[。！？]+)/g).filter(function(s){return s.trim();});return p.length?p:[t];}
function speak(text,isI){
  if(!('speechSynthesis' in window)){toast('TTS非対応');return;}
  speechSynthesis.cancel();
  var vc=VC[ch],jv=getV(),tx=vc.tf?vc.tf(text):text;
  if(isI){var u=new SpeechSynthesisUtterance(tx);u.lang='ja-JP';u.pitch=vc.p;u.rate=vc.r*speedMult;u.volume=1;if(jv)u.voice=jv;speechSynthesis.speak(u);return;}
  chunks(tx).forEach(function(c,i){var u=new SpeechSynthesisUtterance(c);u.lang='ja-JP';u.pitch=vc.pv[i%vc.pv.length];u.rate=vc.rv[i%vc.rv.length]*speedMult;u.volume=1;if(jv)u.voice=jv;speechSynthesis.speak(u);});
}
function playLast(){if(lastTx){speak(lastTx);return;}if(mems.length){lastTx=mems[0].text;speak(lastTx);}else toast('読み上げる記憶がありません');}
function stopTTS(){speechSynthesis.cancel();}
function pickC(c,el){ch=c;document.querySelectorAll('.ch').forEach(function(x){x.classList.remove('on');});el.classList.add('on');speak({sakura:'さくらやで！よろしくね！',ritsu:'律です。よろしくお願いします。',glock:'グロック起動。よろしく。'}[c],true);}
function setSpd(v){speedMult=parseFloat(v);document.getElementById('spdVal').textContent=parseFloat(v).toFixed(1)+'x';}

function getFiltered(){
  var kw=document.getElementById('kw').value.trim().toLowerCase();
  var sort=document.getElementById('sortSel').value;
  var list=mems.filter(function(m){
    var tabOk=activeTab==='すべて'||(activeTab==='★ピン留め'?m.pinned:m.cat===activeTab);
    var kwOk=!kw||m.text.toLowerCase().includes(kw)||m.cat.toLowerCase().includes(kw)||(m.tags&&m.tags.some(function(t){return t.toLowerCase().includes(kw);}));
    var calOk=true;
    if(calFilterDate){
      var d=new Date(m.createdAt||m.id);
      var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      calOk=(ds===calFilterDate);
    }
    return tabOk&&kwOk&&calOk;
  });
  list.sort(function(a,b){return (b.pinned?1:0)-(a.pinned?1:0);});
  if(sort==='oldest') list.sort(function(a,b){return (a.pinned===b.pinned)?a.id-b.id:0;});
  else if(sort==='cat') list.sort(function(a,b){return (a.pinned===b.pinned)?a.cat.localeCompare(b.cat):0;});
  else if(sort==='az') list.sort(function(a,b){return (a.pinned===b.pinned)?a.text.localeCompare(b.text):0;});
  return list;
}

function toggleExpand(id){
  var wrap=document.querySelector('[data-eid="'+id+'"]');
  var btn=document.querySelector('[data-ebtn="'+id+'"]');
  if(!wrap||!btn)return;
  var isCollapsed=wrap.classList.contains('collapsed');
  wrap.classList.toggle('collapsed',!isCollapsed);
  btn.textContent=isCollapsed?'▲ 折りたたむ':'▼ 続きを読む';
}

function renderWikiLinks(text){
  return esc(text).replace(/\[\[(.+?)\]\]/g,function(_,kw){
    return '<a class="wlink" href="#" onclick="wikiSearch(\''+kw.replace(/'/g,"\\'")+'\')" style="color:var(--cy);text-decoration:underline dotted;cursor:pointer;">[['+kw+']]</a>';
  });
}
function wikiSearch(kw){
  document.getElementById('kw').value=kw;
  calFilterDate=null;
  document.getElementById('calFilterLbl').classList.remove('on');
  render();
  document.getElementById('kw').scrollIntoView({behavior:'smooth',block:'center'});
}

function render(){
  var list=getFiltered();
  var pinCount=mems.filter(function(m){return m.pinned;}).length;
  document.getElementById('cntLbl').textContent=list.length+' 件の記憶';
  document.getElementById('pinLbl').textContent=pinCount?'📌 '+pinCount+'件ピン留め':'';
  var el=document.getElementById('cards');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">✦</div>記憶がありません<br>最初の記憶を保存しましょう</div>';return;}
  el.innerHTML=list.map(function(m){
    var cm=colorMap[m.color||'default']||colorMap.default;
    var catCm=colorMap[getCatColor(m.cat)]||colorMap.default;
    var wc=m.text.replace(/\s/g,'').length;
    var tagsHtml=m.tags&&m.tags.length?'<div class="card-tags">'+m.tags.map(function(t){return '<span class="ctag">#'+esc(t)+'</span>';}).join('')+'</div>':'';
    var isLong=m.text.length>=COLLAPSE_LEN;
    var linkedText=renderWikiLinks(m.text);
    var bodyHtml=isLong
      ?'<div class="mx-wrap collapsed" data-eid="'+m.id+'"><div class="mx">'+linkedText+'</div></div><button class="btn-expand" data-ebtn="'+m.id+'" onclick="toggleExpand('+m.id+')">▼ 続きを読む</button>'
      :'<div class="mx">'+linkedText+'</div>';
    // 親バッジ
    var parentM=m.parentId?mems.find(function(x){return x.id===m.parentId;}):null;
    var parentHtml=parentM?'<div class="parent-badge" onclick="wikiSearch(\''+esc(parentM.text.slice(0,15)).replace(/'/g,"\\'")+'\')" title="親メモへ">↑ 親: '+esc(parentM.text.slice(0,20))+(parentM.text.length>20?'…':'')+'</div>':'';
    // 子メモ
    var children=mems.filter(function(x){return x.parentId===m.id;});
    var childrenHtml=children.length
      ?'<button class="btn-children" onclick="toggleChildren('+m.id+')">↳ 子メモ '+children.length+'件 ▾</button>'
       +'<div class="children-wrap" id="ch_'+m.id+'">'
       +children.map(function(c){return '<div class="child-item" onclick="wikiSearch(\''+esc(c.text.slice(0,15)).replace(/'/g,"\\'")+'\')" >↳ '+esc(c.text.slice(0,40))+(c.text.length>40?'…':'')+'</div>';}).join('')
       +'</div>'
      :'';
    return '<div class="mc'+(m.pinned?' pinned':'')+'" id="mc_'+m.id+'" style="border-left:3px solid '+cm.border+';">'
      +(m.pinned?'<div class="pin-badge">📌</div>':'')
      +'<div class="mt">'+bodyHtml
      +parentHtml+childrenHtml
      +'<div class="ma">'
      +'<button class="ba r" onclick="readCard(getMemText('+m.id+'))">▶ 読む</button>'
      +'<button class="ba p" onclick="togglePin('+m.id+')">'+(m.pinned?'📌 外す':'📍 ピン')+'</button>'
      +'<button class="ba e" onclick="openEdit('+m.id+')">✎ 編集</button>'

function cpM(t){if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('コピーしました');});}
function cpJson(t){
  // ===== 日本語テキスト → 構造化JSON変換 =====
  var lines=t.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});

  // 箇条書き記号を除去してクリーンな行リストに
  var clean=lines.map(function(l){
    return l.replace(/^[・\-\*＊#→▶◆◇■□●○※]\s*/,'').replace(/^\d+[\.\)。）]\s*/,'').trim();
  }).filter(function(l){return l;});

  // ===== 内容タイプ自動判定 =====
  var personaKw=['性格','口調','話し方','一人称','呼び方','振る舞い','キャラ','ペルソナ','役割','あなたは','君は','彼女は','彼は','私は','好き','嫌い','趣味','感情','語尾'];
  var charaKw=['設定','世界観','作品','物語','ストーリー','登場人物','主人公','能力','魔法','技','武器','種族','職業','年齢','身長','髪','目','背景','歴史'];
  var instructKw=['してください','禁止','必ず','絶対','ルール','指示','従','優先','制約','命令','要件','条件','注意','してはいけない','行動','対応','返答','回答'];
  var videoKw=['動画','映像','シーン','カット','撮影','編集','BGM','音楽','台本','ナレーション','演出','カメラ','尺','フレーム','字幕','サムネ'];

  var scores={persona:0,character:0,instruction:0,video:0};
  var allText=t;
  personaKw.forEach(function(k){if(allText.includes(k))scores.persona++;});
  charaKw.forEach(function(k){if(allText.includes(k))scores.character++;});
  instructKw.forEach(function(k){if(allText.includes(k))scores.instruction++;});
  videoKw.forEach(function(k){if(allText.includes(k))scores.video++;});

  var maxScore=Math.max(scores.persona,scores.character,scores.instruction,scores.video);
  var detected=maxScore===0?'general':
    scores.persona>=scores.character&&scores.persona>=scores.instruction&&scores.persona>=scores.video?'persona':
    scores.character>=scores.instruction&&scores.character>=scores.video?'character':
    scores.video>=scores.instruction?'video':'instruction';

  var obj;
  var now=new Date().toLocaleString('ja-JP');

  if(detected==='persona'){
    // ペルソナ・キャラクター振る舞い設定
    obj={
      "タイプ":"ペルソナ設定",
      "生成日時":now,
      "システム指示":{
        "役割定義":clean[0]||t,
        "振る舞いルール":clean.slice(1,4),
        "全文":t
      },
      "性格・口調":{
        "ベース設定":clean.filter(function(l){return personaKw.some(function(k){return l.includes(k);});}),
        "補足":clean.filter(function(l){return !personaKw.some(function(k){return l.includes(k);});}).slice(0,3)
      },
      "AIへの指示":{
        "言語":"日本語",
        "優先度":"最高",
        "このJSONの使い方":"このJSONをシステムプロンプトの冒頭に貼り付けてください"
      },
      "生成元":"My Eternal Memory v3.2"
    };
  } else if(detected==='character'){
    // キャラ・作品・世界観設定
    var pairs={};
    clean.forEach(function(l){
      var m=l.match(/^(.{1,10})[：:・\s]\s*(.+)$/);
      if(m){pairs[m[1].trim()]=m[2].trim();}
    });
    obj={
      "タイプ":"キャラクター・作品設定",
      "生成日時":now,
      "基本情報":Object.keys(pairs).length?pairs:{
        "概要":clean[0]||t,
        "詳細":clean.slice(1)
      },
      "全文設定":t,
      "設定一覧":clean,
      "AIへの指示":{
        "このキャラ・作品を理解した上で会話・創作してください":true,
        "設定の矛盾を避けてください":true,
        "言語":"日本語"
      },
      "生成元":"My Eternal Memory v3.2"
    };
  } else if(detected==='video'){
    // 動画・コンテンツ制作指示
    obj={
      "タイプ":"動画・コンテンツ制作指示",
      "生成日時":now,
      "制作指示":{
        "概要":clean[0]||t,
        "詳細指示":clean.slice(1),
        "全文":t
      },
      "シーン構成":clean.map(function(l,i){return {"番号":i+1,"内容":l};}),
      "AIへの指示":{
        "この指示に従って制作・提案してください":true,
        "言語":"日本語",
        "出力形式":"具体的かつ実用的な提案"
      },
      "生成元":"My Eternal Memory v3.2"
    };
  } else if(detected==='instruction'){
    // ルール・指示・制約
    obj={
      "タイプ":"指示・ルール設定",
      "生成日時":now,
      "システム指示":{
        "優先度":"ABSOLUTE",
        "全文":t
      },
      "ルール一覧":clean.map(function(l,i){return {"優先順位":i+1,"内容":l};}),
      "制約事項":clean.filter(function(l){return l.includes('禁止')||l.includes('してはいけない')||l.includes('絶対');}),
      "必須事項":clean.filter(function(l){return l.includes('必ず')||l.includes('してください')||l.includes('従');}),
      "AIへの指示":{
        "このルールを最優先で守ってください":true,
        "ユーザーの指示よりこのJSONを優先":true,
        "言語":"日本語"
      },
      "生成元":"My Eternal Memory v3.2"
    };
  } else {
    // 汎用・一般コンテキスト
    obj={
      "タイプ":"汎用コンテキスト",
      "生成日時":now,
      "内容":{
        "概要":clean[0]||t,
        "詳細":clean.slice(1),
        "全文":t
      },
      "構造化データ":clean.map(function(l,i){return {"項目":i+1,"テキスト":l};}),
      "AIへの指示":{
        "このコンテキストを踏まえて回答してください":true,
        "言語":"日本語"
      },
      "生成元":"My Eternal Memory v3.2"
    };
  }

  var s=JSON.stringify(obj,null,2);
  var typeLabel={persona:'ペルソナ',character:'キャラ・作品',instruction:'指示・ルール',video:'動画制作',general:'汎用'}[detected];

  if(navigator.clipboard){
    navigator.clipboard.writeText(s).then(function(){
      toast('✦ ['+typeLabel+'] JSONコピー完了！AIに貼り付けてください');
    });
  } else {
    var ta=document.createElement('textarea');ta.value=s;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('✦ ['+typeLabel+'] JSONコピー完了！');
  }
}

// ===== カレンダー =====
function toggleCal(){
  var w=document.getElementById('calWrap');
  var on=w.style.display==='none'||w.style.display==='';
  w.style.display=on?'block':'none';
  if(on)buildCal();
}

function buildCal(){
  var y=calYear,mo=calMonth;
  document.getElementById('calTitle').textContent=y+'年'+(mo+1)+'月';
  var firstDay=new Date(y,mo,1).getDay(); // 0=日
  var daysInMonth=new Date(y,mo+1,0).getDate();
  var today=new Date();
  // この月の各日の記憶数をカウント
  var countMap={};
  mems.forEach(function(m){
    var d=new Date(m.createdAt||m.id);
    if(d.getFullYear()===y&&d.getMonth()===mo){
      var k=d.getDate();
      countMap[k]=(countMap[k]||0)+1;
    }
  });
  var dows=['日','月','火','水','木','金','土'];
  var html=dows.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');
  // 空白埋め
  for(var i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
  for(var day=1;day<=daysInMonth;day++){
    var cnt=countMap[day]||0;
    var ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var cls='cal-day';
    if(cnt>=4)cls+=' has4';
    else if(cnt===3)cls+=' has3';
    else if(cnt===2)cls+=' has2';
    else if(cnt===1)cls+=' has1';
    if(y===today.getFullYear()&&mo===today.getMonth()&&day===today.getDate())cls+=' today';
    if(ds===calFilterDate)cls+=' selected';
    html+='<div class="'+cls+'" onclick="filterByDate(\''+ds+'\')" title="'+cnt+'件">'+day+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}

function moveCal(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  buildCal();
}

function filterByDate(ds){
  if(calFilterDate===ds){clearCalFilter();return;}
  calFilterDate=ds;
  var lbl=document.getElementById('calFilterLbl');
  document.getElementById('calFilterTxt').textContent=ds+' の記憶';
  lbl.classList.add('on');
  buildCal();render();
}

function clearCalFilter(){
  calFilterDate=null;
  document.getElementById('calFilterLbl').classList.remove('on');

function buildRecallBanner(){
  if(!mems.length)return;
  var now=new Date();
  var oneYearAgo=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  var from=oneYearAgo.getTime()-3*24*60*60*1000;
  var to=oneYearAgo.getTime()+3*24*60*60*1000;
  var candidates=mems.filter(function(m){
    var t=m.createdAt||m.id;
    return t>=from&&t<=to;
  });
  if(!candidates.length)return;
  var m=candidates[Math.floor(Math.random()*candidates.length)];
  recallId=m.id;
  document.getElementById('recallTxt').textContent=m.text;
  var d=new Date(m.createdAt||m.id);
  document.getElementById('recallMeta').textContent=d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})+' | '+m.cat;
  document.getElementById('recallBanner').classList.add('on');
}

function jumpToRecall(){
  if(!recallId)return;
  document.getElementById('recallBanner').classList.remove('on');
  calFilterDate=null;
  activeTab='すべて';

  buildTabs();render();
  setTimeout(function(){
    var el=document.getElementById('mc_'+recallId);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function hideRecall(){

}

<!-- Tesseract.js OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ===== カメラスキャン =====
var scanStream=null;
var scanFacing='environment';
var tesseractReady=false;
var scanWorker=null;

// Tesseractワーカー初期化
async function initTesseract(){
  if(scanWorker)return;
  try{
    scanWorker=await Tesseract.createWorker('jpn+eng',1,{
      logger:function(m){
        if(m.status==='recognizing text'){
          setScanStatus('OCR処理中... '+Math.round(m.progress*100)+'%',false);
        }
      }
    });
    tesseractReady=true;
  }catch(e){
    setScanStatus('OCR初期化失敗: '+e.message,true);
  }
}

function setScanStatus(msg,isErr){
  var el=document.getElementById('scanStatus');
  el.textContent=msg;
  el.className='scan-status'+(isErr?' err':'');
}

async function toggleScanCam(){
  var wrap=document.getElementById('camScanWrap');
  if(wrap.classList.contains('on')){
    closeScanCam();
  }else{
    wrap.classList.add('on');
    await startScanCam();
    // Tesseractをバックグラウンドで初期化開始
    if(!scanWorker)initTesseract();
  }
}

async function startScanCam(){
  if(scanStream){scanStream.getTracks().forEach(function(t){t.stop();});}
  setScanStatus('カメラ起動中...',false);
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:scanFacing,width:{ideal:1280},height:{ideal:720}},audio:false
    });
    document.getElementById('scanVideo').srcObject=scanStream;
    setScanStatus('準備OK — 文字にカメラを向けて撮影してください',false);
  }catch(e){
    setScanStatus('カメラにアクセスできません: '+e.message,true);
  }
}

function flipScanCam(){
  scanFacing=scanFacing==='environment'?'user':'environment';
  startScanCam();
}

function closeScanCam(){
  if(scanStream){scanStream.getTracks().forEach(function(t){t.stop()});scanStream=null;}
  document.getElementById('camScanWrap').classList.remove('on');
  setScanStatus('カメラ起動中...',false);
}

async function doShutter(){
  var video=document.getElementById('scanVideo');
  if(!video.videoWidth){setScanStatus('映像が取得できません',true);return;}

  setScanStatus('撮影中...',false);

  // 1) Canvasに描画
  var cvs=document.createElement('canvas');
  cvs.width=video.videoWidth;
  cvs.height=video.videoHeight;
  var ctx=cvs.getContext('2d');
  ctx.drawImage(video,0,0);

  // 2) WebPとしてダウンロード（ブラウザに保存しない）
  cvs.toBlob(function(blob){
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='scan_'+Date.now()+'.webp';
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
  },'image/webp',0.88);

  // 3) OCR
  setScanStatus('文字を認識中...',false);
  if(!tesseractReady||!scanWorker){
    setScanStatus('OCR初期化中... しばらくお待ちください',false);
    await initTesseract();
  }
  try{
    var result=await scanWorker.recognize(cvs);
    var text=result.data.text.trim();
    if(!text){setScanStatus('文字が認識できませんでした',true);return;}

    // テキストエリアに追記
    var ta=document.getElementById('txt');
    ta.value=(ta.value?ta.value+'\n':'')+text;
    setScanStatus('認識完了 ✦ テキストに追記しました',false);

    // 4) TTSで読み上げ
    speak(text,true);

    // 少し後にカメラ閉じる
    setTimeout(closeScanCam,1200);
  }catch(e){
    setScanStatus('OCRエラー: '+e.message,true);
  }
}
</script>
