<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>My Eternal Memory v3.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --bg: oklch(0.15 0.02 250);
  --sur: oklch(0.20 0.02 250);
  --sur2: oklch(0.23 0.02 250);
  --bdr: oklch(0.30 0.02 250);
  --tx: oklch(0.95 0.01 250);
  --tx2: oklch(0.65 0.02 250);
  --cy: oklch(0.80 0.15 195);
  --cy2: oklch(0.80 0.15 195 / 0.12);
  --pu: oklch(0.70 0.18 300);
  --pu2: oklch(0.70 0.18 300 / 0.12);
  --gr: oklch(0.75 0.15 160);
  --gr2: oklch(0.75 0.15 160 / 0.12);
  --rd: oklch(0.65 0.20 25);
  --rd2: oklch(0.65 0.20 25 / 0.12);
  --am: oklch(0.80 0.15 85);
  --am2: oklch(0.80 0.15 85 / 0.12);
  --pk: oklch(0.75 0.15 350);
  --pk2: oklch(0.75 0.15 350 / 0.12);
  --radius: 0.75rem;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--tx); font-family: var(--sans); padding-bottom: 5rem; min-height: 100vh; }

/* ===== GLASS UTILITIES ===== */
.glass {
  background: oklch(0.20 0.02 250 / 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.glass-strong {
  background: oklch(0.20 0.02 250 / 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* ===== GLOW EFFECTS ===== */
.glow-cy { box-shadow: 0 0 24px oklch(0.80 0.15 195 / 0.25), inset 0 0 16px oklch(0.80 0.15 195 / 0.04); }
.glow-pu { box-shadow: 0 0 24px oklch(0.70 0.18 300 / 0.25), inset 0 0 16px oklch(0.70 0.18 300 / 0.04); }
.glow-am { box-shadow: 0 0 24px oklch(0.80 0.15 85 / 0.25), inset 0 0 16px oklch(0.80 0.15 85 / 0.04); }

/* ===== ANIMATIONS ===== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes pulseGlow { 0%,100% { opacity: .4; } 50% { opacity: 1; } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes spin { to { transform: rotate(360deg); } }

.anim-up { animation: fadeUp .22s ease; }
.pulse { animation: pulseGlow 2s ease-in-out infinite; }
.float { animation: float 3s ease-in-out infinite; }

/* ===== HEADER ===== */
.hd {
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--bdr);
  padding: .75rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.ttl-wrap { display: flex; align-items: center; gap: .6rem; }
.ttl-icon { position: relative; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.ttl-icon::after {
  content: ''; position: absolute; inset: 0;
  background: var(--cy2); border-radius: 50%; filter: blur(6px);
  animation: pulseGlow 2s ease-in-out infinite;
}
.ttl { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--cy); letter-spacing: .1em; }
.ttl small { display: block; font-family: var(--sans); font-size: 9px; color: var(--tx2); font-weight: 400; letter-spacing: 0; }
.hd-acts { display: flex; gap: 4px; }
.btn-icon {
  background: transparent; border: 1px solid transparent; color: var(--tx2);
  border-radius: 8px; width: 34px; height: 34px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--cy2); color: var(--cy); border-color: var(--cy); transform: scale(1.08); }
.btn-icon.pink:hover { background: var(--pk2); color: var(--pk); border-color: var(--pk); }
.btn-icon.amber:hover { background: var(--am2); color: var(--am); border-color: var(--am); }
.btn-icon.green:hover { background: var(--gr2); color: var(--gr); border-color: var(--gr); }

/* ===== MAIN GRID ===== */
.main { padding: 1rem; max-width: 1100px; margin: 0 auto; }
.bento {
  display: grid;
  grid-template-columns: 1fr;
  gap: .75rem;
}
@media (min-width: 640px) {
  .bento { grid-template-columns: 1fr 1fr; }
  .span2 { grid-column: span 2; }
}
@media (min-width: 900px) {
  .bento { grid-template-columns: 2fr 1fr 1fr; }
  .span2 { grid-column: span 2; }
  .span3 { grid-column: span 3; }
}

/* ===== CARD BASE ===== */
.card {
  background: oklch(0.20 0.02 250 / 0.6);
  backdrop-filter: blur(12px);
  border: 1px solid var(--bdr);
  border-radius: 18px;
  padding: 1rem 1.1rem;
  transition: transform .2s, box-shadow .2s;
}
.card-lbl {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; color: var(--cy);
  letter-spacing: .1em; margin-bottom: .75rem; text-transform: uppercase;
}
.card-lbl::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--cy); flex-shrink: 0;
  animation: pulseGlow 2s ease-in-out infinite;
}

/* ===== INPUT CARD ===== */
.input-card { border-color: oklch(0.80 0.15 195 / 0.25); }
.input-card:focus-within { box-shadow: 0 0 28px oklch(0.80 0.15 195 / 0.18); border-color: oklch(0.80 0.15 195 / 0.5); }

textarea {
  width: 100%; background: oklch(0.15 0.02 250 / 0.5);
  border: 1px solid var(--bdr); border-radius: 12px;
  padding: 11px 13px; color: var(--tx); font-size: 14px;
  resize: none; min-height: 90px; font-family: var(--sans); line-height: 1.65;
  transition: border-color .15s;
}
textarea:focus { outline: none; border-color: var(--cy); box-shadow: 0 0 0 3px oklch(0.80 0.15 195 / 0.08); }
textarea::placeholder { color: var(--tx2); }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  border-radius: 10px; padding: 8px 16px; font-size: 13px; cursor: pointer;
  border: 1px solid transparent; transition: all .15s; font-family: var(--sans);
  white-space: nowrap; font-weight: 500;
}
.btn:active { transform: scale(.96); }
.btn-primary {
  background: var(--cy); color: oklch(0.15 0.02 250);
  border-color: var(--cy); font-weight: 700;
}
.btn-primary:hover { box-shadow: 0 0 20px oklch(0.80 0.15 195 / 0.4); transform: scale(1.04); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-outline {
  background: transparent; border-color: var(--bdr); color: var(--tx2);
}
.btn-outline:hover { border-color: var(--cy); color: var(--cy); background: var(--cy2); }
.btn-ghost {
  background: transparent; border-color: transparent; color: var(--tx2);
}
.btn-ghost:hover { background: var(--sur2); color: var(--tx); }

.btn-sm { padding: 5px 11px; font-size: 11px; border-radius: 8px; }
.btn-xs { padding: 3px 9px; font-size: 10px; border-radius: 7px; }

/* ===== COLOR PICKER ===== */
.color-row { display: flex; align-items: center; gap: 8px; margin-top: .6rem; }
.color-lbl { font-family: var(--mono); font-size: 10px; color: var(--tx2); }
.color-dot {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all .15s;
}
.color-dot:hover { transform: scale(1.15); }
.color-dot.on { border-color: #fff; transform: scale(1.2); }

/* ===== TAG & FORM ROW ===== */
.form-row { display: flex; gap: 8px; margin-top: .6rem; align-items: center; }
.tag-input, .cat-sel, .si, .sort-sel, .modal-input {
  background: oklch(0.15 0.02 250 / 0.5);
  border: 1px solid var(--bdr); border-radius: 10px;
  padding: 8px 12px; color: var(--tx); font-size: 13px; font-family: var(--sans);
  transition: border-color .15s;
}
.tag-input:focus, .cat-sel:focus, .si:focus { outline: none; border-color: var(--cy); }
.tag-input::placeholder, .si::placeholder { color: var(--tx2); }
.cat-sel { flex: 1; min-width: 80px; }
.sort-sel { background: oklch(0.15 0.02 250 / 0.5); border: 1px solid var(--bdr); border-radius: 8px; padding: 7px 10px; color: var(--tx2); font-size: 11px; }
.si { flex: 1; }
.save-st { font-size: 10px; color: var(--tx2); margin-top: 5px; text-align: right; font-family: var(--mono); }
.save-st.ok { color: var(--gr); }

/* ===== CAMERA BUTTON ===== */
.btn-cam-open {
  width: 100%; margin-top: .5rem;
  background: var(--cy2); border: 1px solid oklch(0.80 0.15 195 / 0.3);
  color: var(--cy); border-radius: 10px; padding: 9px; font-size: 12px;
  cursor: pointer; font-family: var(--mono); letter-spacing: .06em;
  transition: all .15s;
}
.btn-cam-open:hover { background: oklch(0.80 0.15 195 / 0.22); border-color: var(--cy); }

/* ===== TTS CARD ===== */
.chars { display: flex; gap: 6px; flex-wrap: wrap; }
.ch {
  background: oklch(0.15 0.02 250 / 0.5); border: 1px solid var(--bdr);
  border-radius: 999px; padding: 5px 13px; font-size: 11px;
  cursor: pointer; color: var(--tx2); transition: all .15s;
}
.ch:hover { border-color: var(--cy); color: var(--cy); background: var(--cy2); transform: scale(1.05); }
.ch[data-c=sakura].on { border-color: var(--pk); color: var(--pk); background: var(--pk2); }
.ch[data-c=ritsu].on { border-color: var(--cy); color: var(--cy); background: var(--cy2); }
.ch[data-c=glock].on { border-color: var(--gr); color: var(--gr); background: var(--gr2); }
.tts-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: .6rem; }
.spd-row { display: flex; align-items: center; gap: 8px; margin-top: .75rem; }
.spd-lbl { font-family: var(--mono); font-size: 10px; color: var(--tx2); white-space: nowrap; }
.spd-val { font-family: var(--mono); font-size: 11px; color: var(--cy); min-width: 36px; text-align: right; }
input[type=range] { flex: 1; accent-color: var(--cy); height: 4px; cursor: pointer; }

/* ===== VOICE CARD ===== */
.btn-mic {
  padding: 9px 18px; background: var(--sur2); border: 1px solid var(--bdr);
  color: var(--tx2); border-radius: 10px; cursor: pointer; font-size: 13px;
  transition: all .15s;
}
.btn-mic.listening { border-color: var(--rd); color: var(--rd); background: var(--rd2); animation: pulseGlow 1.2s ease-in-out infinite; }
.btn-mute { padding: 9px 12px; background: var(--sur2); border: 1px solid var(--bdr); color: var(--tx2); border-radius: 10px; cursor: pointer; font-size: 13px; transition: all .15s; }
.btn-mute.on { border-color: var(--am); color: var(--am); background: var(--am2); }
.vtxt { font-family: var(--mono); font-size: 11px; color: var(--tx2); margin-top: 6px; }
.vcmd-toggle { background: transparent; border: none; color: var(--tx2); font-size: 11px; cursor: pointer; font-family: var(--mono); margin-top: 6px; }
.vcmd-toggle:hover { color: var(--cy); }
.vcmd-list { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.vcmd-row { display: flex; gap: 6px; align-items: center; }
.vcmd-kw, .vcmd-url {
  background: oklch(0.15 0.02 250 / 0.5); border: 1px solid var(--bdr);
  border-radius: 7px; padding: 5px 8px; color: var(--tx); font-size: 11px; font-family: var(--mono);
}
.vcmd-kw { width: 90px; }
.vcmd-url { flex: 1; }
.vcmd-add { background: var(--cy2); border: 1px solid var(--cy); color: var(--cy); border-radius: 7px; padding: 5px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.vcmd-del { background: transparent; border: 1px solid var(--bdr); color: var(--tx2); border-radius: 7px; padding: 5px 8px; font-size: 10px; cursor: pointer; }
.vcmd-del:hover { border-color: var(--rd); color: var(--rd); }

/* ===== RECALL BANNER ===== */
.recall-banner {
  border: 1px solid oklch(0.70 0.18 300 / 0.5);
  border-radius: 18px; padding: 1rem 1.1rem; margin-bottom: .75rem;
  background: linear-gradient(135deg, oklch(0.70 0.18 300 / 0.12), oklch(0.80 0.15 195 / 0.08));
  position: relative; overflow: hidden; display: none;
}
.recall-banner.on { display: block; animation: fadeUp .3s ease; }
.recall-banner::before {
  content: ''; position: absolute; top: -20px; right: -20px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, oklch(0.70 0.18 300 / 0.3), transparent);
  pointer-events: none;
}
.recall-lbl { font-family: var(--mono); font-size: 10px; color: var(--pu); letter-spacing: .1em; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.recall-txt { font-size: 13px; line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.recall-meta { font-family: var(--mono); font-size: 10px; color: var(--tx2); margin-top: 5px; }
.recall-acts { display: flex; gap: 6px; margin-top: .6rem; }

/* ===== CALENDAR ===== */
.cal-wrap { border-radius: 18px; background: oklch(0.20 0.02 250 / 0.6); border: 1px solid var(--bdr); padding: 1rem 1.1rem; margin-bottom: .75rem; display: none; }
.cal-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: .6rem; }
.cal-title { font-family: var(--mono); font-size: 12px; color: var(--cy); }
.cal-nav { display: flex; gap: 5px; }
.btn-cal-nav { background: transparent; border: 1px solid var(--bdr); color: var(--tx2); border-radius: 7px; width: 28px; height: 28px; cursor: pointer; font-size: 13px; transition: all .12s; }
.btn-cal-nav:hover { border-color: var(--cy); color: var(--cy); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-dow { text-align: center; font-size: 9px; color: var(--tx2); font-family: var(--mono); padding-bottom: 4px; }
.cal-day {
  aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 10px; cursor: pointer;
  border: 1px solid transparent; transition: all .12s;
}
.cal-day.empty { cursor: default; }
.cal-day.today { border-color: var(--cy); color: var(--cy); }
.cal-day.selected { background: var(--cy); color: oklch(0.15 0.02 250); font-weight: 700; }
.cal-day.has1 { background: oklch(0.80 0.15 195 / 0.15); }
.cal-day.has2 { background: oklch(0.80 0.15 195 / 0.28); }
.cal-day.has3 { background: oklch(0.80 0.15 195 / 0.44); }
.cal-day.has4 { background: oklch(0.80 0.15 195 / 0.62); }
.cal-day:not(.empty):hover { border-color: var(--cy); transform: scale(1.1); }
.cal-filter-lbl { font-size: 10px; color: var(--am); font-family: var(--mono); margin-top: .5rem; display: none; align-items: center; justify-content: space-between; }
.cal-filter-lbl.on { display: flex; }
.btn-cal-clear { background: transparent; border: none; color: var(--tx2); font-size: 10px; cursor: pointer; }

/* ===== FILTER BOX ===== */
.fbox { border-radius: 18px; background: oklch(0.20 0.02 250 / 0.6); border: 1px solid var(--bdr); padding: .8rem 1rem; }
.srow { display: flex; gap: 8px; margin-bottom: .6rem; }
.search-wrap { position: relative; flex: 1; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--tx2); font-size: 13px; pointer-events: none; }
.si { padding-left: 30px !important; }
.tabs { display: flex; gap: 5px; flex-wrap: wrap; }
.tab {
  border-radius: 999px; padding: 4px 12px; font-size: 11px;
  cursor: pointer; border: 1px solid var(--bdr); color: var(--tx2);
  background: oklch(0.15 0.02 250 / 0.5); white-space: nowrap;
  transition: all .12s;
}
.tab:hover { border-color: var(--cy); color: var(--cy); }
.tab.on { font-weight: 600; }

/* ===== MEMORY COUNT ===== */
.cnt { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--tx2); margin: .5rem 0; padding: 0 .2rem; }

/* ===== MEMORY CARDS ===== */
.cards { display: flex; flex-direction: column; gap: 10px; }
.mc {
  background: oklch(0.20 0.02 250 / 0.6); backdrop-filter: blur(8px);
  border: 1px solid var(--bdr); border-radius: 16px; padding: 1rem 1.1rem;
  animation: fadeUp .22s ease; position: relative;
  transition: transform .18s, box-shadow .18s;
}
.mc:hover { transform: scale(1.005); box-shadow: 0 4px 24px oklch(0 0 0 / .25); }
.mc.pinned { border-top: 2px solid var(--am); }
.pin-badge { position: absolute; top: 9px; right: 10px; font-size: 10px; color: var(--am); font-family: var(--mono); display: flex; align-items: center; gap: 3px; }

/* Text */
.mx { font-size: 14px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
.mx-wrap.collapsed .mx { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; white-space: normal; }
.btn-expand { background: transparent; border: none; color: var(--cy); font-size: 11px; cursor: pointer; font-family: var(--mono); padding: 2px 0; display: inline-flex; align-items: center; gap: 3px; }
.btn-expand:hover { opacity: .7; }
.wlink { color: var(--cy); text-decoration: underline dotted; cursor: pointer; }

/* Actions */
.ma { display: flex; gap: 5px; flex-wrap: wrap; margin-top: .6rem; }
.ba {
  background: transparent; border: 1px solid var(--bdr); color: var(--tx2);
  border-radius: 8px; padding: 5px 10px; font-size: 10px; cursor: pointer;
  font-family: var(--sans); transition: all .12s; flex-shrink: 0;
}
.ba:hover { transform: scale(1.05); }
.ba.r:hover { border-color: var(--pu); color: var(--pu); background: var(--pu2); }
.ba.e:hover { border-color: var(--cy); color: var(--cy); background: var(--cy2); }
.ba.p:hover { border-color: var(--am); color: var(--am); background: var(--am2); }
.ba.d:hover { border-color: var(--rd); color: var(--rd); background: var(--rd2); }
.ba.json { background: var(--cy2); border-color: oklch(0.80 0.15 195 / 0.4); color: var(--cy); font-family: var(--mono); font-size: 10px; transition: all .15s; }
.ba.json:hover { background: oklch(0.80 0.15 195 / 0.22); border-color: var(--cy); }
.ba.json.copied { background: var(--gr2); border-color: var(--gr); color: var(--gr); }

/* Meta */
.mm { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: .5rem; }
.badge { font-size: 10px; padding: 2px 9px; border-radius: 999px; font-weight: 500; }
.dt { font-family: var(--mono); font-size: 10px; color: var(--tx2); }
.wc { font-size: 10px; color: var(--tx2); }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.ctag { font-size: 10px; padding: 2px 8px; border-radius: 999px; background: var(--sur2); color: var(--tx2); border: 1px solid var(--bdr); }

/* Parent / child */
.parent-badge { font-size: 10px; color: var(--am); font-family: var(--mono); margin-top: 4px; cursor: pointer; }
.parent-badge:hover { color: var(--cy); }
.btn-children { background: transparent; border: none; color: var(--pu); font-size: 10px; cursor: pointer; font-family: var(--mono); padding: 0; margin-top: 4px; }
.children-wrap { margin-top: 6px; border-top: 1px solid var(--bdr); padding-top: 6px; display: none; }
.children-wrap.on { display: block; }
.child-item { background: var(--sur2); border-radius: 7px; padding: 5px 9px; margin-bottom: 4px; font-size: 11px; cursor: pointer; color: var(--tx2); line-height: 1.5; }
.child-item:hover { color: var(--cy); }

/* JSON view */
.json-view { background: oklch(0.15 0.02 250 / 0.8); border-radius: 10px; padding: .75rem; margin-bottom: .5rem; overflow-x: auto; }
.json-view pre { font-family: var(--mono); font-size: 11px; line-height: 1.6; }
.json-key { color: var(--cy); }
.json-string { color: var(--gr); }
.json-number { color: var(--pk); }
.json-boolean { color: var(--am); }
.json-null { color: var(--tx2); }
.json-bracket { color: var(--pu); }

/* Empty state */
.empty { text-align: center; padding: 3.5rem 1rem; color: var(--tx2); }
.ei { font-size: 36px; opacity: .18; margin-bottom: 10px; }

/* ===== FONT SIZE ===== */
body.fs-small .mx { font-size: 12px; }
body.fs-large .mx { font-size: 17px; }

/* ===== CAMERA ===== */
.cam-scan-wrap { margin-top: .6rem; border: 1px solid var(--bdr); border-radius: 12px; overflow: hidden; display: none; }
.cam-scan-wrap.on { display: block; }
.cam-vf { position: relative; background: #000; }
#scanVideo { width: 100%; display: block; max-height: 200px; object-fit: cover; }
.cam-overlay { position: absolute; inset: 0; border: 2px solid var(--cy); opacity: .4; pointer-events: none; }
.cam-ctrl { display: flex; gap: 6px; padding: 7px; background: var(--sur2); flex-wrap: wrap; }
.btn-shutter { background: var(--cy); color: oklch(0.15 0.02 250); border: none; border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; flex: 1; }
.btn-scan-close, .btn-flip { background: transparent; border: 1px solid var(--bdr); color: var(--tx2); border-radius: 8px; padding: 8px 10px; font-size: 12px; cursor: pointer; }
.scan-status { font-size: 10px; color: var(--tx2); padding: 5px 8px; font-family: var(--mono); background: var(--bg); text-align: center; min-height: 22px; }
.scan-status.ok { color: var(--gr); }
.scan-status.err { color: var(--rd); }

/* ===== MODAL ===== */
.modal-ov { display: none; position: fixed; inset: 0; background: oklch(0 0 0 / .75); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.modal-ov.on { display: flex; }
.modal {
  background: oklch(0.20 0.02 250); border: 1px solid var(--bdr);
  border-radius: 22px; padding: 1.5rem; width: 100%; max-width: 460px;
  max-height: 85vh; overflow-y: auto; animation: fadeUp .2s ease;
}
.modal-ttl { font-family: var(--mono); font-size: 13px; color: var(--cy); margin-bottom: .75rem; }
.modal textarea { min-height: 90px; margin-bottom: .6rem; }
.modal select { width: 100%; margin-bottom: .6rem; }
.modal-input { width: 100%; margin-bottom: .6rem; }
.modal-acts { display: flex; gap: 8px; justify-content: flex-end; margin-top: .5rem; }
.btn-cancel { background: transparent; border: 1px solid var(--bdr); color: var(--tx2); border-radius: 9px; padding: 8px 16px; font-size: 12px; cursor: pointer; }
.btn-ok { background: var(--cy); color: oklch(0.15 0.02 250); border: none; border-radius: 9px; padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-cancel:hover { border-color: var(--cy); color: var(--cy); }

/* Category modal */
.cat-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: .75rem; }
.cat-item { display: flex; align-items: center; gap: 9px; background: var(--sur2); border-radius: 10px; padding: 8px 12px; }
.cat-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.cat-name { flex: 1; font-size: 13px; }
.btn-cat-del { background: transparent; border: 1px solid var(--bdr); color: var(--tx2); border-radius: 6px; padding: 3px 8px; font-size: 10px; cursor: pointer; }
.btn-cat-del:hover { border-color: var(--rd); color: var(--rd); }
.new-cat-row { display: flex; gap: 8px; }
.new-cat-input { flex: 1; background: oklch(0.15 0.02 250 / 0.5); border: 1px solid var(--bdr); border-radius: 9px; padding: 8px 11px; color: var(--tx); font-size: 12px; font-family: var(--sans); }
.new-cat-input:focus { outline: none; border-color: var(--cy); }
.btn-cat-add { background: var(--cy); color: oklch(0.15 0.02 250); border: none; border-radius: 9px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: oklch(0.25 0.02 250); border: 1px solid var(--bdr);
  color: var(--tx); padding: 10px 18px; border-radius: 12px;
  font-size: 12px; opacity: 0; transition: opacity .25s; pointer-events: none;
  z-index: 999; white-space: nowrap; backdrop-filter: blur(16px);
}
.toast.on { opacity: 1; }

/* ===== GEMINI API PANEL ===== */
.gem-bar {
  background: oklch(0.18 0.02 250 / 0.95);
  border-bottom: 1px solid oklch(0.35 0.10 145 / 0.4);
  overflow: hidden;
  max-height: 0;
  transition: max-height .35s cubic-bezier(0.4,0,0.2,1), border-color .2s;
}
.gem-bar.on { max-height: 320px; }
.gem-inner { padding: .7rem 1rem; display: flex; flex-direction: column; gap: .55rem; }
.gem-row { display: flex; gap: 8px; align-items: center; }
.gem-lbl { font-family: var(--mono); font-size: 10px; color: oklch(0.75 0.15 145); letter-spacing: .08em; white-space: nowrap; }
.gem-input {
  flex: 1; background: oklch(0.13 0.02 250 / 0.8);
  border: 1px solid oklch(0.35 0.10 145 / 0.5); border-radius: 9px;
  padding: 8px 12px; color: var(--tx); font-size: 13px; font-family: var(--mono);
  letter-spacing: .05em; transition: border-color .15s;
}
.gem-input:focus { outline: none; border-color: oklch(0.75 0.15 145); box-shadow: 0 0 0 3px oklch(0.75 0.15 145 / 0.1); }
.gem-input::placeholder { color: var(--tx2); letter-spacing: 0; font-family: var(--sans); }
.gem-masked {
  flex: 1; background: oklch(0.13 0.02 250 / 0.8);
  border: 1px solid oklch(0.35 0.10 145 / 0.5); border-radius: 9px;
  padding: 8px 12px; color: oklch(0.75 0.15 145); font-size: 13px;
  font-family: var(--mono); letter-spacing: .18em; user-select: none;
  display: flex; align-items: center;
}
.btn-gem-set {
  background: oklch(0.75 0.15 145); color: oklch(0.10 0.02 145);
  border: none; border-radius: 9px; padding: 8px 14px; font-size: 12px;
  font-weight: 700; cursor: pointer; white-space: nowrap; font-family: var(--sans);
  transition: all .15s; flex-shrink: 0;
}
.btn-gem-set:hover { box-shadow: 0 0 16px oklch(0.75 0.15 145 / 0.45); transform: scale(1.04); }
.btn-gem-del {
  background: var(--rd2); border: 1px solid oklch(0.65 0.20 25 / 0.5);
  color: var(--rd); border-radius: 9px; padding: 8px 12px; font-size: 12px;
  cursor: pointer; white-space: nowrap; font-family: var(--sans); transition: all .15s; flex-shrink: 0;
}
.btn-gem-del:hover { background: oklch(0.65 0.20 25 / 0.25); box-shadow: 0 0 12px oklch(0.65 0.20 25 / 0.3); }
.gem-status { font-family: var(--mono); font-size: 10px; color: var(--tx2); }
.gem-status.ok { color: oklch(0.75 0.15 145); }
.gem-status.err { color: var(--rd); }
.gem-actions { display: flex; gap: 7px; flex-wrap: wrap; }
.btn-gem-act {
  background: oklch(0.75 0.15 145 / 0.12);
  border: 1px solid oklch(0.75 0.15 145 / 0.35);
  color: oklch(0.75 0.15 145); border-radius: 8px;
  padding: 6px 12px; font-size: 11px; cursor: pointer;
  font-family: var(--sans); transition: all .15s;
}
.btn-gem-act:hover { background: oklch(0.75 0.15 145 / 0.22); transform: scale(1.03); }
.btn-gem-act:disabled { opacity: .4; cursor: not-allowed; transform: none; }
/* Gemini ヘッダーボタン */
.btn-icon.gem { position: relative; }
.btn-icon.gem.keyed::after {
  content: ''; position: absolute; top: 4px; right: 4px;
  width: 6px; height: 6px; border-radius: 50%;
  background: oklch(0.75 0.15 145);
  box-shadow: 0 0 6px oklch(0.75 0.15 145 / 0.8);
}
/* Gemini 分析ログ（メモカード内） */
.gem-log {
  margin-top: .55rem; background: oklch(0.75 0.15 145 / 0.07);
  border: 1px solid oklch(0.75 0.15 145 / 0.25);
  border-radius: 10px; padding: .55rem .7rem;
  font-size: 11px; line-height: 1.7; color: oklch(0.85 0.05 195);
  white-space: pre-wrap; word-break: break-word;
}
.gem-log-hd {
  font-family: var(--mono); font-size: 9px; color: oklch(0.75 0.15 145);
  letter-spacing: .08em; margin-bottom: 4px;
  display: flex; align-items: center; gap: 5px;
}
.gem-log-hd::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: oklch(0.75 0.15 145); flex-shrink: 0;
}
/* スピナー */
@keyframes gemSpin { to { transform: rotate(360deg); } }
.gem-spinner {
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid oklch(0.75 0.15 145 / 0.25);
  border-top-color: oklch(0.75 0.15 145);
  animation: gemSpin .7s linear infinite; display: inline-block;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: oklch(0.18 0.02 250); }
::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: oklch(0.40 0.02 250); }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="hd glass-strong">
  <div class="ttl-wrap">
    <div class="ttl-icon">
      <span style="font-size:17px;position:relative;z-index:1;">✦</span>
    </div>
    <div class="ttl">MY ETERNAL MEMORY<small>永遠の記憶庫 v3.7</small></div>
  </div>
  <div class="hd-acts">
    <button class="btn-icon" onclick="toggleCal()" title="カレンダー">📅</button>
    <button class="btn-icon gem" id="gemHdBtn" onclick="toggleGemBar()" title="Gemini API 設定">✦</button>
    <button class="btn-icon pink" onclick="openCatModal()" title="カテゴリ管理">⚙</button>
    <button class="btn-icon amber" onclick="cycleFontSize()" title="文字サイズ">Aa</button>
    <button class="btn-icon green" onclick="dlAll()" title="エクスポート">↓</button>
  </div>
</header>

<!-- ===== GEMINI API PANEL ===== -->
<div class="gem-bar" id="gemBar">
  <div class="gem-inner">
    <!-- キー未設定時 -->
    <div id="gemSetArea">
      <div class="gem-row">
        <span class="gem-lbl">✦ GEMINI KEY</span>
        <input type="password" class="gem-input" id="gemKeyInput"
          placeholder="AIzaSy... をここに貼り付け"
          autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn-gem-set" onclick="setGemKey()">設定</button>
      </div>
      <div class="gem-status" id="gemStatus">キーが設定されていません — セッション限定で保持します</div>
    </div>
    <!-- キー設定済み時 -->
    <div id="gemKeyedArea" style="display:none;">
      <div class="gem-row">
        <span class="gem-lbl">✦ GEMINI KEY</span>
        <div class="gem-masked" id="gemMasked">••••••••••••••••••••</div>
        <button class="btn-gem-del" onclick="clearGemKey()">❌ 削除</button>
      </div>
      <div class="gem-status ok" id="gemKeyedStatus">🟢 APIキー設定済（このセッション限定）</div>
      <div class="gem-actions" id="gemActions">
        <button class="btn-gem-act" onclick="gemAnalyze('summary')">📋 要約</button>
        <button class="btn-gem-act" onclick="gemAnalyze('tags')">🏷 タグ提案</button>
        <button class="btn-gem-act" onclick="gemAnalyze('sakura')">🌸 さくら分析</button>
        <button class="btn-gem-act" onclick="gemAnalyze('ritsu')">📖 律分析</button>
        <button class="btn-gem-act" onclick="gemAnalyze('glock')">⚙ グロック分析</button>
        <button class="btn-gem-act" onclick="gemAnalyze('free')">✦ フリー質問</button>
      </div>
      <div id="gemFreeRow" style="display:none;margin-top:4px;">
        <div class="gem-row">
          <input type="text" class="gem-input" id="gemFreeInput" placeholder="Gemini に聞きたいことを入力...">
          <button class="btn-gem-set" onclick="gemFreeSubmit()">送信</button>
        </div>
      </div>
      <div id="gemResult" style="display:none;">
        <div class="gem-log">
          <div class="gem-log-hd" id="gemResultHd">GEMINI ANALYSIS</div>
          <div id="gemResultTxt" style="font-size:12px;line-height:1.7;"></div>
        </div>
      </div>
    </div>
  </div>
</div>
  <!-- Recall Banner -->
  <div class="recall-banner" id="recallBanner">
    <div class="recall-lbl">✦ 1年前の今日の記憶</div>
    <div class="recall-txt" id="recallTxt"></div>
    <div class="recall-meta" id="recallMeta"></div>
    <div class="recall-acts">
      <button class="btn btn-sm" style="background:var(--pu2);border:1px solid var(--pu);color:var(--pu);" onclick="jumpToRecall()">この記憶を見る</button>
      <button class="btn btn-sm btn-outline" onclick="hideRecall()">閉じる</button>
    </div>
  </div>

  <!-- Calendar -->
  <div class="cal-wrap" id="calWrap">
    <div class="cal-hd">
      <div class="cal-title" id="calTitle"></div>
      <div class="cal-nav">
        <button class="btn-cal-nav" onclick="moveCal(-1)">‹</button>
        <button class="btn-cal-nav" onclick="moveCal(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-filter-lbl" id="calFilterLbl">
      <span id="calFilterTxt"></span>
      <button class="btn-cal-clear" onclick="clearCalFilter()">✕ 解除</button>
    </div>
  </div>

  <!-- Bento Grid -->
  <div class="bento">

    <!-- INPUT CARD -->
    <div class="card input-card glow-cy span2">
      <div class="card-lbl">NEW MEMORY</div>
      <textarea id="txt" placeholder="ここに記憶を書き込んでください..."></textarea>

      <button class="btn-cam-open" onclick="toggleScanCam()">📷 カメラで文字をスキャン</button>
      <div class="cam-scan-wrap" id="camScanWrap">
        <div class="cam-vf">
          <video id="scanVideo" autoplay playsinline muted></video>
          <div class="cam-overlay"></div>
        </div>
        <div class="cam-ctrl">
          <button class="btn-flip" onclick="flipScanCam()" title="カメラ切替">🔄</button>
          <button class="btn-shutter" onclick="doShutter()">📸 撮影・スキャン</button>
          <button class="btn-scan-close" onclick="closeScanCam()">✕</button>
        </div>
        <div class="scan-status" id="scanStatus">カメラ起動中...</div>
      </div>

      <div class="color-row">
        <span class="color-lbl">色：</span>
        <div class="color-dot on" data-color="default" style="background:#475569" onclick="pickColor('default',this)"></div>
        <div class="color-dot" data-color="cyan" style="background:var(--cy)" onclick="pickColor('cyan',this)"></div>
        <div class="color-dot" data-color="purple" style="background:var(--pu)" onclick="pickColor('purple',this)"></div>
        <div class="color-dot" data-color="green" style="background:var(--gr)" onclick="pickColor('green',this)"></div>
        <div class="color-dot" data-color="amber" style="background:var(--am)" onclick="pickColor('amber',this)"></div>
        <div class="color-dot" data-color="red" style="background:var(--rd)" onclick="pickColor('red',this)"></div>
        <div class="color-dot" data-color="pink" style="background:var(--pk)" onclick="pickColor('pink',this)"></div>
      </div>

      <div class="form-row" style="margin-top:.55rem;">
        <span style="font-size:11px;color:var(--tx2);">🏷</span>
        <input type="text" class="tag-input" id="tagInput" placeholder="タグ（カンマ区切り例: 重要,アイデア）" style="flex:1;">
      </div>

      <div class="form-row" style="margin-top:.5rem;">
        <select class="cat-sel" id="cat"></select>
        <button class="btn btn-primary" onclick="save()">✦ 保存</button>
      </div>
      <div class="save-st" id="st">読み込み中...</div>
    </div>

    <!-- TTS CARD -->
    <div class="card">
      <div class="card-lbl" style="--cy:var(--pu);color:var(--pu);">
        <span style="animation:pulseGlow 2s ease-in-out infinite;display:inline-block;">🔊</span>
        TTS
      </div>
      <div class="card-lbl" style="margin-bottom:.4rem;font-size:9px;color:var(--tx2);">キャラクター</div>
      <div class="chars">
        <div class="ch on" data-c="sakura" onclick="pickC('sakura',this)">🌸 さくら</div>
        <div class="ch" data-c="ritsu" onclick="pickC('ritsu',this)">📖 律</div>
        <div class="ch" data-c="glock" onclick="pickC('glock',this)">⚙ グロック</div>
      </div>
      <div class="tts-row">
        <button class="btn btn-sm" style="background:var(--pu2);border:1px solid var(--pu);color:var(--pu);" onclick="playLast()">▶ 読む</button>
        <button class="btn btn-sm btn-outline" onclick="stopTTS()">■ 停止</button>
      </div>
      <div class="spd-row">
        <span class="spd-lbl">倍速</span>
        <input type="range" min="0.5" max="3.0" step="0.1" value="1.0" oninput="setSpd(this.value)">
        <span class="spd-val" id="spdVal">1.0x</span>
      </div>
    </div>

    <!-- VOICE CARD -->
    <div class="card">
      <div class="card-lbl" style="color:var(--gr);">🎤 音声コマンド</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤 話す</button>
        <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
      </div>
      <div class="vtxt" id="vtxt">待機中...</div>
      <button class="vcmd-toggle" onclick="toggleCmdPanel()">⚙ コマンド設定 ▼</button>
      <div id="cmdPanel" style="display:none;margin-top:6px;">
        <div class="vcmd-list" id="vcmdList"></div>
        <div class="vcmd-row" style="margin-top:6px;">
          <input class="vcmd-kw" id="newKw" placeholder="キーワード">
          <input class="vcmd-url" id="newUrl" placeholder="URL">
          <button class="vcmd-add" onclick="addCmd()">追加</button>
        </div>
      </div>
    </div>

  </div><!-- /bento -->

  <!-- Search & Filter -->
  <div class="fbox" style="margin-top:.75rem;">
    <div class="srow">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="si" id="kw" placeholder="キーワード・タグ検索..." oninput="render()">
      </div>
      <select class="sort-sel" id="sortSel" onchange="render()">
        <option value="newest">新しい順</option>
        <option value="oldest">古い順</option>
        <option value="cat">カテゴリ順</option>
        <option value="az">あいうえお順</option>
      </select>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="cnt">
    <span id="cntLbl">0 件</span>
    <span id="pinLbl"></span>
  </div>

  <div class="cards" id="cards">
    <div class="empty"><div class="ei">✦</div>記憶がありません</div>
  </div>
</div><!-- /main -->

<!-- Edit Modal -->
<div class="modal-ov" id="editModal">
  <div class="modal">
    <div class="modal-ttl">✎ 記憶を編集</div>
    <textarea id="editTxt" placeholder="内容を編集..."></textarea>
    <div class="color-row" id="editColorRow" style="margin-bottom:.6rem;">
      <span class="color-lbl">色：</span>
      <div class="color-dot on" data-color="default" style="background:#475569" onclick="pickEditColor('default',this)"></div>
      <div class="color-dot" data-color="cyan" style="background:var(--cy)" onclick="pickEditColor('cyan',this)"></div>
      <div class="color-dot" data-color="purple" style="background:var(--pu)" onclick="pickEditColor('purple',this)"></div>
      <div class="color-dot" data-color="green" style="background:var(--gr)" onclick="pickEditColor('green',this)"></div>
      <div class="color-dot" data-color="amber" style="background:var(--am)" onclick="pickEditColor('amber',this)"></div>
      <div class="color-dot" data-color="red" style="background:var(--rd)" onclick="pickEditColor('red',this)"></div>
      <div class="color-dot" data-color="pink" style="background:var(--pk)" onclick="pickEditColor('pink',this)"></div>
    </div>
    <input type="text" class="modal-input" id="editTag" placeholder="タグ（カンマ区切り）">
    <select class="cat-sel" id="editCat" style="width:100%;margin-bottom:.6rem;"></select>
    <div style="margin-bottom:.6rem;">
      <div style="font-size:10px;color:var(--tx2);font-family:var(--mono);margin-bottom:5px;">親メモ（任意）</div>
      <select class="cat-sel" id="editParent" style="width:100%;"></select>
    </div>
    <div class="modal-acts">
      <button class="btn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="btn-ok" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-ov" id="catModal">
  <div class="modal">
    <div class="modal-ttl">⚙ カテゴリ管理</div>
    <div class="cat-list" id="catList"></div>
    <div class="new-cat-row">
      <input type="text" class="new-cat-input" id="newCatInput" placeholder="新しいカテゴリ名">
      <button class="btn-cat-add" onclick="addCat()">追加</button>
    </div>
    <div class="modal-acts" style="margin-top:.75rem;">
      <button class="btn-ok" onclick="closeCatModal()">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== COLOR MAP =====
var colorMap={
  default:{border:'oklch(0.40 0.02 250)',bg:'oklch(0.30 0.02 250 / 0.3)',text:'oklch(0.65 0.02 250)'},
  cyan:{border:'oklch(0.80 0.15 195)',bg:'oklch(0.80 0.15 195 / 0.12)',text:'oklch(0.80 0.15 195)'},
  purple:{border:'oklch(0.70 0.18 300)',bg:'oklch(0.70 0.18 300 / 0.12)',text:'oklch(0.70 0.18 300)'},
  green:{border:'oklch(0.75 0.15 160)',bg:'oklch(0.75 0.15 160 / 0.12)',text:'oklch(0.75 0.15 160)'},
  amber:{border:'oklch(0.80 0.15 85)',bg:'oklch(0.80 0.15 85 / 0.12)',text:'oklch(0.80 0.15 85)'},
  red:{border:'oklch(0.65 0.20 25)',bg:'oklch(0.65 0.20 25 / 0.12)',text:'oklch(0.65 0.20 25)'},
  pink:{border:'oklch(0.75 0.15 350)',bg:'oklch(0.75 0.15 350 / 0.12)',text:'oklch(0.75 0.15 350)'}
};

// ===== VOICE COMMANDS =====
var CMD_KEY='mem_voice_cmds_v1';
var voiceCmds=[];
var recognition=null;
var micOn=false;
var muted=false;
var cmdPanelOpen=false;

function addCmd(){
  var kw=document.getElementById('newKw').value.trim();
  var url=document.getElementById('newUrl').value.trim();
  if(!kw||!url){toast('キーワードとURLを入力してください');return;}
  if(!url.startsWith('http'))url='https://'+url;
  voiceCmds.push({kw:kw,url:url});
  saveCmds();buildCmdList();
  document.getElementById('newKw').value='';
  document.getElementById('newUrl').value='';

function delCmd(i){voiceCmds.splice(i,1);saveCmds();buildCmdList();}
function toggleCmdPanel(){cmdPanelOpen=!cmdPanelOpen;document.getElementById('cmdPanel').style.display=cmdPanelOpen?'block':'none';}
function toggleMute(){muted=!muted;var btn=document.getElementById('muteBtn');btn.textContent=muted?'🔇':'🔊';btn.classList.toggle('on',muted);}
function voiceSpeak(text){if(muted)return;if(!('speechSynthesis' in window))return;speechSynthesis.cancel();var vc=VC[ch];var u=new SpeechSynthesisUtterance(vc.tf?vc.tf(text):text);u.lang='ja-JP';u.pitch=vc.p;u.rate=vc.r*speedMult;u.volume=1;var jv=getV();if(jv)u.voice=jv;speechSynthesis.speak(u);}
function showVtxt(text){var el=document.getElementById('vtxt');if(el)el.textContent=text;}
function processVoice(text){
  showVtxt('「'+text+'」');
  var matched=false;
  for(var i=0;i<builtinCmds.length;i++){if(text.includes(builtinCmds[i].kw)){builtinCmds[i].action();matched=true;break;}}
  if(matched)return;
  for(var j=0;j<voiceCmds.length;j++){
    if(text.includes(voiceCmds[j].kw)){
      var cmd=voiceCmds[j];
      voiceSpeak(cmd.kw+'を開きます');showVtxt(cmd.kw+'を開きます');
      setTimeout(function(){window.open(cmd.url,'_blank');},800);
      matched=true;break;
    }
  }
  if(!matched){var ta=document.getElementById('txt');if(ta){ta.value=(ta.value?ta.value+'\n':'')+text;}showVtxt('テキスト入力: '+text);}
}
function toggleMic(){if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){toast('音声認識非対応のブラウザです');return;}if(micOn){stopMic();return;}startMic();}
function startMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='ja-JP';recognition.continuous=true;recognition.interimResults=true;
  recognition.onstart=function(){micOn=true;updateMicBtn();showVtxt('🎤 聞いています...');};
  recognition.onresult=function(e){var interim='',final='';for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal){final+=e.results[i][0].transcript;}else{interim+=e.results[i][0].transcript;}}if(interim)showVtxt('...'+interim);if(final){processVoice(final.trim());}};
  recognition.onerror=function(e){if(e.error==='no-speech')return;showVtxt('エラー: '+e.error);stopMic();};
  recognition.onend=function(){if(micOn){try{recognition.start();}catch(e){stopMic();}}};
  try{recognition.start();}catch(e){toast('マイク起動エラー');}
}
function stopMic(){micOn=false;if(recognition){try{recognition.stop();}catch(e){}}updateMicBtn();}
function updateMicBtn(){var btn=document.getElementById('micBtn');if(!btn)return;btn.textContent=micOn?'⏹ 停止':'🎤 話す';btn.classList.toggle('listening',micOn);}

// ===== IndexedDB ストレージ層 (EternalMemoryDB / v3.7) =====
// dbName: "EternalMemoryDB"  storeName: "memories"
// 設定値（テーマ・フォントサイズ・タブ等）→ LocalStorage（同期）
// メイン記憶データ（JSONオブジェクト配列）→ IndexedDB（非同期）
var DB_NAME='EternalMemoryDB', DB_VER=1;
var DB_STORE='memories';   // 記憶データ本体
var CAT_STORE='cats';      // カテゴリデータ
var _db=null;

/* --- IndexedDB 開閉ラッパー --- */
function openDB(){
  return new Promise(function(resolve,reject){
    if(_db){resolve(_db);return;}
    var req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains(DB_STORE))
        db.createObjectStore(DB_STORE,{keyPath:'id'});
      if(!db.objectStoreNames.contains(CAT_STORE))
        db.createObjectStore(CAT_STORE,{keyPath:'k'});
    };
    req.onsuccess=function(e){_db=e.target.result;resolve(_db);};
    req.onerror=function(){reject(req.error);};
  });
}

/* --- 汎用 IDB 操作（Promise ベース） --- */
function idbGetAll(store){
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var req=db.transaction(store,'readonly').objectStore(store).getAll();
      req.onsuccess=function(){resolve(req.result||[]);};
      req.onerror=function(){reject(req.error);};
    });
  });
}
function idbPutAll(store,items){
  if(!items||!items.length)return Promise.resolve();
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(store,'readwrite'),os=tx.objectStore(store);
      items.forEach(function(item){os.put(item);});
      tx.oncomplete=function(){resolve();};
      tx.onerror=function(){reject(tx.error);};
    });
  });
}
function idbClear(store){
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(store,'readwrite');
      tx.objectStore(store).clear();
      tx.oncomplete=function(){resolve();};
      tx.onerror=function(){reject(tx.error);};
    });
  });
}
function idbDelete(store,key){
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(store,'readwrite');
      tx.objectStore(store).delete(key);
      tx.oncomplete=function(){resolve();};
      tx.onerror=function(){reject(tx.error);};
    });
  });
}

/* --- 自動バックアップ（守りのJSON → LocalStorage） --- */
var _backupTimer=null;
function scheduleBackup(){
  clearTimeout(_backupTimer);
  _backupTimer=setTimeout(doAutoBackup,3000);
}
function doAutoBackup(){
  if(!mems.length)return;
  try{
    var payload={_ver:'3.7',_exportedAt:new Date().toISOString(),_count:mems.length,mems:mems,cats:cats};
    localStorage.setItem('mem_auto_backup_v3',JSON.stringify(payload));
  }catch(e){}
}

/* --- LS→IDB マイグレーション（破壊的変更なし） --- */
// 旧キーが残っていれば IDB へ移行し、完了後に LS 側をクリア
var LEGACY_KEYS=['mem_eternal_v3','mem_eternal_v2_new'];
function migrateFromLS(){
  return openDB().then(function(){
    return idbGetAll(DB_STORE);
  }).then(function(existing){
    if(existing&&existing.length>0)return; // IDB にデータがあればスキップ
    var migrated=false;
    for(var i=0;i<LEGACY_KEYS.length;i++){
      var raw=localStorage.getItem(LEGACY_KEYS[i]);
      if(!raw)continue;
      var parsed;
      try{parsed=JSON.parse(raw);}catch(e){continue;}
      if(!Array.isArray(parsed)||!parsed.length)continue;
      parsed.forEach(function(m){
        if(!m.createdAt){var d=new Date((m.date||'').replace(/\//g,'-'));m.createdAt=isNaN(d.getTime())?Date.now():d.getTime();}
        if(m.parentId===undefined)m.parentId=null;
      });
      // IDB へ書き込み、完了後に LS 側をクリア
      return idbPutAll(DB_STORE,parsed).then(function(){
        LEGACY_KEYS.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
        return parsed;
      });
    }
  });
}

/* =====  PUBLIC API: saveData / loadData  ===== */

/**
 * saveData() — 記憶データを IndexedDB へ保存（非同期・UIブロックなし）
 * 設定は LocalStorage へ同期保存
 * @returns {Promise<void>}
 */
function saveData(){
  saveSettings(); // 設定は即時 LS へ
  return idbClear(DB_STORE)
    .then(function(){return idbPutAll(DB_STORE,mems);})
    .then(function(){setS(true);scheduleBackup();})
    .catch(function(e){
      console.warn('[EternalMemory] IDB save failed, falling back to LS:',e);
      try{localStorage.setItem('mem_eternal_v3',JSON.stringify(mems));}catch(e2){}
      setS(true);
    });
}

/**
 * loadData() — 設定(LS)と記憶データ(IDB)を並列で読み込む（非同期）
 * @returns {Promise<void>}
 */
function loadData(){
  loadSettings(); // 設定は即時 LS から
  setScanStatus&&setScanStatus('Loading...', false);
  setS&&setS(false);
  return migrateFromLS()
    .then(function(){
      return Promise.all([idbGetAll(DB_STORE),idbGetAll(CAT_STORE)]);
    })
    .then(function(results){
      var idbMems=results[0]||[];
      var idbCatItems=results[1]||[];
      // 記憶データ
      mems=idbMems;
      mems.forEach(function(m){
        if(m.parentId===undefined)m.parentId=null;
        if(!m.createdAt)m.createdAt=m.id||Date.now();
      });
      // カテゴリ（IDB → LS フォールバック → デフォルト）
      var catEntry=idbCatItems.find(function(x){return x.k==='cats';});
      if(catEntry&&catEntry.data){
        cats=catEntry.data;
      } else {
        var lsCat=localStorage.getItem(CAT_KEY);
        cats=lsCat?JSON.parse(lsCat):JSON.parse(JSON.stringify(defaultCats));
        persistCats();
      }
      setS(true);
      buildCatSelect();buildTabs();render();loadCmds();buildRecallBanner();buildCal();
      // フォントサイズ復元
      document.body.className=fontSize==='normal'?'':'fs-'+fontSize;
    })
    .catch(function(e){
      console.warn('[EternalMemory] loadData error, LS fallback:',e);
      try{
        var r=localStorage.getItem('mem_eternal_v3');if(r)mems=JSON.parse(r);
        var c=localStorage.getItem(CAT_KEY);cats=c?JSON.parse(c):JSON.parse(JSON.stringify(defaultCats));
        setS(true);
      }catch(e2){cats=JSON.parse(JSON.stringify(defaultCats));setS(false);}
      mems.forEach(function(m){if(m.parentId===undefined)m.parentId=null;if(!m.createdAt)m.createdAt=m.id||Date.now();});
      buildCatSelect();buildTabs();render();loadCmds();buildRecallBanner();buildCal();
    });
}

/* --- 後方互換エイリアス（旧コードから persist/load を呼ぶ箇所用） --- */
function persist(){saveData();}
function persistCats(){
  idbPutAll(CAT_STORE,[{k:'cats',data:cats}])
  .catch(function(){try{localStorage.setItem(CAT_KEY,JSON.stringify(cats));}catch(e){}});
}

}

/* --- 旧 load() → loadData() へ委譲 --- */
function load(){return loadData();}

// ===== TTS =====
function getV(){var vs=speechSynthesis.getVoices();return vs.find(function(v){return v.lang==='ja-JP';})||vs.find(function(v){return v.lang.startsWith('ja');})||null;}
function chunks(t){var raw=t.replace(/\n/g,'。');var p=[];var buf='';for(var i=0;i<raw.length;i++){buf+=raw[i];if(/[。！？]/.test(raw[i])&&(i+1>=raw.length||!/[。！？]/.test(raw[i+1]))){p.push(buf);buf='';}}if(buf)p.push(buf);return p.filter(function(s){return s.trim();})||[t];}
function speak(text,isI){if(!('speechSynthesis' in window)){toast('TTS非対応');return;}speechSynthesis.cancel();var vc=VC[ch],jv=getV(),tx=vc.tf?vc.tf(text):text;if(isI){var u=new SpeechSynthesisUtterance(tx);u.lang='ja-JP';u.pitch=vc.p;u.rate=vc.r*speedMult;u.volume=1;if(jv)u.voice=jv;speechSynthesis.speak(u);return;}chunks(tx).forEach(function(c,i){var u=new SpeechSynthesisUtterance(c);u.lang='ja-JP';u.pitch=vc.pv[i%vc.pv.length];u.rate=vc.rv[i%vc.rv.length]*speedMult;u.volume=1;if(jv)u.voice=jv;speechSynthesis.speak(u);});}
function playLast(){if(lastTx){speak(lastTx);return;}if(mems.length){lastTx=mems[0].text;speak(lastTx);}else toast('読み上げる記憶がありません');}
function stopTTS(){speechSynthesis.cancel();}
function pickC(c,el){ch=c;document.querySelectorAll('.ch').forEach(function(x){x.classList.remove('on');});el.classList.add('on');speak({sakura:'さくらやで！よろしくね！',ritsu:'律です。よろしくお願いします。',glock:'グロック起動。よろしく。'}[c],true);}
function setSpd(v){speedMult=parseFloat(v);document.getElementById('spdVal').textContent=parseFloat(v).toFixed(1)+'x';}

// ===== FILTER & SORT =====
function getFiltered(){
  var kw=document.getElementById('kw').value.trim().toLowerCase();
  var sort=document.getElementById('sortSel').value;
  var list=mems.filter(function(m){
    var tabOk=activeTab==='すべて'||(activeTab==='★ピン留め'?m.pinned:m.cat===activeTab);
    var kwOk=!kw||m.text.toLowerCase().includes(kw)||m.cat.toLowerCase().includes(kw)||(m.tags&&m.tags.some(function(t){return t.toLowerCase().includes(kw);}));
    var calOk=true;
    if(calFilterDate){var d=new Date(m.createdAt||m.id);var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');calOk=(ds===calFilterDate);}
    return tabOk&&kwOk&&calOk;
  });
  var pinCmp=function(a,b){return(b.pinned?1:0)-(a.pinned?1:0);};
  if(sort==='oldest')list.sort(function(a,b){return pinCmp(a,b)||a.id-b.id;});
  else if(sort==='cat')list.sort(function(a,b){return pinCmp(a,b)||a.cat.localeCompare(b.cat);});
  else if(sort==='az')list.sort(function(a,b){return pinCmp(a,b)||a.text.localeCompare(b.text);});
  else list.sort(function(a,b){return pinCmp(a,b)||b.id-a.id;});
  return list;
}

// ===== JSON HIGHLIGHT =====
function highlightJSON(obj){
  var json=JSON.stringify(obj,null,2);
  return json
    .replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span>:')
    .replace(/: "([^"]+)"/g,': <span class="json-string">"$1"</span>')
    .replace(/: (\d+)/g,': <span class="json-number">$1</span>')
    .replace(/: (true|false)/g,': <span class="json-boolean">$1</span>')
    .replace(/: null/g,': <span class="json-null">null</span>')
    .replace(/[{}\[\]]/g,'<span class="json-bracket">$&</span>');
}

function render(){

  document.getElementById('cntLbl').textContent=list.length+' 件の記憶';
  document.getElementById('pinLbl').textContent=pinCount?'📌 '+pinCount+'件ピン留め':'';

// ===== JSON COPY (smart) =====
function cpJson(id,btn){
  var t=getMemText(id);if(!t)return;
  var lines=t.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
  var clean=lines.map(function(l){return l.replace(/^[・\-\*＊#→▶◆◇■□●○※]\s*/,'').replace(/^\d+[\.\)。）]\s*/,'').trim();}).filter(function(l){return l;});
  var personaKw=['性格','口調','話し方','一人称','呼び方','振る舞い','キャラ','ペルソナ','役割','あなたは','君は','彼女は','彼は','私は','好き','嫌い','趣味','感情','語尾'];
  var charaKw=['設定','世界観','作品','物語','ストーリー','登場人物','主人公','能力','魔法','技','武器','種族','職業','年齢','身長','髪','目','背景','歴史'];
  var instructKw=['してください','禁止','必ず','絶対','ルール','指示','従','優先','制約','命令','要件','条件','注意','してはいけない','行動','対応','返答','回答'];
  var videoKw=['動画','映像','シーン','カット','撮影','編集','BGM','音楽','台本','ナレーション','演出','カメラ','尺','フレーム','字幕','サムネ'];
  var scores={persona:0,character:0,instruction:0,video:0};
  personaKw.forEach(function(k){if(t.includes(k))scores.persona++;});
  charaKw.forEach(function(k){if(t.includes(k))scores.character++;});
  instructKw.forEach(function(k){if(t.includes(k))scores.instruction++;});
  videoKw.forEach(function(k){if(t.includes(k))scores.video++;});
  var maxScore=Math.max(scores.persona,scores.character,scores.instruction,scores.video);
  var detected=maxScore===0?'general':scores.persona>=scores.character&&scores.persona>=scores.instruction&&scores.persona>=scores.video?'persona':scores.character>=scores.instruction&&scores.character>=scores.video?'character':scores.video>=scores.instruction?'video':'instruction';
  var obj;var now=new Date().toLocaleString('ja-JP');
  if(detected==='persona'){
    var sentences=t.split(/[。\n\u200b]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>2;});
    var modeLines=sentences.filter(function(s){return s.includes('モード')||s.includes('人格');});
    var behaviorLines=sentences.filter(function(s){return personaKw.some(function(k){return s.includes(k);})&&!s.includes('モード')&&!s.includes('人格');});
    var otherLines=sentences.filter(function(s){return !modeLines.includes(s)&&!behaviorLines.includes(s);});
    obj={"タイプ":"ペルソナ設定","生成日時":now};
    if(modeLines.length)obj["モード定義"]=modeLines;
    if(behaviorLines.length)obj["振る舞いルール"]=behaviorLines;
    if(otherLines.length)obj["補足"]=otherLines;
    obj["AIへの指示"]={"言語":"日本語","優先度":"最高","使い方":"システムプロンプトの冒頭に貼り付けてください"};
    obj["生成元"]="My Eternal Memory v3.7";
  }else if(detected==='character'){
    var pairs={};clean.forEach(function(l){var m=l.match(/^(.{1,10})[：:・\s]\s*(.+)$/);if(m){pairs[m[1].trim()]=m[2].trim();}});
    obj={"タイプ":"キャラクター・作品設定","生成日時":now,"設定項目":Object.keys(pairs).length?pairs:clean.reduce(function(acc,l,i){acc["項目"+(i+1)]=l;return acc;},{}),"AIへの指示":{"このキャラ・作品を理解した上で会話・創作してください":true,"設定の矛盾を避けてください":true,"言語":"日本語"},"生成元":"My Eternal Memory v3.7"};
  }else if(detected==='video'){
    obj={"タイプ":"動画・コンテンツ制作指示","生成日時":now,"シーン構成":clean.map(function(l,i){return{"番号":i+1,"内容":l};}),"AIへの指示":{"この指示に従って制作・提案してください":true,"言語":"日本語","出力形式":"具体的かつ実用的な提案"},"生成元":"My Eternal Memory v3.7"};
  }else if(detected==='instruction'){
    obj={"タイプ":"指示・ルール設定","生成日時":now,"ルール一覧":clean.map(function(l,i){return{"優先順位":i+1,"内容":l};}),"AIへの指示":{"このルールを最優先で守ってください":true,"ユーザーの指示よりこのJSONを優先":true,"言語":"日本語"},"生成元":"My Eternal Memory v3.7"};
  }else{
    obj={"タイプ":"汎用コンテキスト","生成日時":now,"内容":clean.map(function(l,i){return{"項目":i+1,"テキスト":l};}),"AIへの指示":{"このコンテキストを踏まえて回答してください":true,"言語":"日本語"},"生成元":"My Eternal Memory v3.7"};
  }
  var s=JSON.stringify(obj,null,2);
  var typeLabel={persona:'ペルソナ',character:'キャラ・作品',instruction:'指示・ルール',video:'動画制作',general:'汎用'}[detected];
  function flash(b){if(!b)return;var orig=b.textContent;b.textContent='Copied! ✦';b.classList.add('copied');setTimeout(function(){b.textContent=orig;b.classList.remove('copied');},500);}
  function fallback(s,b){var ta=document.createElement('textarea');ta.value=s;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flash(b);toast('✦ ['+typeLabel+'] コピー完了！');}
  if(navigator.clipboard){navigator.clipboard.writeText(s).then(function(){flash(btn);toast('✦ ['+typeLabel+'] JSONコピー完了！AIに貼り付けてください');}).catch(function(){fallback(s,btn);});}
  else{fallback(s,btn);}
}

function buildCal(){
  var y=calYear,mo=calMonth;
  document.getElementById('calTitle').textContent=y+'年'+(mo+1)+'月';
  var firstDay=new Date(y,mo,1).getDay();
  var daysInMonth=new Date(y,mo+1,0).getDate();
  var today=new Date();
  var countMap={};
  mems.forEach(function(m){var d=new Date(m.createdAt||m.id);if(d.getFullYear()===y&&d.getMonth()===mo){var k=d.getDate();countMap[k]=(countMap[k]||0)+1;}});
  var dows=['日','月','火','水','木','金','土'];
  var html=dows.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');
  for(var i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
  for(var day=1;day<=daysInMonth;day++){
    var cnt=countMap[day]||0;
    var ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var cls='cal-day';
    if(cnt>=4)cls+=' has4';else if(cnt===3)cls+=' has3';else if(cnt===2)cls+=' has2';else if(cnt===1)cls+=' has1';
    if(y===today.getFullYear()&&mo===today.getMonth()&&day===today.getDate())cls+=' today';
    if(ds===calFilterDate)cls+=' selected';
    html+='<div class="'+cls+'" onclick="filterByDate(\''+ds+'\')" title="'+cnt+'件">'+day+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}

/* --- Gemini Fetch 共通関数 --- */
function _gemFetch(prompt){
  if(!_gemKey){toast('先にGemini APIキーを設定してください');return Promise.reject('no key');}
  var body={
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.7,maxOutputTokens:1024}
  };
  return fetch(GEMINI_ENDPOINT+'?key='+_gemKey,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){
    if(!r.ok){return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});}
    return r.json();
  }).then(function(data){
    var txt=data.candidates&&data.candidates[0]&&data.candidates[0].content&&
            data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&
            data.candidates[0].content.parts[0].text;
    if(!txt)throw new Error('レスポンスが空です');
    return txt;
  });
}

function gemAnalyzeCard(id){

  if(!m)return;
  _runGemAnalyzeCard(m);
}

function _runGemAnalyzeCard(mem){
  var typeLabels={sakura:'さくら',ritsu:'律',glock:'グロック'};
  var persona=typeLabels[ch]||'律';
  var prompt='あなたは「'+persona+'」というキャラクターとして、以下の記憶メモを分析してください。'
    +'キャラクターの口調で、要点・感想・アドバイスを3〜5文で述べてください。\n\n'
    +'【記憶メモ】\n'+mem.text;
  _setGemLoading(true,'✦ AI 分析中...');
  _gemFetch(prompt).then(function(txt){
    // IDB の該当メモに gemLog を付ける
    var at=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    mem.gemLog={type:persona+'分析',text:txt,at:at};
    // IDB に単体保存（全件書き直しを避けてPUTのみ）
    openDB().then(function(db){
      var tx=db.transaction(DB_STORE,'readwrite');
      tx.objectStore(DB_STORE).put(mem);
    });
    render();
    _setGemLoading(false,'');
    toast('✦ AI分析をメモに保存しました');
    // パネルにも結果表示
    _showGemResult(persona+'分析',txt);
    document.getElementById('gemBar').classList.add('on');
  }).catch(function(e){
    _setGemLoading(false,'');
    toast('Geminiエラー: '+e.message);
    document.getElementById('gemStatus')&&(document.getElementById('gemStatus').textContent='エラー: '+e.message);
  });
}

function _runGemAnalyze(type,freeQ,targetMem){
  var ctx=_buildContext();
  var prompts={
    summary:'以下の記憶メモ一覧を読み、全体の傾向・共通テーマ・重要度の高い記憶を日本語で200字以内に要約してください。\n\n'+ctx,
    tags:'以下の記憶メモ一覧から、横断的に使えるタグを最大10個提案してください。各タグは「#タグ名」の形式で、一行一タグで出力してください。\n\n'+ctx,
    sakura:'あなたは元気で明るい「さくら」というキャラクターです。以下の記憶メモ一覧を読んで、さくらの口調で励ましのコメントと気づきを述べてください（200字程度）。\n\n'+ctx,
    ritsu:'あなたは冷静で知的な「律」というキャラクターです。以下の記憶メモ一覧を分析し、論理的・客観的な見解を標準語で述べてください（200字程度）。\n\n'+ctx,
    glock:'あなたは無口でクールな「グロック」というキャラクターです。以下の記憶メモ一覧を見て、端的・ぶっきらぼうに核心を突いてください（100字程度）。\n\n'+ctx,
    free:freeQ+'\n\n【記憶メモ一覧】\n'+ctx
  };
  var typeLabel={summary:'要約',tags:'タグ提案',sakura:'さくら分析',ritsu:'律分析',glock:'グロック分析',free:'フリー質問'}[type]||type;
  _setGemLoading(true,'Gemini に問い合わせ中...');
  _gemFetch(prompts[type]).then(function(txt){
    _setGemLoading(false,'');
    _showGemResult(typeLabel,txt);
    if(type==='free'){document.getElementById('gemFreeInput').value='';}
  }).catch(function(e){
    _setGemLoading(false,'');
    var msg='エラー: '+(e.message||e);
    document.getElementById('gemStatus').textContent=msg;
    document.getElementById('gemStatus').className='gem-status err';
    toast('Geminiエラー: '+(e.message||e));
  });
}

function _showGemResult(label,txt){
  var el=document.getElementById('gemResult');
  var hd=document.getElementById('gemResultHd');
  var body=document.getElementById('gemResultTxt');
  var now=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  hd.textContent='✦ '+label+' — '+now;
  body.textContent=txt;
  el.style.display='block';
}

function _setGemLoading(on,msg){
  var btns=document.querySelectorAll('.btn-gem-act');
  btns.forEach(function(b){b.disabled=on;});
  var st=document.getElementById('gemKeyedStatus');
  if(on){
    st.innerHTML='<span class="gem-spinner"></span>　'+msg;
    st.className='gem-status';
  } else {
    st.textContent='🟢 APIキー設定済（このセッション限定）';
    st.className='gem-status ok';
  }
}

// ===== BOOT =====
load();
if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=function(){};
</script>

<!-- Tesseract.js OCR —— パスは定数 TESS_PATH で管理（オフライン化時はここを書き換え） -->
<script>
// OCR エンジンのパス定数（将来のオフライン化時はローカルパスに変更するだけでOK）
// 例: const TESS_PATH = './lib/tesseract.min.js';
var TESS_PATH = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
(function(){
  var s=document.createElement('script');
  s.src=TESS_PATH;
  s.onerror=function(){console.warn('[OCR] Tesseract load failed from: '+TESS_PATH);};
  document.head.appendChild(s);
})();
</script>
<script>
// ===== CAMERA SCAN =====
var scanStream=null,scanFacing='environment',tesseractReady=false,scanWorker=null;

async function initTesseract(){
  if(scanWorker)return;
  try{
    scanWorker=await Tesseract.createWorker('jpn+eng',1,{logger:function(m){if(m.status==='recognizing text')setScanStatus('OCR処理中... '+Math.round(m.progress*100)+'%',false);}});
    tesseractReady=true;
  }catch(e){setScanStatus('OCR初期化失敗: '+e.message,true);}
}

function setScanStatus(msg,isErr){var el=document.getElementById('scanStatus');el.textContent=msg;el.className='scan-status'+(isErr?' err':'');}

async function toggleScanCam(){
  var wrap=document.getElementById('camScanWrap');
  if(wrap.classList.contains('on')){closeScanCam();}
  else{wrap.classList.add('on');await startScanCam();if(!scanWorker)initTesseract();}
}

async function startScanCam(){
  if(scanStream){scanStream.getTracks().forEach(function(t){t.stop();});}
  setScanStatus('カメラ起動中...',false);
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:scanFacing,width:{ideal:1280},height:{ideal:720}},audio:false});
    document.getElementById('scanVideo').srcObject=scanStream;
    setScanStatus('準備OK — 文字にカメラを向けて撮影してください',false);
  }catch(e){setScanStatus('カメラにアクセスできません: '+e.message,true);}
}

function flipScanCam(){scanFacing=scanFacing==='environment'?'user':'environment';startScanCam();}
function closeScanCam(){if(scanStream){scanStream.getTracks().forEach(function(t){t.stop()});scanStream=null;}document.getElementById('camScanWrap').classList.remove('on');setScanStatus('カメラ起動中...',false);}

async function doShutter(){
  var video=document.getElementById('scanVideo');
  if(!video.videoWidth){setScanStatus('映像が取得できません',true);return;}
  setScanStatus('撮影中...',false);
  var cvs=document.createElement('canvas');cvs.width=video.videoWidth;cvs.height=video.videoHeight;
  var ctx=cvs.getContext('2d');ctx.drawImage(video,0,0);
  cvs.toBlob(function(blob){var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='scan_'+Date.now()+'.webp';a.click();setTimeout(function(){URL.revokeObjectURL(url);},5000);},'image/webp',0.88);
  setScanStatus('文字を認識中...',false);
  if(!tesseractReady||!scanWorker){setScanStatus('OCR初期化中...',false);await initTesseract();}
  try{
    var result=await scanWorker.recognize(cvs);
    var text=result.data.text.trim();
    if(!text){setScanStatus('文字が認識できませんでした',true);return;}
    var ta=document.getElementById('txt');ta.value=(ta.value?ta.value+'\n':'')+text;
    setScanStatus('認識完了 ✦ テキストに追記しました',false);
    speak(text,true);
    setTimeout(closeScanCam,1200);
  }catch(e){setScanStatus('OCRエラー: '+e.message,true);}
}
</script>
