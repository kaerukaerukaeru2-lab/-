<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>GLYPH LAUNCH v3</title>
<style>
  :root {
    --blue:   #00f3ff;
    --orange: #ff9500;
    --bg:     #000000;
    --item:   88px;
    --arc-r:  148px; /* 弧の半径 */
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── 背景グリッド ── */
  #bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,243,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,243,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #bg-grid::after {
    content:'';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, transparent 40%, #000 100%);
  }

  /* ── アイドル ── */
  #idle {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    transition: opacity .3s;
  }
  #idle.hidden { opacity: 0; }

  .idle-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(0,243,255,.25);
    position: relative;
    animation: pulse 3s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
  }
  .idle-ring::before {
    content:'';
    position: absolute; inset: 12px;
    border-radius: 50%;
    border: 1px solid rgba(0,243,255,.12);
    animation: pulse 3s ease-in-out infinite .6s;
  }
  .idle-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 12px var(--blue), 0 0 28px var(--blue);
  }
  @keyframes pulse {
    0%,100% { opacity:.25; transform:scale(1); }
    50%      { opacity:.7;  transform:scale(1.05); }
  }
  .idle-label {
    margin-top: 20px;
    font-size: 9px; letter-spacing:.4em;
    color: rgba(0,243,255,.25);
    text-transform: uppercase;
  }
  .idle-sub {
    margin-top: 6px;
    font-size: 8px; letter-spacing:.3em;
    color: rgba(0,243,255,.12);
    text-transform: uppercase;
  }
  .idle-hint {
    position: fixed; top:16px; right:16px;
    font-size: 8px; letter-spacing:.2em;
    color: rgba(0,243,255,.15);
    pointer-events: none;
  }

  /* ── ラジアルメニュー（画面中央固定） ── */
  #arc-menu {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    /* メニュー自体はサイズ0、子要素が絶対配置で広がる */
    width: 0; height: 0;
    display: none;
  }
  #arc-menu.active { display: block; }

  /* 中心ハブ */
  .hub {
    position: absolute;
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1.5px solid var(--blue);
    background: rgba(0,0,0,.95);
    box-shadow: 0 0 16px var(--blue), inset 0 0 10px rgba(0,243,255,.1);
    transform: translate(-50%,-50%) scale(0);
    transition: transform .2s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
  }
  #arc-menu.active .hub { transform: translate(-50%,-50%) scale(1); }
  .hub-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 10px var(--blue);
    transition: background .2s, box-shadow .2s, transform .15s;
  }
  .hub.long-mode {
    border-color: var(--orange);
    box-shadow: 0 0 16px var(--orange), inset 0 0 10px rgba(255,149,0,.1);
  }
  .hub.long-mode .hub-dot {
    background: var(--orange);
    box-shadow: 0 0 10px var(--orange);
    transform: scale(1.3);
  }

  /* 弧ライン（装飾） */
  .arc-svg {
    position: absolute;
    transform: translate(-50%,-50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s;
  }
  #arc-menu.active .arc-svg { opacity: 1; }

  /* メニューアイテム */
  .arc-item {
    position: absolute;
    width: var(--item); height: var(--item);
    border-radius: 50%;
    background: rgba(0,4,8,.94);
    border: 1.5px solid rgba(0,243,255,.2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px;
    transform: translate(-50%,-50%) scale(0);
    transition:
      transform .24s cubic-bezier(.34,1.56,.64,1),
      border-color .15s,
      box-shadow .15s,
      background .15s;
    pointer-events: auto;
    overflow: hidden;
  }
  #arc-menu.active .arc-item { transform: translate(-50%,-50%) scale(1); }

  /* ディレイ */
  #arc-menu.active .arc-item:nth-child(1) { transition-delay:.03s; }
  #arc-menu.active .arc-item:nth-child(2) { transition-delay:.06s; }
  #arc-menu.active .arc-item:nth-child(3) { transition-delay:.09s; }
  #arc-menu.active .arc-item:nth-child(4) { transition-delay:.06s; }
  #arc-menu.active .arc-item:nth-child(5) { transition-delay:.03s; }
  /* 下段2つ（末尾） */
  #arc-menu.active .arc-item:nth-last-child(1) { transition-delay:.09s; }
  #arc-menu.active .arc-item:nth-last-child(2) { transition-delay:.06s; }

  .arc-item.highlighted {
    border-color: var(--blue);
    background: rgba(0,18,28,.98);
    box-shadow: 0 0 22px var(--blue), 0 0 44px rgba(0,243,255,.25), inset 0 0 18px rgba(0,243,255,.08);
    transform: translate(-50%,-50%) scale(1.22) !important;
  }
  .arc-item.highlighted.long-fire {
    border-color: var(--orange);
    box-shadow: 0 0 22px var(--orange), 0 0 44px rgba(255,149,0,.25), inset 0 0 18px rgba(255,149,0,.08);
  }
  .arc-item.highlighted .ai { filter: drop-shadow(0 0 7px var(--blue)); }
  .arc-item.highlighted.long-fire .ai { filter: drop-shadow(0 0 7px var(--orange)); }
  .arc-item.highlighted .al { color: var(--blue); }
  .arc-item.highlighted.long-fire .al { color: var(--orange); }

  .ai { /* arc-icon */
    font-size: 26px; line-height:1;
    transition: filter .15s;
  }
  .al { /* arc-label */
    font-size: 8px; letter-spacing:.08em;
    color: rgba(0,243,255,.55);
    text-transform: uppercase;
    max-width: 72px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-align: center;
    transition: color .15s;
  }

  /* ── 方向インジケーター ── */
  #dir-ind {
    position: fixed; bottom: 52px; left:50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 10px; letter-spacing:.25em;
    color: var(--blue);
    text-transform: uppercase;
    opacity: 0; transition: opacity .2s, color .2s;
    pointer-events: none;
    text-shadow: 0 0 12px var(--blue);
    white-space: nowrap;
  }
  #dir-ind.visible { opacity: 1; }
  #dir-ind.long-mode { color: var(--orange); text-shadow: 0 0 12px var(--orange); }

  /* ── モードバッジ（長スワイプ時） ── */
  #mode-badge {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, calc(-50% - 110px));
    z-index: 20;
    font-size: 8px; letter-spacing:.25em;
    padding: 4px 12px;
    border: 1px solid rgba(255,149,0,.4);
    color: var(--orange);
    background: rgba(0,0,0,.8);
    text-transform: uppercase;
    opacity: 0; transition: opacity .2s;
    pointer-events: none;
    border-radius: 2px;
  }
  #mode-badge.visible { opacity: 1; }

  /* ── トレイル ── */
  #trail {
    position: fixed; inset:0; z-index:4;
    pointer-events: none;
    opacity: 0; transition: opacity .3s;
  }
  #trail.active { opacity: 1; }

  /* ── リップル ── */
  .ripple {
    position: fixed; pointer-events: none; z-index:5;
    border-radius: 50%;
    border: 1px solid rgba(0,243,255,.45);
    transform: translate(-50%,-50%) scale(0);
    animation: rout .5s ease-out forwards;
  }
  @keyframes rout { to { transform:translate(-50%,-50%) scale(3); opacity:0; } }

  /* ── トースト ── */
  #toast {
    position: fixed; bottom:28px; left:50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(0,243,255,.08);
    border: 1px solid rgba(0,243,255,.35);
    color: var(--blue);
    font-size: 9px; letter-spacing:.2em;
    padding: 7px 18px; border-radius:2px;
    z-index: 200; opacity:0;
    transition: opacity .2s, transform .2s;
    pointer-events: none; text-transform: uppercase; white-space: nowrap;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.orange { border-color:rgba(255,149,0,.4); color:var(--orange); background:rgba(255,149,0,.06); }

  /* ── 設定パネル ── */
  #settings-overlay {
    position: fixed; inset:0; z-index:100;
    background: rgba(0,0,0,.96);
    display: none; flex-direction: column;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #settings-overlay.open { display: flex; }

  .s-header {
    padding: 26px 22px 14px;
    border-bottom: 1px solid rgba(0,243,255,.12);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top:0; background: rgba(0,0,0,.98); z-index:1;
  }
  .s-title { font-size:10px; letter-spacing:.5em; color:var(--blue); text-transform:uppercase; }
  .s-close {
    width:34px; height:34px; border-radius:50%;
    border:1px solid rgba(0,243,255,.3); background:transparent;
    color:var(--blue); font-size:17px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .s-body { padding:14px 22px 40px; }

  .slot-card {
    margin-bottom:12px; padding:14px;
    border:1px solid rgba(0,243,255,.1); border-radius:4px;
    background: rgba(0,6,10,.8);
  }
  .slot-card:focus-within { border-color:rgba(0,243,255,.35); }
  .slot-head {
    display:flex; align-items:center; gap:10px; margin-bottom:10px;
  }
  .slot-arrow { font-size:18px; color:rgba(0,243,255,.5); }
  .slot-name { font-size:8px; letter-spacing:.3em; color:rgba(0,243,255,.4); text-transform:uppercase; }

  .f-label {
    display:block; font-size:7px; letter-spacing:.2em;
    color:rgba(0,243,255,.35); text-transform:uppercase; margin-bottom:4px;
  }
  .f-row { display:flex; gap:7px; margin-bottom:9px; }
  .f-input {
    flex:1; background:rgba(0,0,0,.7);
    border:1px solid rgba(0,243,255,.18); border-radius:3px;
    padding:7px 9px; color:var(--blue);
    font-family:'Courier New',monospace; font-size:12px;
    outline:none; -webkit-appearance:none;
    transition: border-color .15s;
  }
  .f-input:focus { border-color:rgba(0,243,255,.6); }
  .f-input::placeholder { color:rgba(0,243,255,.18); }
  .f-icon { width:48px; flex:none; text-align:center; font-size:20px; }

  .save-btn {
    display:block; width:100%; margin-top:20px; padding:13px;
    background:transparent; border:1px solid var(--blue); border-radius:3px;
    color:var(--blue); font-family:'Courier New',monospace;
    font-size:10px; letter-spacing:.4em; text-transform:uppercase; cursor:pointer;
  }
  .save-btn:active { background:rgba(0,243,255,.07); }
  .s-hint {
    text-align:center; font-size:8px; letter-spacing:.2em;
    color:rgba(0,243,255,.18); margin-top:14px;
  }
</style>
</head>
<body>

<div id="bg-grid"></div>
<canvas id="trail"></canvas>

<div id="idle">
  <div class="idle-ring"><div class="idle-dot"></div></div>
  <p class="idle-label">Touch to launch</p>
  <p class="idle-sub">Glyph Launch v3</p>
</div>
<div class="idle-hint">Triple tap top ↑ settings</div>

<!-- 弧メニュー（画面中央固定） -->
<div id="arc-menu">
  <!-- SVG弧ライン（JS生成） -->
  <svg class="arc-svg" id="arc-svg"></svg>
  <!-- ハブ（中心） -->
  <div class="hub" id="hub"><div class="hub-dot" id="hub-dot"></div></div>
  <!-- アイテムはJS生成 -->
</div>

<div id="dir-ind"></div>
<div id="mode-badge">Current Tab</div>
<div id="toast"></div>

<!-- 設定 -->
<div id="settings-overlay">
  <div class="s-header">
    <span class="s-title">// Config</span>
    <button class="s-close" id="s-close">✕</button>
  </div>
  <div class="s-body" id="s-body"></div>
</div>

<script>
'use strict';

/* ═══════════════════
   定数
═══════════════════ */
/* 上半円を除いた下寄り配置：-150° 〜 -30° の上弧 + 真横2つ
   親指で届く範囲 = 下半円（90°〜270°）を使う
   8スロットを下半円+両サイドに配置
   角度: 左端-150° → 右端-30°（上弧）＋ 真左右各1つ */
const SLOTS_DEF = [
  { icon:'🔍', label:'Google',  url:'https://www.google.com'       },
  { icon:'▶',  label:'YouTube', url:'https://www.youtube.com'      },
  { icon:'⌥',  label:'GitHub',  url:'https://github.com'           },
  { icon:'✦',  label:'Claude',  url:'https://claude.ai'            },
  { icon:'◉',  label:'Maps',    url:'https://maps.google.com'      },
  { icon:'✕',  label:'X',       url:'https://x.com'                },
  { icon:'△',  label:'HN',      url:'https://news.ycombinator.com' },
  { icon:'Ω',  label:'Wiki',    url:'https://www.wikipedia.org'    },
];

/* 下半円に8分割配置（210°〜330° = 親指の自然な弧） */
const ARC_ANGLES = [-150, -107, -64, -21, 21, 64, 107, 150]; // degree, 0=右
const ARC_R      = 148;  // px
const DEADZONE   = 22;   // px
const LONG_DIST  = 130;  // px
const STORAGE_KEY = 'glyph_v3_slots';
const LONGPRESS_MS = 420;

/* ═══════════════════
   LocalStorage
═══════════════════ */
function lsGet(k, fb) {
  try { const r = localStorage.getItem(k); if(r) return JSON.parse(r); } catch(e){}
  return fb;
}
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }

function loadSlots() {
  const p = lsGet(STORAGE_KEY, null);
  if (Array.isArray(p) && p.length === 8 && p.every(s => s && typeof s === 'object')) return p;
  return SLOTS_DEF.map(d => ({...d}));
}
function saveSlots(s) { lsSet(STORAGE_KEY, s); }
let slots = loadSlots();

/* ═══════════════════
   DOM refs
═══════════════════ */
const arcMenu  = document.getElementById('arc-menu');
const arcSvg   = document.getElementById('arc-svg');
const hubEl    = document.getElementById('hub');
const hubDot   = document.getElementById('hub-dot');
const idleEl   = document.getElementById('idle');
const dirInd   = document.getElementById('dir-ind');
const modeBadge= document.getElementById('mode-badge');
const trailCvs = document.getElementById('trail');
const ctx      = trailCvs.getContext('2d');
const toastEl  = document.getElementById('toast');
const sOverlay = document.getElementById('settings-overlay');
const sBody    = document.getElementById('s-body');
const sClose   = document.getElementById('s-close');

/* ── Canvas ── */
function resizeCvs() { trailCvs.width = window.innerWidth; trailCvs.height = window.innerHeight; }
resizeCvs();
window.addEventListener('resize', resizeCvs);

/* ═══════════════════
   弧メニュービルド
═══════════════════ */
let itemEls = [];

function buildArc() {
  /* 既存アイテム削除（hub・svg以外） */
  itemEls.forEach(el => el.remove());
  itemEls = [];

  /* SVG弧ライン描画 */
  const r = ARC_R + 10;
  const W = (r + 60) * 2;
  arcSvg.setAttribute('width', W);
  arcSvg.setAttribute('height', W);
  arcSvg.style.width  = W + 'px';
  arcSvg.style.height = W + 'px';
  const cx = W / 2, cy = W / 2;

  /* 弧のstart/end角度 */
  const startA = ARC_ANGLES[0] * Math.PI / 180;
  const endA   = ARC_ANGLES[ARC_ANGLES.length - 1] * Math.PI / 180;
  const sx = cx + r * Math.cos(startA);
  const sy = cy + r * Math.sin(startA);
  const ex = cx + r * Math.cos(endA);
  const ey = cy + r * Math.sin(endA);
  const largeArc = Math.abs(ARC_ANGLES[ARC_ANGLES.length-1] - ARC_ANGLES[0]) > 180 ? 1 : 0;

  arcSvg.innerHTML = `
    <path d="M ${sx} ${sy} A ${r} ${r} 0 ${largeArc} 1 ${ex} ${ey}"
      fill="none" stroke="rgba(0,243,255,0.12)" stroke-width="1"
      stroke-dasharray="4 6"/>
    <!-- 内側リング -->
    <circle cx="${cx}" cy="${cy}" r="28" fill="none"
      stroke="rgba(0,243,255,0.08)" stroke-width="1"/>
  `;

  /* アイテム配置 */
  ARC_ANGLES.forEach((deg, i) => {
    const rad = deg * Math.PI / 180;
    const x   = Math.cos(rad) * ARC_R;
    const y   = Math.sin(rad) * ARC_R;
    const s   = slots[i];

    const el = document.createElement('div');
    el.className = 'arc-item';
    el.dataset.i = i;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.innerHTML  = `<span class="ai">${s.icon || '◉'}</span><span class="al">${s.label || ''}</span>`;
    arcMenu.appendChild(el);
    itemEls.push(el);
  });
}
buildArc();

/* ═══════════════════
   タッチ状態
═══════════════════ */
let active     = false;
let ox = 0, oy = 0;
let curIdx     = -1;
let longMode   = false;
let trail      = [];
let longTimer  = null;
let longFired  = false;

/* ── 角度 → アイテムインデックス（最近傍） ── */
function angleToBestIdx(dx, dy) {
  const deg = Math.atan2(dy, dx) * 180 / Math.PI;
  let best = 0, bestDiff = Infinity;
  ARC_ANGLES.forEach((a, i) => {
    let diff = Math.abs(a - deg);
    if (diff > 180) diff = 360 - diff;
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  });
  return best;
}

/* ── ハイライト ── */
function setHL(idx, lng) {
  if (idx === curIdx && lng === longMode) return;
  curIdx    = idx;
  longMode  = lng;

  itemEls.forEach((el, i) => {
    el.classList.toggle('highlighted', i === idx);
    if (i === idx) el.classList.toggle('long-fire', lng);
    else el.classList.remove('long-fire');
  });
  hubEl.classList.toggle('long-mode', lng);
  modeBadge.classList.toggle('visible', lng && idx >= 0);

  if (idx >= 0) {
    vibrate(5);
    const tag = lng ? ' · current tab' : ' · new tab';
    dirInd.textContent = (slots[idx].label || '') + tag;
    dirInd.classList.add('visible');
    dirInd.classList.toggle('long-mode', lng);
  } else {
    dirInd.classList.remove('visible','long-mode');
  }
}

/* ── メニュー開閉 ── */
function openMenu() {
  arcMenu.classList.add('active');
  idleEl.classList.add('hidden');
  trailCvs.classList.add('active');
  vibrate(8);
}
function closeMenu() {
  arcMenu.classList.remove('active');
  idleEl.classList.remove('hidden');
  trailCvs.classList.remove('active');
  dirInd.classList.remove('visible','long-mode');
  modeBadge.classList.remove('visible');
  hubEl.classList.remove('long-mode');
  itemEls.forEach(el => el.classList.remove('highlighted','long-fire'));
  ctx.clearRect(0, 0, trailCvs.width, trailCvs.height);
  trail = [];
  curIdx   = -1;
  longMode = false;
}

/* ── トレイル ── */
function drawTrail() {
  ctx.clearRect(0, 0, trailCvs.width, trailCvs.height);
  if (trail.length < 2) return;
  const color = longMode ? 'rgba(255,149,0,.35)' : 'rgba(0,243,255,.28)';
  const glow  = longMode ? 'rgba(255,149,0,.6)'  : 'rgba(0,243,255,.6)';
  ctx.beginPath();
  ctx.moveTo(trail[0].x, trail[0].y);
  for (let i = 1; i < trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
  ctx.strokeStyle = color;
  ctx.lineWidth   = 2;
  ctx.lineCap = ctx.lineJoin = 'round';
  ctx.shadowColor = glow; ctx.shadowBlur = 8;
  ctx.stroke();
}

/* ── ユーティリティ ── */
function vibrate(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch(e){} }

function spawnRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.cssText = `left:${x}px;top:${y}px;width:44px;height:44px;`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once:true });
}

let toastT;
function toast(msg, style) {
  toastEl.textContent = msg;
  toastEl.className   = 'show' + (style === 'orange' ? ' orange' : '');
  clearTimeout(toastT);
  toastT = setTimeout(() => { toastEl.className = ''; }, 1800);
}

/* ── トリプルタップ（設定） ── */
let tapCnt = 0, tapT = null, openingSettings = false;
function checkTriple(y) {
  if (y > window.innerHeight * 0.2) return;
  tapCnt++;
  clearTimeout(tapT);
  tapT = setTimeout(() => { tapCnt = 0; }, 500);
  if (tapCnt >= 3) { tapCnt = 0; openingSettings = true; openSettings(); }
}

/* ═══════════════════
   タッチイベント
═══════════════════ */
document.addEventListener('touchstart',  onTS, { passive:false });
document.addEventListener('touchmove',   onTM, { passive:false });
document.addEventListener('touchend',    onTE, { passive:false });
document.addEventListener('touchcancel', onTC, { passive:false });
document.addEventListener('contextmenu', e => e.preventDefault());

function onTS(e) {
  if (sOverlay.classList.contains('open')) return;
  e.preventDefault();
  openingSettings = false;
  longFired = false;

  const t = e.changedTouches[0];
  ox = t.clientX; oy = t.clientY;
  trail = [{ x:ox, y:oy }];

  checkTriple(oy);
  if (openingSettings) return;

  active = true;
  spawnRipple(ox, oy);
  openMenu();

  clearTimeout(longTimer);
  longTimer = setTimeout(() => {
    if (!active) return;
    longFired = true;
    vibrate([6, 10, 6]);
  }, LONGPRESS_MS);
}

function onTM(e) {
  if (!active) return;
  e.preventDefault();
  const t  = e.changedTouches[0];
  const dx = t.clientX - ox;
  const dy = t.clientY - oy;
  const d  = Math.hypot(dx, dy);

  trail.push({ x:t.clientX, y:t.clientY });
  if (trail.length > 40) trail.shift();

  if (d > 10) clearTimeout(longTimer);

  const lng = d >= LONG_DIST;

  if (d < DEADZONE) {
    setHL(-1, false);
    drawTrail();
    return;
  }

  setHL(angleToBestIdx(dx, dy), lng);
  drawTrail();
}

function onTE(e) {
  if (!active) return;
  active = false;
  clearTimeout(longTimer);

  const t = e.changedTouches && e.changedTouches[0];
  if (t) {
    const dx = t.clientX - ox;
    const dy = t.clientY - oy;
    const d  = Math.hypot(dx, dy);

    if (d >= DEADZONE && curIdx >= 0) {
      const s   = slots[curIdx];
      const lng = d >= LONG_DIST;
      if (s && s.url) {
        vibrate([10, 18, 10]);
        if (lng) {
          toast('Opening in current tab', 'orange');
          setTimeout(() => { window.location.href = s.url; }, 80);
        } else {
          toast('Opening in new tab');
          setTimeout(() => { window.open(s.url, '_blank'); }, 80);
        }
      }
    }
  }
  closeMenu();
}

function onTC() {
  active = false;
  clearTimeout(longTimer);
  closeMenu();
}

/* ═══════════════════
   設定パネル
═══════════════════ */
function openSettings() {
  vibrate(12);
  renderSettings();
  sOverlay.classList.add('open');
}
sClose.addEventListener('click',    closeSettings);
sClose.addEventListener('touchend', e => { e.preventDefault(); closeSettings(); });
function closeSettings() { sOverlay.classList.remove('open'); }

function renderSettings() {
  sBody.innerHTML = '';
  slots.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'slot-card';
    card.innerHTML = `
      <div class="slot-head">
        <span class="slot-arrow">${i+1}</span>
        <span class="slot-name">Slot ${i+1} — ${ARC_ANGLES[i]}°</span>
      </div>
      <label class="f-label">Icon / Label</label>
      <div class="f-row">
        <input class="f-input f-icon" data-i="${i}" data-f="icon" type="text" maxlength="2" value="${s.icon||''}" placeholder="✦">
        <input class="f-input" data-i="${i}" data-f="label" type="text" maxlength="12" value="${s.label||''}" placeholder="Label">
      </div>
      <label class="f-label">URL</label>
      <div class="f-row">
        <input class="f-input" data-i="${i}" data-f="url" type="url" value="${s.url||''}" placeholder="https://">
      </div>
    `;
    sBody.appendChild(card);
  });

  const btn = document.createElement('button');
  btn.className   = 'save-btn';
  btn.textContent = '[ Save & Close ]';
  btn.addEventListener('click',    saveSettings);
  btn.addEventListener('touchend', e => { e.preventDefault(); saveSettings(); });
  sBody.appendChild(btn);

  const hint = document.createElement('p');
  hint.className   = 's-hint';
  hint.textContent = 'Triple-tap top of screen to reopen';
  sBody.appendChild(hint);
}

function saveSettings() {
  sBody.querySelectorAll('.f-input').forEach(inp => {
    const i = +inp.dataset.i;
    const f = inp.dataset.f;
    if (['icon','label','url'].includes(f) && !isNaN(i)) {
      slots[i][f] = inp.value.trim();
    }
  });
  saveSlots(slots);
  buildArc();
  closeSettings();
  toast('Saved');
  vibrate([8,10,8]);
}

sOverlay.addEventListener('touchstart', e => e.stopPropagation());
sOverlay.addEventListener('touchmove',  e => e.stopPropagation());
sOverlay.addEventListener('touchend',   e => e.stopPropagation());
</script>
</body>
</html>
